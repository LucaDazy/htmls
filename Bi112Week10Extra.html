<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Week 10 Rapid Cram</title>
    <style>
        :root {
            --bg-color: #323437;
            --text-main: #d1d0c5;
            --text-muted: #646669;
            --accent: #e2b714;
            --error: #ca4754;
            --success: #8cc84b;
            --panel-bg: #2c2e31;
            --hover-bg: #3a3d40;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Top Target Area */
        .target-box {
            background: var(--panel-bg);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 1px dashed var(--text-muted);
            padding-bottom: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .progress-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .hint-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 0.4rem 0.8rem;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .hint-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(226, 183, 20, 0.1); }

        .target-clue {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 1rem;
            width: 100%;
        }

        .feedback-box {
            margin-top: 1rem;
            padding: 1.2rem;
            border-radius: 4px;
            display: none;
            line-height: 1.5;
            font-size: 1rem;
            background: rgba(0,0,0,0.2);
            border-left: 4px solid var(--accent);
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }

        .action-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 1rem 1.5rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            width: 100%;
            margin-top: 1.5rem;
            font-weight: bold;
            display: none;
        }
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }

        /* The Soundboard / Term Grid */
        .term-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .term-btn {
            background: var(--panel-bg);
            border: 2px solid var(--text-muted);
            color: var(--text-main);
            padding: 1.2rem 1rem;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            text-align: center;
            user-select: none;
        }

        .term-btn:hover:not(.disabled):not(.dimmed) {
            border-color: var(--accent);
            background: var(--hover-bg);
            transform: translateY(-2px);
        }

        .term-btn.correct { border-color: var(--success); background: rgba(140, 200, 75, 0.2); color: var(--success); }
        .term-btn.wrong { border-color: var(--error); background: rgba(202, 71, 84, 0.2); color: var(--error); animation: shake 0.3s; }
        .term-btn.dimmed { opacity: 0.2; pointer-events: none; border-color: var(--text-muted); }
        .term-btn.disabled { pointer-events: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Glossary Helper Tool */
        .glossary-box {
            background: rgba(0,0,0,0.2);
            border: 1px dashed var(--text-muted);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .glossary-header {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-align: center;
            text-transform: uppercase;
        }

        .glossary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .glossary-item {
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .g-term { color: var(--accent); font-weight: bold; }
        
        .end-screen { text-align: center; display: none; background: var(--panel-bg); padding: 3rem; border-radius: 8px; border: 2px solid var(--success); }
        .end-screen h2 { color: var(--success); margin-bottom: 1rem; }

        @media (max-width: 600px) {
            .header-row { flex-direction: column; gap: 1rem; }
        }

    </style>
</head>
<body>

    <h1>Week 10 Concept Board</h1>
    <div class="subtitle">High-Speed Term Recognition & Spaced Repetition Drill</div>

    <div class="container">
        
        <div class="target-box" id="target-area">
            <div class="header-row">
                <div class="progress-text" id="prog-text">Loading...</div>
                <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Hint (Eliminate)</button>
            </div>
            <div class="target-clue" id="clue-text">Loading...</div>
            <div id="feedback" class="feedback-box"></div>
            <button id="next-btn" class="action-btn" onclick="nextCard()">Next Question ➔</button>
        </div>

        <div id="end-screen" class="end-screen">
            <h2>Deck Conquered!</h2>
            <p id="final-score" style="margin-bottom: 2rem;"></p>
            <button class="action-btn" style="display:block;" onclick="init()">Restart Drill</button>
        </div>

        <div class="term-board" id="board">
            </div>

        <div class="glossary-box">
            <div class="glossary-header">📚 Week 10 Exam Cheat Sheet</div>
            <div class="glossary-grid" id="glossary-grid">
                </div>
        </div>

    </div>

    <script>
        // --- DATA ---
        const data = [
            { term: "Telomerase", clue: "The enzyme that adds non-coding 'junk' DNA to the ends of chromosomes to prevent them from shrinking during replication." },
            { term: "Mismatch Repair", clue: "The DNA repair mechanism that catches and fixes incorrectly paired bases (like A binding to C) right after replication." },
            { term: "Nucleotide Excision", clue: "The repair mechanism that specifically cuts out and fixes 'thymine dimers' caused by UV radiation damage." },
            { term: "Frameshift Mutation", clue: "A severe mutation caused by the insertion or deletion of a nucleotide, completely altering how the following codons are read." },
            { term: "Central Dogma", clue: "The universal rule detailing the one-way flow of genetic information: DNA → RNA → Protein." },
            { term: "Promoter", clue: "The specific sequence of DNA that acts as a landing pad for RNA Polymerase to bind and begin Transcription." },
            { term: "Template Strand", clue: "The specific side of the DNA double-helix that RNA Polymerase physically reads to build the mRNA transcript." },
            { term: "Introns", clue: "The non-coding 'junk' sections of eukaryotic mRNA that must be spliced out before translation." },
            { term: "Exons", clue: "The coding sections of eukaryotic mRNA that are glued together and eventually expressed as a protein." },
            { term: "5' Cap & Poly-A Tail", clue: "Modifications added to the ends of eukaryotic mRNA to protect it from being destroyed in the cytoplasm." },
            { term: "Codon", clue: "A sequence of exactly three nucleotides on an mRNA strand that codes for a single, specific amino acid." },
            { term: "AUG (Methionine)", clue: "The universal START codon that tells the ribosome exactly where to begin Translation." },
            { term: "A Site", clue: "The specific chamber in the ribosome where incoming charged tRNAs arrive to drop off their amino acid." },
            { term: "P Site", clue: "The specific chamber in the ribosome that holds the tRNA attached to the growing polypeptide chain." },
            { term: "Operator", clue: "In prokaryotes (like the lac operon), this is the physical 'switch' where a repressor protein binds to block transcription." },
            { term: "Transcriptional Level", clue: "Because prokaryotes lack a nucleus, they regulate almost all of their gene expression primarily at this single level." },
            { term: "Epigenetic Level", clue: "A method of gene regulation unique to eukaryotes that involves tightly coiling or uncoiling DNA around histones." }
        ];

        // --- STATE ---
        let mcqState = { deck: [], idx: 0, attempts: 0, correct: 0 };
        let hintUsed = false;
        let lockBoard = false;

        // --- UTILS ---
        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function init() {
            // Reset state
            mcqState = { deck: shuffle([...data]), idx: 0, attempts: 0, correct: 0 };
            
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('target-area').style.display = 'flex';
            document.getElementById('board').style.display = 'grid';

            // Build the Soundboard (Positions randomize once per session)
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const shuffledBoardData = shuffle([...data]);
            shuffledBoardData.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'term-btn';
                btn.innerText = item.term;
                btn.dataset.term = item.term;
                btn.onclick = () => handleGuess(btn, item.term);
                board.appendChild(btn);
            });

            // Build Glossary (Alphabetical)
            const glossaryGrid = document.getElementById('glossary-grid');
            glossaryGrid.innerHTML = '';
            const sortedData = [...data].sort((a,b) => a.term.localeCompare(b.term));
            sortedData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'glossary-item';
                div.innerHTML = `<span class="g-term">${item.term}:</span> ${item.clue}`;
                glossaryGrid.appendChild(div);
            });

            loadCard();
        }

        function loadCard() {
            if (mcqState.idx >= mcqState.deck.length) {
                endDrill();
                return;
            }

            lockBoard = false;
            hintUsed = false;
            
            const currentCard = mcqState.deck[mcqState.idx];

            document.getElementById('clue-text').innerText = `"${currentCard.clue}"`;
            document.getElementById('prog-text').innerText = `Card ${mcqState.idx + 1} of ${mcqState.deck.length}`;
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('hint-btn').disabled = false;
            
            // Reset board buttons
            document.querySelectorAll('.term-btn').forEach(btn => {
                btn.className = 'term-btn'; 
            });
        }

        function handleGuess(btn, guessedTerm) {
            if (lockBoard) return;
            lockBoard = true;
            document.getElementById('hint-btn').disabled = true;

            const currentCard = mcqState.deck[mcqState.idx];
            const fb = document.getElementById('feedback');
            const allBtns = document.querySelectorAll('.term-btn');
            
            mcqState.attempts++;

            if (hintUsed) {
                // If hint was used, automatically recycle the card to ensure retention
                btn.classList.add('correct');
                mcqState.deck.push(mcqState.deck[mcqState.idx]);
                
                fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used.</strong><br><br><strong>${currentCard.term}</strong>: ${currentCard.clue}<br><br><em style="color:var(--accent);">Card recycled to the back of the deck.</em>`;
                fb.style.borderLeftColor = 'var(--accent)';

            } else if (guessedTerm === currentCard.term) {
                // Correct!
                btn.classList.add('correct');
                mcqState.correct++;
                
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br><strong>${currentCard.term}</strong>: ${currentCard.clue}`;
                fb.style.borderLeftColor = 'var(--success)';

            } else {
                // Wrong!
                btn.classList.add('wrong');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                
                // Highlight the actual correct button so they learn it
                allBtns.forEach(b => {
                    if (b.dataset.term === currentCard.term) {
                        b.classList.add('correct');
                    }
                });

                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect.</strong><br><br>The correct answer was <strong>${currentCard.term}</strong>.<br><br><em style="color:var(--accent);">Card recycled to the back of the deck.</em>`;
                fb.style.borderLeftColor = 'var(--error)';
            }
            
            // Disable all unselected buttons visually
            allBtns.forEach(b => {
                if (!b.classList.contains('correct') && !b.classList.contains('wrong')) {
                    b.classList.add('dimmed');
                }
                b.classList.add('disabled');
            });

            document.getElementById('prog-text').innerText = `Card ${mcqState.idx + 1} of ${mcqState.deck.length}`;
            fb.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function useHint() {
            if (lockBoard || hintUsed) return;
            hintUsed = true;
            
            const currentCard = mcqState.deck[mcqState.idx];
            const allBtns = Array.from(document.querySelectorAll('.term-btn'));
            const correctBtn = allBtns.find(b => b.dataset.term === currentCard.term);
            const wrongBtns = shuffle(allBtns.filter(b => b.dataset.term !== currentCard.term));
            
            // Keep the correct button and 2 random wrong buttons lit up
            const keepLit = [correctBtn, wrongBtns[0], wrongBtns[1]];
            
            allBtns.forEach(btn => {
                if (!keepLit.includes(btn)) {
                    btn.classList.add('dimmed');
                }
            });
            
            document.getElementById('hint-btn').disabled = true;
        }

        function nextCard() {
            mcqState.idx++;
            loadCard();
        }

        function endDrill() {
            document.getElementById('target-area').style.display = 'none';
            document.getElementById('board').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            
            const pct = Math.round((mcqState.correct / mcqState.attempts) * 100) || 0;
            document.getElementById('final-score').innerHTML = `You hit <strong>${mcqState.correct}</strong> correct on the first try out of <strong>${mcqState.attempts}</strong> total attempts (${pct}% accuracy).`;
        }

        // Start
        init();

    </script>
</body>
</html>
