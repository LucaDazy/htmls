<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Trainer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #323437;
            --main-text: #d1d0c5;
            --sub-text: #646669;
            --caret-color: #e2b714;
            --error-color: #ca4754;
            --correct-color: #a6e22e;
            --font-family: 'Roboto Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: var(--font-family);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            color: var(--sub-text);
        }

        select, button {
            background: transparent;
            border: 2px solid var(--sub-text);
            color: var(--sub-text);
            font-family: var(--font-family);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        select:hover, button:hover {
            color: var(--main-text);
            border-color: var(--main-text);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--main-text);
        }

        /* Main Game Area */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            justify-content: center;
            padding-bottom: 10vh;
        }

        .prompt-box {
            text-align: center;
            margin-bottom: 3rem;
        }

        .prompt-label {
            font-size: 1.2rem;
            color: var(--sub-text);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .prompt-value {
            font-size: 4rem;
            font-weight: 700;
            color: var(--main-text);
        }

        .inputs-container {
            display: flex;
            gap: 2rem;
            width: 100%;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
        }

        .input-label {
            font-size: 1rem;
            color: var(--sub-text);
            margin-bottom: 0.5rem;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--sub-text);
            color: var(--caret-color);
            font-family: var(--font-family);
            font-size: 2rem;
            text-align: center;
            width: 100%;
            outline: none;
            caret-color: var(--caret-color);
            padding-bottom: 0.5rem;
            transition: border-color 0.2s, color 0.2s;
        }

        input:focus {
            border-bottom-color: var(--caret-color);
        }

        input:disabled {
            background: transparent;
        }

        /* Feedback States */
        input.correct {
            color: var(--correct-color);
            border-bottom-color: var(--correct-color);
        }

        input.error {
            color: var(--error-color);
            border-bottom-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Info Panel & Next Button */
        .info-panel {
            margin-top: 3rem;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-in;
            text-align: center;
        }

        .info-panel.visible {
            display: flex;
        }

        .info-stats {
            color: var(--main-text);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .info-stats span {
            color: var(--sub-text);
        }

        .mnemonic {
            color: var(--caret-color);
            font-style: italic;
            margin-bottom: 2rem;
            max-width: 500px;
            line-height: 1.4;
        }

        .next-btn {
            font-size: 1.5rem;
            padding: 0.5rem 3rem;
            border-color: var(--caret-color);
            color: var(--caret-color);
        }

        .next-btn:hover {
            background-color: var(--caret-color);
            color: var(--bg-color);
        }

        /* Bottom Left Counter */
        .counter {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            color: var(--caret-color);
        }
        
        .counter-label {
            font-size: 0.8rem;
            color: var(--sub-text);
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Completion Screen */
        #completionScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #completionScreen h1 {
            font-size: 3rem;
            color: var(--correct-color);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <select id="modeSelect">
            <option value="common">16 Common Elements</option>
            <option value="all">All 118 Elements</option>
        </select>
        <button id="restartBtn">Restart</button>
    </div>

    <div class="game-container" id="gameUI">
        <div class="prompt-box">
            <div class="prompt-label" id="promptLabel">Attribute</div>
            <div class="prompt-value" id="promptValue">Value</div>
        </div>

        <div class="inputs-container" id="inputsContainer">
            </div>

        <div class="info-panel" id="infoPanel">
            <div class="info-stats" id="infoStats">
                Weight: <span>0.00</span> | Row (Period): <span>0</span> | Column (Group): <span>0</span>
            </div>
            <div class="mnemonic" id="mnemonicText">"Mnemonic goes here"</div>
            <button class="next-btn" id="nextBtn">NEXT (Enter)</button>
        </div>
    </div>

    <div id="completionScreen">
        <h1>Deck Completed!</h1>
        <button onclick="initDeck()">Play Again</button>
    </div>

    <div class="counter">
        <span class="counter-label">slides remaining</span>
        <span id="countValue">0 out of 0</span>
    </div>

    <script>
        // --- Database ---
        const commonElementNumbers = [56, 20, 6, 17, 1, 53, 26, 12, 80, 7, 8, 15, 19, 11, 16, 22];

        const customMnemonics = {
            56: "Barium is Bad for you. Bury 'em at 56.",
            20: "Calcium builds 20 strong bones.",
            6:  "Carbon has 6 sides (hexagonal graphite rings).",
            17: "Clean the pool at 17 with Chlorine.",
            1:  "Hydrogen is #1, the lightest element!",
            53: "I need 53 drops of Iodine.",
            26: "Ferrum is Iron, like a 26-mile marathon (Ironman).",
            12: "A Magnet attracts 12 items (Magnesium).",
            80: "Hydrargyrum is quicksilver; 80 degrees feels hot.",
            7:  "Nitrogen makes up roughly 78% of the air (7).",
            8:  "O is 8, atomic weight is ~16.",
            15: "Phosphorus glows at 15.",
            19: "Kalium is Potassium; eating 19 bananas.",
            11: "Na is Sodium; National level 11.",
            16: "Sweet 16 smells like Sulfur.",
            22: "Titanium is 22 strong."
        };

        const rawElements = [
            "1,Hydrogen,H,1.008,1,1", "2,Helium,He,4.0026,1,18", "3,Lithium,Li,6.94,2,1", "4,Beryllium,Be,9.0122,2,2", "5,Boron,B,10.81,2,13", "6,Carbon,C,12.011,2,14", "7,Nitrogen,N,14.007,2,15", "8,Oxygen,O,15.999,2,16", "9,Fluorine,F,18.998,2,17", "10,Neon,Ne,20.180,2,18",
            "11,Sodium,Na,22.990,3,1", "12,Magnesium,Mg,24.305,3,2", "13,Aluminum,Al,26.982,3,13", "14,Silicon,Si,28.085,3,14", "15,Phosphorus,P,30.974,3,15", "16,Sulfur,S,32.06,3,16", "17,Chlorine,Cl,35.45,3,17", "18,Argon,Ar,39.95,3,18", "19,Potassium,K,39.098,4,1", "20,Calcium,Ca,40.078,4,2",
            "21,Scandium,Sc,44.956,4,3", "22,Titanium,Ti,47.867,4,4", "23,Vanadium,V,50.942,4,5", "24,Chromium,Cr,51.996,4,6", "25,Manganese,Mn,54.938,4,7", "26,Iron,Fe,55.845,4,8", "27,Cobalt,Co,58.933,4,9", "28,Nickel,Ni,58.693,4,10", "29,Copper,Cu,63.546,4,11", "30,Zinc,Zn,65.38,4,12",
            "31,Gallium,Ga,69.723,4,13", "32,Germanium,Ge,72.630,4,14", "33,Arsenic,As,74.922,4,15", "34,Selenium,Se,78.971,4,16", "35,Bromine,Br,79.904,4,17", "36,Krypton,Kr,83.798,4,18", "37,Rubidium,Rb,85.468,5,1", "38,Strontium,Sr,87.62,5,2", "39,Yttrium,Y,88.906,5,3", "40,Zirconium,Zr,91.224,5,4",
            "41,Niobium,Nb,92.906,5,5", "42,Molybdenum,Mo,95.95,5,6", "43,Technetium,Tc,98,5,7", "44,Ruthenium,Ru,101.07,5,8", "45,Rhodium,Rh,102.91,5,9", "46,Palladium,Pd,106.42,5,10", "47,Silver,Ag,107.87,5,11", "48,Cadmium,Cd,112.41,5,12", "49,Indium,In,114.82,5,13", "50,Tin,Sn,118.71,5,14",
            "51,Antimony,Sb,121.76,5,15", "52,Tellurium,Te,127.60,5,16", "53,Iodine,I,126.90,5,17", "54,Xenon,Xe,131.29,5,18", "55,Cesium,Cs,132.91,6,1", "56,Barium,Ba,137.33,6,2", "57,Lanthanum,La,138.91,6,3", "58,Cerium,Ce,140.12,6,N/A", "59,Praseodymium,Pr,140.91,6,N/A", "60,Neodymium,Nd,144.24,6,N/A",
            "61,Promethium,Pm,145,6,N/A", "62,Samarium,Sm,150.36,6,N/A", "63,Europium,Eu,151.96,6,N/A", "64,Gadolinium,Gd,157.25,6,N/A", "65,Terbium,Tb,158.93,6,N/A", "66,Dysprosium,Dy,162.50,6,N/A", "67,Holmium,Ho,164.93,6,N/A", "68,Erbium,Er,167.26,6,N/A", "69,Thulium,Tm,168.93,6,N/A", "70,Ytterbium,Yb,173.05,6,N/A",
            "71,Lutetium,Lu,174.97,6,3", "72,Hafnium,Hf,178.49,6,4", "73,Tantalum,Ta,180.95,6,5", "74,Tungsten,W,183.84,6,6", "75,Rhenium,Re,186.21,6,7", "76,Osmium,Os,190.23,6,8", "77,Iridium,Ir,192.22,6,9", "78,Platinum,Pt,195.08,6,10", "79,Gold,Au,196.97,6,11", "80,Mercury,Hg,200.59,6,12",
            "81,Thallium,Tl,204.38,6,13", "82,Lead,Pb,207.2,6,14", "83,Bismuth,Bi,208.98,6,15", "84,Polonium,Po,209,6,16", "85,Astatine,At,210,6,17", "86,Radon,Rn,222,6,18", "87,Francium,Fr,223,7,1", "88,Radium,Ra,226,7,2", "89,Actinium,Ac,227,7,3", "90,Thorium,Th,232.04,7,N/A",
            "91,Protactinium,Pa,231.04,7,N/A", "92,Uranium,U,238.03,7,N/A", "93,Neptunium,Np,237,7,N/A", "94,Plutonium,Pu,244,7,N/A", "95,Americium,Am,243,7,N/A", "96,Curium,Cm,247,7,N/A", "97,Berkelium,Bk,247,7,N/A", "98,Californium,Cf,251,7,N/A", "99,Einsteinium,Es,252,7,N/A", "100,Fermium,Fm,257,7,N/A",
            "101,Mendelevium,Md,258,7,N/A", "102,Nobelium,No,259,7,N/A", "103,Lawrencium,Lr,266,7,3", "104,Rutherfordium,Rf,267,7,4", "105,Dubnium,Db,268,7,5", "106,Seaborgium,Sg,269,7,6", "107,Bohrium,Bh,270,7,7", "108,Hassium,Hs,277,7,8", "109,Meitnerium,Mt,278,7,9", "110,Darmstadtium,Ds,281,7,10",
            "111,Roentgenium,Rg,282,7,11", "112,Copernicium,Cn,285,7,12", "113,Nihonium,Nh,286,7,13", "114,Flerovium,Fl,289,7,14", "115,Moscovium,Mc,290,7,15", "116,Livermorium,Lv,293,7,16", "117,Tennessine,Ts,294,7,17", "118,Oganesson,Og,294,7,18"
        ];

        const elementsData = rawElements.map(row => {
            const parts = row.split(',');
            const num = parseInt(parts[0]);
            return {
                number: num,
                name: parts[1],
                symbol: parts[2],
                weight: parts[3],
                period: parts[4],
                group: parts[5],
                mnemonic: customMnemonics[num] || "No common mnemonic for this element."
            };
        });

        // --- Game State ---
        let deck = [];
        let currentSlideIndex = 0;
        let inputsCompleted = 0;
        let isNextState = false;

        // UI Elements
        const modeSelect = document.getElementById('modeSelect');
        const restartBtn = document.getElementById('restartBtn');
        const promptLabel = document.getElementById('promptLabel');
        const promptValue = document.getElementById('promptValue');
        const inputsContainer = document.getElementById('inputsContainer');
        const infoPanel = document.getElementById('infoPanel');
        const infoStats = document.getElementById('infoStats');
        const mnemonicText = document.getElementById('mnemonicText');
        const nextBtn = document.getElementById('nextBtn');
        const countValue = document.getElementById('countValue');
        const gameUI = document.getElementById('gameUI');
        const completionScreen = document.getElementById('completionScreen');

        // --- Core Logic ---
        function initDeck() {
            const mode = modeSelect.value;
            deck = [];
            
            // Filter elements based on mode
            const activeElements = mode === 'common' 
                ? elementsData.filter(e => commonElementNumbers.includes(e.number))
                : elementsData;

            // Generate 3 slides per element
            activeElements.forEach(el => {
                deck.push({ element: el, promptType: 'name', answers: ['symbol', 'number'] });
                deck.push({ element: el, promptType: 'symbol', answers: ['name', 'number'] });
                deck.push({ element: el, promptType: 'number', answers: ['name', 'symbol'] });
            });

            // Shuffle Deck
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            currentSlideIndex = 0;
            gameUI.style.display = 'flex';
            completionScreen.style.display = 'none';
            loadSlide();
        }

        function loadSlide() {
            if (currentSlideIndex >= deck.length) {
                gameUI.style.display = 'none';
                completionScreen.style.display = 'flex';
                countValue.innerText = `0 out of ${deck.length}`;
                return;
            }

            const slide = deck[currentSlideIndex];
            const el = slide.element;
            
            inputsCompleted = 0;
            isNextState = false;
            infoPanel.classList.remove('visible');
            countValue.innerText = `${deck.length - currentSlideIndex} out of ${deck.length}`;

            // Setup Prompt
            promptLabel.innerText = slide.promptType;
            promptValue.innerText = el[slide.promptType];

            // Setup Inputs
            inputsContainer.innerHTML = '';
            slide.answers.forEach((ansType, index) => {
                const group = document.createElement('div');
                group.className = 'input-group';
                
                const label = document.createElement('div');
                label.className = 'input-label';
                label.innerText = ansType.charAt(0).toUpperCase() + ansType.slice(1);
                
                const input = document.createElement('input');
                input.type = ansType === 'number' ? 'number' : 'text';
                input.dataset.targetType = ansType;
                input.dataset.targetValue = el[ansType];
                input.autocomplete = "off";

                // Auto-check as the user types
                input.addEventListener('input', () => {
                    const expected = input.dataset.targetValue.toString().toLowerCase();
                    const actual = input.value.trim().toLowerCase();
                    if (actual === expected) {
                        markInputCorrect(input);
                    }
                });

                // Listen for Enter key to show error shakes, but stop event from bubbling
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.stopPropagation(); // Prevents the main page from seeing this Enter keypress!
                        
                        const expected = input.dataset.targetValue.toString().toLowerCase();
                        const actual = input.value.trim().toLowerCase();
                        
                        if (actual !== expected && actual !== "") {
                            showInputError(input);
                        } else if (actual === expected) {
                            markInputCorrect(input); // Redundancy catch just in case
                        }
                    }
                });

                group.appendChild(label);
                group.appendChild(input);
                inputsContainer.appendChild(group);

                // Auto focus first input
                if (index === 0) {
                    setTimeout(() => input.focus(), 50);
                }
            });
        }

        function markInputCorrect(inputObj) {
            if (!inputObj.disabled) {
                inputObj.classList.remove('error');
                inputObj.classList.add('correct');
                inputObj.disabled = true;
                inputsCompleted++;
                checkSlideCompletion();
                
                // Focus next available input if any
                const nextInput = Array.from(document.querySelectorAll('input:not(:disabled)')).find(i => i !== inputObj);
                if (nextInput) nextInput.focus();
            }
        }

        function showInputError(inputObj) {
            inputObj.classList.remove('error');
            void inputObj.offsetWidth; // trigger reflow to reset animation
            inputObj.classList.add('error');
            inputObj.value = ''; // clear for retry
        }

        function checkSlideCompletion() {
            if (inputsCompleted === 2) {
                isNextState = true;
                const el = deck[currentSlideIndex].element;
                
                infoStats.innerHTML = `Weight: <span>${el.weight}</span> | Row (Period): <span>${el.period}</span> | Column (Group): <span>${el.group}</span>`;
                mnemonicText.innerText = el.mnemonic;
                
                infoPanel.classList.add('visible');
                nextBtn.focus();
            }
        }

        function goNext() {
            if (isNextState) {
                currentSlideIndex++;
                loadSlide();
            }
        }

        // --- Event Listeners ---
        modeSelect.addEventListener('change', initDeck);
        restartBtn.addEventListener('click', initDeck);
        nextBtn.addEventListener('click', goNext);

        // Global Enter listener for next button
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && isNextState) {
                e.preventDefault();
                goNext();
            }
        });

        // Focus fallback: clicking background refocuses empty inputs
        document.addEventListener('click', (e) => {
            if (!isNextState && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'BUTTON') {
                const openInput = document.querySelector('input:not(:disabled)');
                if (openInput) openInput.focus();
            }
        });

        // Initialize App
        initDeck();

    </script>
</body>
</html>
