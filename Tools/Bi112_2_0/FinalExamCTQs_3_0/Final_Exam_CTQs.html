<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Final Exam CTQs</title>
    <link rel="icon" href="../../../Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../../Global/Css/main.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        /* Utility Buttons */
        .action-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.8rem 1.5rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }
        .hint-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.4rem 0.8rem; font-family: var(--font-family-mono); font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .hint-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* CTQ Styles */
        .ctq-prompt { font-size: 1.15rem; line-height: 1.6; margin-bottom: 1rem; color: var(--accent); font-weight: bold; }
        
        .difficulty-selector { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--text-muted); padding-bottom: 1rem; }
        .difficulty-selector button { background: none; border: 1px solid var(--text-muted); color: var(--text-muted); font-family: var(--font-family-mono); font-size: 0.85rem; padding: 0.4rem 0.8rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .difficulty-selector button.active, .difficulty-selector button:hover { border-color: var(--accent); color: var(--accent); }
        
        .ctq-nav-bar { display: flex; gap: 0.5rem; margin-top: 2rem; border-top: 1px solid var(--text-muted); padding-top: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .ctq-nav-bar button { background: none; border: 1px solid var(--text-muted); color: var(--text-muted); font-family: var(--font-family-mono); font-size: 0.9rem; padding: 0.4rem 0.8rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .ctq-nav-bar button.active { border-color: var(--accent); background: var(--hover-bg); color: var(--accent); }

        textarea {
            width: 100%; height: 160px; background: transparent; border: 2px solid var(--text-muted);
            color: var(--text-main); font-family: var(--font-family-mono); font-size: 1rem; padding: 1rem;
            border-radius: 4px; resize: vertical; outline: none; box-sizing: border-box; line-height: 1.5;
        }
        textarea:focus { border-color: var(--accent); }

        /* Cloze Styles */
        .cloze-text { font-size: 1.1rem; line-height: 2; color: var(--text-main); white-space: pre-wrap; }
        .cloze-input {
            background: transparent; border: none; border-bottom: 2px solid var(--text-muted);
            color: var(--accent); font-family: var(--font-family-mono); font-size: 1.1rem; text-align: center;
            outline: none; margin: 0 0.3rem; transition: border-color 0.2s; font-weight: bold;
        }
        .cloze-input:focus { border-bottom-color: var(--accent); }
        .cloze-input.correct { border-bottom-color: var(--success); color: var(--success); }
        .cloze-input.wrong { border-bottom-color: var(--error); color: var(--error); }
        
        .word-bank {
            margin-top: 1.5rem; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 4px;
            display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; border: 1px solid var(--text-muted);
        }
        .wb-chip { background: var(--bg-color); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.95rem; color: var(--text-main); border: 1px solid var(--text-muted); font-family: var(--font-family-mono); }

        /* Warm-up MCQ */
        .warmup-box { margin-top: 1.5rem; padding: 1.5rem; border: 1px dashed var(--text-muted); border-radius: 4px; display: none; background: rgba(0,0,0,0.1); }
        .warmup-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .option-btn { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); text-align: left; padding: 1rem; font-family: var(--font-family-mono); font-size: 0.95rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: rgba(140, 200, 75, 0.1); }
        .option-btn.wrong { border-color: var(--error); color: var(--error); background: rgba(202, 71, 84, 0.1); }
        .option-btn:disabled { cursor: default; }

        /* Pre-Submit Glossary */
        .pre-submit-glossary-container { margin-top: 2rem; background: rgba(0,0,0,0.2); border: 1px solid var(--text-muted); border-radius: 4px; padding: 1.5rem; }
        .pre-submit-title { font-weight: bold; color: var(--accent); margin-bottom: 1rem; font-size: 1rem; text-transform: uppercase; }

        /* Feedback Area */
        .feedback { margin-top: 1.5rem; padding: 1.5rem; border-radius: 4px; display: none; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent); }
        
        /* BULLETPROOF NATIVE HTML DETAILS/SUMMARY GLOSSARY */
        .keyword-details {
            margin-bottom: 0.5rem;
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            border-radius: 4px;
            padding: 0.8rem;
        }
        .keyword-summary {
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
            user-select: none;
            font-family: var(--font-family-mono);
        }
        .keyword-summary:hover { opacity: 0.8; color: var(--accent); }
        .text-success { color: var(--success); }
        .text-error { color: var(--error); }
        .text-neutral { color: var(--text-main); }
        .keyword-def-text {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px dashed var(--text-muted);
            color: var(--text-main);
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .full-answer { margin-top: 1.5rem; font-size: 1rem; color: var(--text-main); border-top: 1px solid var(--text-muted); padding-top: 1.5rem; white-space: pre-wrap; line-height: 1.6; }
        
        @media (max-width: 800px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Final Exam CTQs</h1>
    <div class="subtitle">Scenario-Based Practice Assessor</div>

    <div class="container">
        
        <div class="difficulty-selector">
            <button id="lvl-1" onclick="setDifficulty(1)" class="active">Lvl 1: Word Bank</button>
            <button id="lvl-2" onclick="setDifficulty(2)">Lvl 2: Fill-in-Blank</button>
            <button id="lvl-3" onclick="setDifficulty(3)">Lvl 3: Exam Simulator</button>
        </div>

        <div class="ctq-prompt" id="ctq-q">Loading...</div>
        
        <button class="hint-btn" style="margin-bottom:1rem;" onclick="toggleWarmup()">💡 Need a Hint? Try a Warm-up Question</button>
        <div class="warmup-box" id="warmup-box">
            <div class="warmup-controls">
                <div style="color: var(--accent); font-size: 0.9rem; font-weight: bold;">Warm-up Hint:</div>
                <button class="hint-btn" style="margin: 0; border-color: var(--text-muted);" onclick="loadRandomWarmup()">🔄 Shuffle Hint</button>
            </div>
            <div id="warmup-q" style="margin-bottom: 1.5rem; font-size: 1.1rem; line-height: 1.4;"></div>
            <div class="options-grid" id="warmup-opts"></div>
        </div>

        <div id="ctq-input-area" style="margin-top: 1.5rem;"></div>

        <div style="margin-top: 1.5rem;">
            <button class="action-btn" onclick="checkCTQ()">Submit Answer</button>
        </div>
        
        <div class="feedback" id="ctq-feedback">
            <div style="margin-bottom: 0.5rem; font-size: 1.2rem; color: var(--text-main); font-weight: bold;" id="feedback-title"></div>
            <div style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem;">Click any keyword below to expand its definition.</div>
            
            <div id="ctq-badges"></div>
            
            <div class="full-answer" id="ctq-actual"></div>
        </div>

        <div class="pre-submit-glossary-container">
            <div class="pre-submit-title">📚 Pre-Study Glossary (Click to Expand)</div>
            <div id="pre-submit-badges"></div>
        </div>

        <div class="ctq-nav-bar">
            <button id="nav-ctq-0" onclick="goToCTQ(0)">CTQ 1 (Mitosis/Meiosis)</button>
            <button id="nav-ctq-1" onclick="goToCTQ(1)">CTQ 2 (Karyotype)</button>
            <button id="nav-ctq-2" onclick="goToCTQ(2)">CTQ 3 (Pea Plants)</button>
            <button id="nav-ctq-3" onclick="goToCTQ(3)">CTQ 4 (Color Blindness)</button>
            <button id="nav-ctq-4" onclick="goToCTQ(4)">CTQ 5 (Replication)</button>
            <button id="nav-ctq-5" onclick="goToCTQ(5)">CTQ 6 (Protein)</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const glossary = {
            "diploid": "A cell containing two sets of chromosomes (2n), one set inherited from each parent.",
            "46": "The normal euploid number of chromosomes in a human somatic (body) cell.",
            "haploid": "A cell containing only one set of chromosomes (n), such as sperm or egg cells.",
            "23": "The haploid number of chromosomes found in a human gamete.",
            "fertilization": "The fusion of a haploid sperm and a haploid egg, which restores the normal diploid chromosome number in the zygote.",
            "nondisjunction": "The failure of homologous chromosomes or sister chromatids to separate properly during meiosis.",
            "separate": "The physical action that chromosomes must take during anaphase to ensure euploid (normal) gametes.",
            "meiosis": "A special type of cell division that reduces chromosome number by half to produce four genetically unique gametes.",
            "gamete": "A reproductive cell (sperm or egg) that is haploid.",
            "trisomy 21": "Also known as Down Syndrome, characterized by a zygote having three copies of chromosome 21 after fertilization.",
            "dominant": "An allele whose trait always shows up in the organism when the allele is present, completely masking a recessive allele.",
            "recessive": "An allele whose phenotypic effect is masked by a dominant allele and only appears if the organism is homozygous recessive.",
            "heterozygous": "Having two different alleles at a given locus for a specific gene (e.g., Pp).",
            "f1": "The first filial generation of offspring obtained from an experimental cross of two true-breeding (homozygous) parents.",
            "3:1": "The classic phenotypic ratio (dominant to recessive) expected in the F2 generation of a Mendelian monohybrid cross.",
            "f2": "The second filial generation, resulting from the cross of two F1 individuals.",
            "x chromosome": "One of the sex chromosomes. Males have only one, meaning a single recessive allele on this chromosome will always be expressed.",
            "carrier": "A heterozygous individual who has one normal allele and one recessive disease allele (e.g., X^NX^n) but does not display the disease phenotype.",
            "50%": "The probability that a carrier mother will pass her mutated X-linked allele to her son.",
            "lagging strand": "The newly forming DNA strand that must be replicated discontinuously away from the replication fork.",
            "okazaki fragments": "Short segments of DNA synthesized discontinuously on the lagging strand.",
            "ligase": "An essential enzyme that functions to bond or seal the gaps between adjacent Okazaki fragments.",
            "bond": "The strong covalent connection that DNA ligase creates between adjacent DNA nucleotides to make the backbone continuous.",
            "fragmented": "The broken state the lagging strand would remain in if DNA ligase failed to seal the gaps.",
            "transcribed": "The process where DNA is copied into mRNA inside the nucleus by RNA polymerase.",
            "ribosomes": "Cellular machinery in the cytoplasm where translation occurs; they read the mRNA instructions to build proteins.",
            "codons": "A sequence of three nucleotides on an mRNA strand that codes for one specific amino acid.",
            "trna": "Transfer RNA; molecules that carry specific amino acids to the ribosome and match their anticodons to the mRNA codons.",
            "amino acids": "The fundamental building blocks of proteins, carried to the ribosome by tRNA.",
            "peptide bonds": "The chemical bonds formed between amino acids in the ribosome to build a polypeptide chain.",
            "genetic code": "The universal set of rules by which information encoded in mRNA codons is translated into a specific amino acid sequence."
        };

        const ctqs = [
            { 
                q: "1. Maria's Cells\nMaria is studying skin cells and egg cells. One of her skin cells contains 46 chromosomes. Explain how mitosis maintains chromosome number and how meiosis changes chromosome number when producing egg cells. Why is this important?",
                template: "Mitosis produces two genetically identical [diploid] daughter cells with [46] chromosomes to maintain the somatic tissue. Meiosis reduces the chromosome number by half, producing [haploid] gametes with [23] chromosomes. This reduction is important because [fertilization] of an egg by a sperm restores the normal diploid number. If meiosis didn't occur, the chromosome number would double every generation.",
                ans: "Mitosis produces two genetically identical diploid daughter cells with 46 chromosomes for growth and repair. Meiosis reduces the chromosome number by half, producing haploid gametes (eggs) with 23 chromosomes. This is critical because fertilization restores the diploid number (46).",
                keywords: ["diploid", "46", "haploid", "23", "fertilization"],
                warmups: [
                    { q: "What does it mean if a cell is described as diploid (2n)?", opts: ["It contains two sets of chromosomes, one inherited from each parent.", "It contains only one set of chromosomes.", "It is a gamete.", "It has replicated its DNA but not divided."], ans: 0 },
                    { q: "Why must egg and sperm cells be produced through meiosis instead of mitosis?", opts: ["To ensure they are haploid, so fertilization results in a normal diploid zygote.", "To ensure they are diploid clones of the parent.", "To allow them to undergo binary fission.", "To prevent crossing over from occurring."], ans: 0 }
                ]
            },
            {
                q: "2. Tyler's Karyotype\nTyler learns that his cousin has Down syndrome. Explain how nondisjunction during meiosis can lead to trisomy 21. Include the terms meiosis, gamete, fertilization, and chromosome number.",
                template: "[Nondisjunction] occurs when homologous chromosomes or sister chromatids fail to [separate] properly during [meiosis]. As a result, a [gamete] may receive an extra chromosome 21. After [fertilization] with a normal gamete, the resulting zygote has three copies of chromosome 21, resulting in an abnormal chromosome number known as [trisomy 21].",
                ans: "Nondisjunction occurs when chromosomes fail to separate during meiosis. A gamete may receive an extra chromosome 21. After fertilization, the zygote has three copies of chromosome 21 (trisomy 21).",
                keywords: ["nondisjunction", "separate", "meiosis", "gamete", "fertilization", "trisomy 21"],
                warmups: [
                    { q: "What is the specific mechanical failure that causes nondisjunction?", opts: ["Homologous chromosomes or sister chromatids failing to separate properly during anaphase.", "DNA polymerase making an error during the S phase.", "The cell skipping the G2 checkpoint.", "A deletion of a segment on chromosome 5."], ans: 0 },
                    { q: "If an abnormal gamete with 24 chromosomes fuses with a normal gamete with 23 chromosomes, what is the result?", opts: ["A zygote with 47 chromosomes, which is an example of aneuploidy.", "A normal diploid zygote with 46 chromosomes.", "A haploid cell.", "A cell that will undergo apoptosis instantly."], ans: 0 }
                ]
            },
            {
                q: "3. Beth's Pea Plants\nBeth crosses a pure-breeding purple-flowered pea plant with a pure-breeding white-flowered pea plant. The F1 generation is all purple. Explain Mendel's Law of Dominance and predict the phenotypic ratio expected in the F2 generation.",
                template: "Mendel's Law of Dominance states that the [dominant] allele (purple) completely masks the [recessive] allele (white) in a heterozygote. Crossing PP x pp produces all [heterozygous] Pp offspring in the [F1] generation. Crossing two F1 plants (Pp x Pp) results in a [3:1] phenotypic ratio of purple to white in the [F2] generation.",
                ans: "The purple allele is dominant and masks the white recessive allele. Crossing PP × pp produces all heterozygous Pp offspring in F1. Crossing F1 plants gives a 3:1 purple to white phenotypic ratio in the F2 generation.",
                keywords: ["dominant", "recessive", "heterozygous", "f1", "3:1", "f2"],
                warmups: [
                    { q: "If a plant's genotype is 'Pp', how would you describe it?", opts: ["Heterozygous", "Homozygous Dominant", "Homozygous Recessive", "True-breeding"], ans: 0 },
                    { q: "In a standard Mendelian monohybrid cross of two heterozygous parents (Pp x Pp), what percentage of the offspring will display the dominant phenotype?", opts: ["75% (A 3:1 ratio)", "100%", "50%", "25%"], ans: 0 }
                ]
            },
            {
                q: "4. Alex and Color Blindness\nAlex has normal vision, but his mother is a carrier for red-green color blindness. Explain why X-linked recessive traits are more common in males and determine Alex's chance of being color blind.",
                template: "Males have only one [X chromosome], so a single [recessive] allele is always expressed because there is no second X to mask it. If the mother is a [carrier] and the father has normal vision, Alex has exactly a [50%] chance of receiving the color blind allele from his mother.",
                ans: "Males have only one X chromosome, so a single recessive allele is expressed. If the mother is a carrier and the father has normal vision, there is a 50% chance a son will be color blind.",
                keywords: ["x chromosome", "recessive", "carrier", "50%"],
                warmups: [
                    { q: "Why are females (XX) less likely to suffer from X-linked recessive disorders?", opts: ["They have two X chromosomes, meaning a healthy dominant allele on one can mask the recessive mutated allele on the other.", "They do not inherit X chromosomes from their fathers.", "X-inactivation destroys the mutated allele.", "They only inherit autosomal traits."], ans: 0 },
                    { q: "If a mother is a carrier for an X-linked recessive trait, what does that mean?", opts: ["She is heterozygous; she carries one mutated allele but does not display the trait herself.", "She displays the trait and will pass it to 100% of her children.", "She has a mutation on her Y chromosome.", "She is homozygous recessive."], ans: 0 }
                ]
            },
            {
                q: "5. Sally's DNA Replication Problem\nA mutation prevents DNA ligase from functioning properly. Describe what role ligase normally plays in DNA replication and predict what would happen to the lagging strand if ligase were absent.",
                template: "DNA replication is antiparallel, so the [lagging strand] must be built discontinuously in short segments called [Okazaki fragments]. Normally, the enzyme DNA [ligase] functions to seal or [bond] the gaps between these adjacent fragments. Without it, the lagging strand remains [fragmented] and replication cannot be properly completed.",
                ans: "DNA ligase joins adjacent Okazaki fragments on the lagging strand. Without ligase, the lagging strand remains fragmented and DNA replication cannot be completed properly.",
                keywords: ["lagging strand", "okazaki fragments", "ligase", "bond", "fragmented"],
                warmups: [
                    { q: "Because DNA polymerase can only add nucleotides to a 3' end, the lagging strand must be built in short segments known as:", opts: ["Okazaki fragments", "Leading strands", "Replication forks", "Promoters"], ans: 0 },
                    { q: "Which enzyme is directly responsible for making new covalent bonds between adjacent nucleotides to seal the DNA backbone?", opts: ["DNA Ligase", "Helicase", "Primase", "Topoisomerase"], ans: 0 }
                ]
            },
            {
                q: "6. From DNA to Protein\nA liver cell needs to produce an enzyme. Starting with DNA, explain how the cell uses transcription and translation to make the protein. Include the roles of mRNA, tRNA, ribosomes, codons, and amino acids.",
                template: "First, DNA is [transcribed] into mRNA inside the nucleus. The mRNA travels to the cytoplasm where [ribosomes] read the mRNA sequence in three-letter sets called [codons]. Then, [tRNA] molecules bring the correct [amino acids] to the ribosome, matching their anticodons to the mRNA. Finally, [peptide bonds] form between the amino acids to build the protein according to the [genetic code].",
                ans: "DNA is transcribed into mRNA. In eukaryotes, mRNA is processed and leaves the nucleus. Ribosomes read mRNA codons, tRNAs bring amino acids, and peptide bonds form a protein according to the genetic code.",
                keywords: ["transcribed", "ribosomes", "codons", "trna", "amino acids", "peptide bonds", "genetic code"],
                warmups: [
                    { q: "Where does the process of Transcription occur within a eukaryotic cell?", opts: ["Inside the Nucleus", "At the Ribosome", "In the Cytoplasm", "On the Cell Membrane"], ans: 0 },
                    { q: "What is the specific role of tRNA during Translation?", opts: ["To carry specific amino acids to the ribosome by matching its anticodon to the mRNA codon.", "To copy the DNA sequence.", "To unzip the double helix.", "To form the structure of the ribosome."], ans: 0 }
                ]
            }
        ];

        // --- STATE ---
        let ctqIndex = 0;
        let currentDifficulty = 1;
        let currentWarmupIndex = -1;

        // --- UTILS ---
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function setDifficulty(lvl) {
            currentDifficulty = lvl;
            [1, 2, 3].forEach(i => document.getElementById(`lvl-${i}`).classList.toggle('active', i === lvl));
            loadCTQ();
        }

        function toggleWarmup() {
            const box = document.getElementById('warmup-box');
            if (box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
                if(currentWarmupIndex === -1) loadRandomWarmup();
            }
        }

        function loadRandomWarmup() {
            const qData = ctqs[ctqIndex];
            
            if (qData.warmups.length > 1) {
                let newIdx = currentWarmupIndex;
                while (newIdx === currentWarmupIndex) {
                    newIdx = Math.floor(Math.random() * qData.warmups.length);
                }
                currentWarmupIndex = newIdx;
            } else {
                currentWarmupIndex = 0;
            }
            
            const warmup = qData.warmups[currentWarmupIndex];
            
            document.getElementById('warmup-q').innerText = warmup.q;
            const wOpts = document.getElementById('warmup-opts');
            wOpts.innerHTML = '';
            
            let wOptsWithIndex = warmup.opts.map((opt, i) => ({text: opt, originalIndex: i}));
            wOptsWithIndex = shuffleArray(wOptsWithIndex);

            wOptsWithIndex.forEach((optObj) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optObj.text;
                btn.onclick = () => {
                    const allWBtns = document.querySelectorAll('#warmup-opts .option-btn');
                    allWBtns.forEach(b => { b.disabled = true; b.onclick = null; });
                    
                    if(optObj.originalIndex === warmup.ans) { 
                        btn.classList.add('correct'); 
                    } else { 
                        btn.classList.add('wrong'); 
                        const correctIdx = wOptsWithIndex.findIndex(o => o.originalIndex === warmup.ans);
                        wOpts.children[correctIdx].classList.add('correct'); 
                    }
                };
                wOpts.appendChild(btn);
            });
        }

        function goToCTQ(index) {
            ctqIndex = index;
            loadCTQ();
        }

        function loadCTQ() {
            const qData = ctqs[ctqIndex];
            currentWarmupIndex = -1; 
            
            // Update Nav Bar UI
            for(let i=0; i<6; i++) {
                const btn = document.getElementById(`nav-ctq-${i}`);
                if(i === ctqIndex) { btn.classList.add('active'); }
                else { btn.classList.remove('active'); }
            }

            // Reset UI
            document.getElementById('ctq-q').innerText = qData.q;
            document.getElementById('ctq-feedback').style.display = 'none';
            document.getElementById('warmup-box').style.display = 'none';

            // Load Pre-Submit Glossary
            const preSubmitContainer = document.getElementById('pre-submit-badges');
            preSubmitContainer.innerHTML = '';
            
            let sortedKeywords = [...qData.keywords].sort();
            sortedKeywords.forEach(kw => {
                createDetailsElement(kw, null, preSubmitContainer, true);
            });

            // Load Input Area
            const area = document.getElementById('ctq-input-area');
            area.innerHTML = '';

            if (currentDifficulty === 3) {
                area.innerHTML = `<textarea id="ctq-textarea" placeholder="Exam Simulator: Type out your full, comprehensive answer here from memory..."></textarea>`;
            } else {
                let html = `<div class="cloze-text">` + qData.template.replace(/\[(.*?)\]/g, (match, p1) => {
                    const width = p1.length * 12 + 25; 
                    return `<input type="text" class="cloze-input" data-ans="${p1}" style="width: ${width}px;">`;
                }) + `</div>`;
                
                if (currentDifficulty === 1) {
                    let words = [...qData.template.matchAll(/\[(.*?)\]/g)].map(m => m[1]);
                    words = shuffleArray(words);
                    let bankHtml = `<div class="word-bank">` + words.map(w => `<span class="wb-chip">${w}</span>`).join('') + `</div>`;
                    html += bankHtml;
                }
                area.innerHTML = html;
            }
        }

        function checkCTQ() {
            const qData = ctqs[ctqIndex];
            document.getElementById('ctq-feedback').style.display = 'block';
            
            // Appending Teacher Rubric Answer
            document.getElementById('ctq-actual').innerHTML = `<strong style="color:var(--accent);">Teacher's Brief Rubric Answer:</strong>\n${qData.ans}`;

            const badgesDiv = document.getElementById('ctq-badges');
            badgesDiv.innerHTML = ''; // Clear previous

            if (currentDifficulty === 3) {
                document.getElementById('feedback-title').innerHTML = "Keyword Analysis:";
                const input = document.getElementById('ctq-textarea').value.toLowerCase();
                
                qData.keywords.forEach(kw => {
                    const isFound = input.includes(kw.toLowerCase());
                    createDetailsElement(kw, isFound, badgesDiv, false);
                });
            } else {
                document.getElementById('feedback-title').innerHTML = "Fill-in-the-Blank Results:";
                const inputs = document.querySelectorAll('.cloze-input');
                
                inputs.forEach(inp => {
                    const correctAns = inp.dataset.ans.toLowerCase();
                    const userAns = inp.value.toLowerCase().trim();
                    const isFound = (userAns === correctAns);
                    
                    if (isFound) {
                        inp.classList.add('correct');
                        inp.classList.remove('wrong');
                    } else {
                        inp.classList.add('wrong');
                        inp.classList.remove('correct');
                        if (!inp.value.includes('(Correct:')) {
                            inp.value = `${inp.value} (Correct: ${inp.dataset.ans})`;
                        }
                    }
                });

                qData.keywords.forEach(kw => {
                    const relatedInput = document.querySelector(`.cloze-input[data-ans="${kw}"]`);
                    let isFound = false;
                    if (relatedInput && relatedInput.classList.contains('correct')) {
                        isFound = true;
                    }
                    createDetailsElement(kw, isFound, badgesDiv, false);
                });
            }
        }

        // Helper function to build the native HTML <details> dropdown
        function createDetailsElement(keyword, isFound, container, isNeutral) {
            const details = document.createElement('details');
            details.className = 'keyword-details';
            
            const summary = document.createElement('summary');
            
            if (isNeutral) {
                summary.className = 'keyword-summary text-neutral';
                summary.innerText = '📖 ' + keyword;
            } else {
                summary.className = 'keyword-summary ' + (isFound ? 'text-success' : 'text-error');
                summary.innerText = (isFound ? '✅ ' : '❌ ') + keyword;
            }
            
            const defDiv = document.createElement('div');
            defDiv.className = 'keyword-def-text';
            defDiv.innerText = glossary[keyword.toLowerCase()] || "Definition not found.";
            
            details.appendChild(summary);
            details.appendChild(defDiv);
            container.appendChild(details);
        }

        // Init
        loadCTQ();
    </script>
</body>
</html>
