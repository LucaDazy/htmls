<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - RNA Transcription Master</title>
    <link rel="icon" href="../../../Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../../Global/Css/main.css">
    <style>
        :root {
            /* Diagram specific colors */
            --dna-color: #5865F2;
            --rna-color: #eb459e;
            --enzyme-color: var(--accent);
            --promoter-color: #23a559;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 1px solid var(--text-muted); padding-bottom: 0.5rem; width: 100%; text-align: center;}

        /* Interactive Diagram Area */
        .diagram-arena {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--text-muted);
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .diagram-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Drop Zones */
        .drop-zone {
            position: absolute;
            border: 2px dashed var(--text-muted);
            background: rgba(50, 52, 55, 0.95);
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
            z-index: 10;
            transform: translate(-50%, -50%);
            padding: 0.4rem;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .drop-zone.drag-over { border-color: var(--accent); background: rgba(165, 104, 157, 0.2); color: var(--accent); transform: translate(-50%, -50%) scale(1.05); }
        .drop-zone.filled { border: 2px solid var(--success); background: var(--bg-color); color: var(--success); }

        /* Draggable Word Bank */
        .word-bank {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            min-height: 80px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px dashed var(--text-muted);
            box-sizing: border-box;
        }

        .draggable-bubble {
            background: var(--bg-color);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.6rem 1rem;
            font-family: var(--font-family-mono);
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .draggable-bubble:active { cursor: grabbing; transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.4); }

        /* Feedback UI */
        .feedback-banner {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s;
            margin-bottom: 1.5rem;
        }
        .feedback-banner.show { opacity: 1; }
        .fb-error { background: rgba(202, 71, 84, 0.2); color: var(--error); border: 2px solid var(--error); }
        .fb-success { background: rgba(140, 200, 75, 0.2); color: var(--success); border: 2px solid var(--success); }
        .drop-zone { font-family: var(--font-family-mono); }

        .reset-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.8rem 1.5rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .reset-btn:hover { border-color: var(--error); color: var(--error); }

        @media (max-width: 900px) {
            .drop-zone { font-size: 0.7rem; padding: 0.2rem; }
        }
    </style>
</head>
<body>

    <h1>RNA Transcription Master</h1>
    <div class="subtitle">Visual Parts Identifier</div>

    <div class="container" id="app-container">
        
        <div class="section-label">Build The Transcription Bubble</div>
        
        <div class="diagram-arena" id="arena">
            <svg class="diagram-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                
                <polyline points="150,275 150,150" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="450,175 450,100" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="650,80 650,40 850,40" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="720,280 850,280" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="500,425 500,530" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="250,470 250,530" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>

                <path d="M 50 300 L 250 300" stroke="var(--dna-color)" stroke-width="16" stroke-linecap="round"/>
                <path d="M 50 300 L 250 300" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="10,10"/>
                
                <path d="M 750 300 L 950 300" stroke="var(--dna-color)" stroke-width="16" stroke-linecap="round"/>
                <path d="M 750 300 L 950 300" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="10,10"/>
                
                <path d="M 250 300 C 400 150, 600 150, 750 300" stroke="var(--dna-color)" stroke-width="8" fill="none"/>
                
                <path d="M 250 300 C 400 450, 600 450, 750 300" stroke="var(--dna-color)" stroke-width="8" fill="none"/>
                
                <rect x="100" y="275" width="100" height="50" rx="8" fill="none" stroke="var(--promoter-color)" stroke-width="6"/>
                
                <ellipse cx="600" cy="300" rx="140" ry="180" fill="var(--enzyme-color)" opacity="0.9"/>
                
                <path d="M 500 420 L 650 370" stroke="var(--rna-color)" stroke-width="10" fill="none" stroke-linecap="round"/>
                <path d="M 500 420 C 400 450, 200 450, 100 520" stroke="var(--rna-color)" stroke-width="10" fill="none" stroke-linecap="round"/>
                
                <circle cx="620" cy="70" r="10" fill="var(--rna-color)"/>
                <circle cx="660" cy="90" r="10" fill="var(--rna-color)"/>
                <circle cx="590" cy="100" r="10" fill="var(--rna-color)"/>
                <circle cx="630" cy="120" r="10" fill="var(--rna-color)"/>

                <text x="60" y="530" fill="var(--rna-color)" font-size="24" font-weight="bold">5'</text>
                
            </svg>

            </div>

        <div class="word-bank" id="bank">
            </div>

        <div class="feedback-banner" id="feedback"></div>
        <button class="reset-btn" onclick="resetDiagram()">Restart Diagram</button>

    </div>

    <script>
        // --- DIAGRAM DATA ---
        const dropZones = [
            { id: "promoter", expected: "Promoter Region", x: "15%", y: "21%", w: "160px", h: "40px" },
            { id: "nontemplate", expected: "Non-Template Strand", x: "45%", y: "13%", w: "180px", h: "40px" },
            { id: "nucleotides", expected: "Free RNA Nucleotides", x: "85%", y: "7%", w: "180px", h: "40px" },
            { id: "polymerase", expected: "RNA Polymerase", x: "85%", y: "47%", w: "160px", h: "40px" },
            { id: "template", expected: "DNA Template Strand", x: "50%", y: "88%", w: "180px", h: "40px" },
            { id: "mrna", expected: "mRNA Transcript", x: "25%", y: "88%", w: "160px", h: "40px" }
        ];

        const wordBank = [
            "Promoter Region", 
            "Non-Template Strand", 
            "Free RNA Nucleotides", 
            "RNA Polymerase", 
            "DNA Template Strand", 
            "mRNA Transcript"
        ];

        // --- DIAGRAM LOGIC ---
        let draggedItem = null;
        let correctCount = 0;

        function initDiagram() {
            correctCount = 0;
            const arena = document.getElementById('arena');
            const bank = document.getElementById('bank');
            
            // Clear existing drop zones
            document.querySelectorAll('.drop-zone').forEach(e => e.remove());
            bank.innerHTML = '';
            
            // Create Drop Zones
            dropZones.forEach(dz => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.innerText = "?";
                zone.dataset.expected = dz.expected;
                zone.style.left = dz.x;
                zone.style.top = dz.y;
                zone.style.width = dz.w;
                zone.style.height = dz.h;

                zone.addEventListener('dragover', e => { e.preventDefault(); if(!zone.classList.contains('filled')) zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', e => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => handleDrop(e, zone));

                arena.appendChild(zone);
            });

            // Create Word Bank
            let shuffledBank = [...wordBank].sort(() => Math.random() - 0.5);
            shuffledBank.forEach((word, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'draggable-bubble';
                bubble.innerText = word;
                bubble.draggable = true;
                bubble.id = `bubble-${index}`;
                
                bubble.addEventListener('dragstart', e => {
                    draggedItem = bubble;
                    setTimeout(() => bubble.style.opacity = '0.5', 0);
                });
                bubble.addEventListener('dragend', e => {
                    draggedItem = null;
                    bubble.style.opacity = '1';
                });

                bank.appendChild(bubble);
            });

            const fb = document.getElementById('feedback');
            fb.className = 'feedback-banner';
            fb.innerText = '';
        }

        function handleDrop(e, zone) {
            e.preventDefault();
            zone.classList.remove('drag-over');
            
            if (!draggedItem || zone.classList.contains('filled')) return;

            const expectedWord = zone.dataset.expected;
            const droppedWord = draggedItem.innerText;
            const fb = document.getElementById('feedback');

            if (droppedWord === expectedWord) {
                // Correct
                zone.innerText = droppedWord;
                zone.classList.add('filled');
                draggedItem.remove(); 
                correctCount++;
                
                fb.innerText = "✅ Correct Match!";
                fb.className = 'feedback-banner show fb-success';
                
                if (correctCount === dropZones.length) {
                    fb.innerText = "🎉 Diagram Fully Conquered! Masterful work.";
                    fb.style.opacity = '1'; 
                }
            } else {
                // Incorrect - Snap back penalty updated per request
                fb.innerText = `❌ Incorrect. This is the ${expectedWord}. Your item snapped back to the deck.`;
                fb.className = 'feedback-banner show fb-error';
            }
            
            setTimeout(() => { if(fb.classList.contains('show') && correctCount !== dropZones.length) fb.classList.remove('show'); }, 2500);
        }

        function resetDiagram() {
            initDiagram();
        }

        // --- INIT ---
        initDiagram();

    </script>
</body>
</html>
