<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - DNA Replication Master</title>
    <link rel="icon" href="../../../Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../../Global/Css/main.css">
    <style>
        :root {
            /* Diagram specific colors */
            --dna-color: #5865F2;
            --rna-color: #eb459e;
            --enzyme-color: var(--accent);
            --topo-color: #23a559;
            --ssb-color: #ed4245;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 1px solid var(--text-muted); padding-bottom: 0.5rem; width: 100%; text-align: center;}

        /* Interactive Diagram Area */
        .diagram-arena {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--text-muted);
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .diagram-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Drop Zones */
        .drop-zone {
            position: absolute;
            border: 2px dashed var(--text-muted);
            background: rgba(50, 52, 55, 0.95);
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
            z-index: 10;
            transform: translate(-50%, -50%);
            padding: 0.4rem;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .drop-zone.drag-over { border-color: var(--accent); background: rgba(165, 104, 157, 0.2); color: var(--accent); transform: translate(-50%, -50%) scale(1.05); }
        .drop-zone.filled { border: 2px solid var(--success); background: var(--bg-color); color: var(--success); }

        /* Draggable Word Bank */
        .word-bank {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            min-height: 80px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px dashed var(--text-muted);
            box-sizing: border-box;
        }

        .draggable-bubble {
            background: var(--bg-color);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.6rem 1rem;
            font-family: var(--font-family-mono);
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .draggable-bubble:active { cursor: grabbing; transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.4); }

        /* Feedback UI */
        .feedback-banner {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s;
            margin-bottom: 1.5rem;
        }
        .feedback-banner.show { opacity: 1; }
        .fb-error { background: rgba(202, 71, 84, 0.2); color: var(--error); border: 2px solid var(--error); }
        .fb-success { background: rgba(140, 200, 75, 0.2); color: var(--success); border: 2px solid var(--success); }
        .drop-zone { font-family: var(--font-family-mono); }

        .reset-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.8rem 1.5rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .reset-btn:hover { border-color: var(--error); color: var(--error); }

        @media (max-width: 900px) {
            .drop-zone { font-size: 0.7rem; padding: 0.2rem; }
        }
    </style>
</head>
<body>

    <h1>DNA Replication Master</h1>
    <div class="subtitle">Visual Parts Identifier</div>

    <div class="container" id="app-container">
        
        <div class="section-label">Build The Replication Fork</div>
        
        <div class="diagram-arena" id="arena">
            <svg class="diagram-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                <polyline points="120,100 120,260" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="470,100 470,225" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="720,100 720,200" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="920,100 920,165" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                
                <polyline points="330,500 330,300" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="460,500 460,390" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="590,500 590,410" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="730,500 730,420" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="850,500 850,440" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="950,500 950,440" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                
                <polyline points="770,300 680,420" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>

                <path d="M 0 300 L 330 300" stroke="var(--dna-color)" stroke-width="16" stroke-linecap="round"/>
                <path d="M 0 300 L 330 300" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="10,10"/>
                
                <path d="M 330 300 C 450 300, 500 150, 1000 150" stroke="var(--dna-color)" stroke-width="8" fill="none"/>
                <path d="M 400 280 C 470 280, 500 170, 1000 170" stroke="var(--success)" stroke-width="8" fill="none"/>
                
                <path d="M 330 300 C 450 300, 500 450, 1000 450" stroke="var(--dna-color)" stroke-width="8" fill="none"/>
                
                <path d="M 1000 430 L 850 430" stroke="var(--success)" stroke-width="8" fill="none"/>
                <path d="M 820 430 L 630 395" stroke="var(--success)" stroke-width="8" fill="none"/>
                <path d="M 630 395 L 560 380" stroke="var(--rna-color)" stroke-width="10" fill="none"/> <ellipse cx="120" cy="300" rx="30" ry="50" fill="none" stroke="var(--topo-color)" stroke-width="12"/>
                
                <polygon points="290,260 370,300 290,340" fill="var(--enzyme-color)"/> 
                
                <circle cx="450" cy="245" r="14" fill="var(--ssb-color)"/>
                <circle cx="490" cy="215" r="14" fill="var(--ssb-color)"/>
                <circle cx="450" cy="355" r="14" fill="var(--ssb-color)"/>
                <circle cx="490" cy="385" r="14" fill="var(--ssb-color)"/>

                <rect x="440" y="360" width="40" height="40" rx="8" fill="var(--enzyme-color)"/> 
                
                <ellipse cx="720" cy="160" rx="50" ry="30" fill="var(--enzyme-color)"/> 
                <ellipse cx="730" cy="415" rx="50" ry="30" fill="var(--enzyme-color)"/> 
                
                <circle cx="835" cy="430" r="18" fill="var(--enzyme-color)"/> 

                <text x="960" y="130" fill="var(--text-muted)" font-size="20" font-weight="bold">3'</text>
                <text x="960" y="200" fill="var(--text-muted)" font-size="20" font-weight="bold">5'</text>
                
                <text x="960" y="415" fill="var(--text-muted)" font-size="20" font-weight="bold">3'</text>
                <text x="960" y="485" fill="var(--text-muted)" font-size="20" font-weight="bold">5'</text>
            </svg>

            </div>

        <div class="word-bank" id="bank">
            </div>

        <div class="feedback-banner" id="feedback"></div>
        <button class="reset-btn" onclick="resetDiagram()">Restart Diagram</button>

    </div>

    <script>
        // --- DIAGRAM DATA ---
        const dropZones = [
            { id: "topo", expected: "Topoisomerase", x: "12%", y: "15%", w: "120px", h: "40px" },
            { id: "ssb", expected: "SSBs", x: "47%", y: "15%", w: "60px", h: "40px" },
            { id: "lead_pol", expected: "DNA Polymerase", x: "72%", y: "15%", w: "140px", h: "40px" },
            { id: "lead_strand", expected: "Leading Strand", x: "92%", y: "15%", w: "130px", h: "40px" },
            
            { id: "heli", expected: "Helicase", x: "33%", y: "85%", w: "100px", h: "40px" },
            { id: "primase", expected: "Primase", x: "46%", y: "85%", w: "100px", h: "40px" },
            { id: "primer", expected: "RNA Primer", x: "59%", y: "85%", w: "110px", h: "40px" },
            { id: "lag_pol", expected: "DNA Polymerase", x: "73%", y: "85%", w: "140px", h: "40px" },
            { id: "ligase", expected: "Ligase", x: "85%", y: "85%", w: "90px", h: "40px" },
            { id: "lag_strand", expected: "Lagging Strand", x: "95%", y: "85%", w: "130px", h: "40px" },
            
            { id: "okazaki", expected: "Okazaki Fragment", x: "77%", y: "48%", w: "150px", h: "40px" }
        ];

        const wordBank = [
            "Topoisomerase", "Helicase", "SSBs", "Primase", "RNA Primer", 
            "Ligase", "Okazaki Fragment", "Leading Strand", "Lagging Strand", 
            "DNA Polymerase", "DNA Polymerase" // Two polymerases for both strands
        ];

        // --- DIAGRAM LOGIC ---
        let draggedItem = null;
        let correctCount = 0;

        function initDiagram() {
            correctCount = 0;
            const arena = document.getElementById('arena');
            const bank = document.getElementById('bank');
            
            // Clear existing elements except SVG
            document.querySelectorAll('.drop-zone').forEach(e => e.remove());
            bank.innerHTML = '';
            
            // Create Drop Zones
            dropZones.forEach(dz => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.innerText = "?";
                zone.dataset.expected = dz.expected;
                zone.style.left = dz.x;
                zone.style.top = dz.y;
                zone.style.width = dz.w;
                zone.style.height = dz.h;

                zone.addEventListener('dragover', e => { e.preventDefault(); if(!zone.classList.contains('filled')) zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', e => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => handleDrop(e, zone));

                arena.appendChild(zone);
            });

            // Create Word Bank
            let shuffledBank = [...wordBank].sort(() => Math.random() - 0.5);
            shuffledBank.forEach((word, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'draggable-bubble';
                bubble.innerText = word;
                bubble.draggable = true;
                bubble.id = `bubble-${index}`;
                
                bubble.addEventListener('dragstart', e => {
                    draggedItem = bubble;
                    setTimeout(() => bubble.style.opacity = '0.5', 0);
                });
                bubble.addEventListener('dragend', e => {
                    draggedItem = null;
                    bubble.style.opacity = '1';
                });

                bank.appendChild(bubble);
            });

            const fb = document.getElementById('feedback');
            fb.className = 'feedback-banner';
            fb.innerText = '';
        }

        function handleDrop(e, zone) {
            e.preventDefault();
            zone.classList.remove('drag-over');
            
            if (!draggedItem || zone.classList.contains('filled')) return;

            const expectedWord = zone.dataset.expected;
            const droppedWord = draggedItem.innerText;
            const fb = document.getElementById('feedback');

            if (droppedWord === expectedWord) {
                zone.innerText = droppedWord;
                zone.classList.add('filled');
                draggedItem.remove(); 
                correctCount++;
                
                fb.innerText = "✅ Correct Match!";
                fb.className = 'feedback-banner show fb-success';
                
                if (correctCount === dropZones.length) {
                    fb.innerText = "🎉 Diagram Fully Conquered! Masterful work.";
                    fb.style.opacity = '1'; 
                }
            } else {
                fb.innerText = `❌ Incorrect. This is the ${expectedWord}. Your item snapped back to the deck.`;
                fb.className = 'feedback-banner show fb-error';
            }
            
            setTimeout(() => { if(fb.classList.contains('show') && correctCount !== dropZones.length) fb.classList.remove('show'); }, 2500);
        }

        function resetDiagram() {
            initDiagram();
        }

        // --- INIT ---
        initDiagram();

    </script>
</body>
</html>
