<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Genetics & Inheritance Master</title>
    <link rel="icon" href="../../../Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../../Global/Css/main.css">
    <style>
        :root {
            --pedigree-affected: var(--accent);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        /* Utility Buttons */
        .action-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.8rem 1.5rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }
        .hint-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.4rem 0.8rem; font-family: var(--font-family-mono); font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .hint-btn:hover { background: var(--accent); color: var(--bg-color); }

        /* MCQ Styles */
        .mcq-arena { margin-top: 1rem; }
        
        .visual-container { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .question-svg { max-width: 350px; width: 100%; background: var(--bg-color); padding: 1rem; border-radius: 8px; border: 1px solid var(--text-muted); }
        
        .mcq-question { font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.5; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .option-btn { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); text-align: left; padding: 1.2rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: rgba(140, 200, 75, 0.1); }
        .option-btn.wrong { border-color: var(--error); color: var(--error); background: rgba(202, 71, 84, 0.1); }
        .option-btn.hint-highlight { border-color: var(--accent); background: rgba(165, 104, 157, 0.1); color: var(--accent); }
        .option-btn:disabled { cursor: default; }
        
        .feedback-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 4px; display: none; line-height: 1.5; font-size: 0.95rem; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent); }
        .progress-text { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); text-align: right; font-family: var(--font-family-mono); }
        .end-screen { text-align: center; display: none; margin-top: 2rem; }
        .end-screen h2 { color: var(--accent); }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 0.5rem;}
        
        @media (max-width: 800px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Genetics & Inheritance</h1>
    <div class="subtitle">Visual Pedigrees, Crosses & Mendelian Laws</div>

    <div class="container">
        <div class="mcq-arena" id="general-mcq-area">
            <div class="header-row">
                <div class="section-label" style="margin-bottom:0;">Inheritance Drill</div>
                <button class="hint-btn" onclick="useHint()">💡 Hint / Recycle</button>
            </div>
            
            <div id="svg-injection-zone" class="visual-container" style="display: none;"></div>
            
            <div class="mcq-question" id="general-mcq-q">Loading...</div>
            <div class="options-grid" id="general-mcq-opts"></div>
            <div id="general-mcq-fb" class="feedback-box"></div>
            <button id="general-mcq-next" class="action-btn" style="display:none; width:100%; margin-top:1rem;" onclick="nextMCQ()">Next Question ➔</button>
            <div class="progress-text" id="general-mcq-prog"></div>
        </div>
        <div id="general-mcq-end" class="end-screen">
            <h2>Deck Conquered!</h2><p id="general-mcq-score"></p>
            <button class="action-btn" onclick="initMCQ()">Restart Deck</button>
        </div>
    </div>

    <script>
        // --- SVG GRAPHIC TEMPLATES ---
        const svgMonohybrid = `
        <svg class="question-svg" viewBox="0 0 200 200">
            <line x1="100" y1="40" x2="100" y2="160" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="40" y1="100" x2="160" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <text x="70" y="30" fill="var(--accent)" text-anchor="middle" font-size="20">P</text>
            <text x="130" y="30" fill="var(--accent)" text-anchor="middle" font-size="20">p</text>
            <text x="25" y="75" fill="var(--accent)" text-anchor="middle" font-size="20">P</text>
            <text x="25" y="135" fill="var(--accent)" text-anchor="middle" font-size="20">p</text>
            <text x="70" y="75" fill="var(--text-main)" text-anchor="middle" font-size="20">PP</text>
            <text x="130" y="75" fill="var(--text-main)" text-anchor="middle" font-size="20">Pp</text>
            <text x="70" y="135" fill="var(--text-main)" text-anchor="middle" font-size="20">Pp</text>
            <text x="130" y="135" fill="var(--error)" text-anchor="middle" font-size="28" font-weight="bold">?</text>
        </svg>`;

        const svgDihybridRatio = `
        <svg class="question-svg" viewBox="0 0 250 250">
            <rect x="25" y="25" width="200" height="200" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="75" y1="25" x2="75" y2="225" stroke="var(--text-main)" stroke-width="1"/>
            <line x1="125" y1="25" x2="125" y2="225" stroke="var(--text-main)" stroke-width="1"/>
            <line x1="175" y1="25" x2="175" y2="225" stroke="var(--text-main)" stroke-width="1"/>
            <line x1="25" y1="75" x2="225" y2="75" stroke="var(--text-main)" stroke-width="1"/>
            <line x1="25" y1="125" x2="225" y2="125" stroke="var(--text-main)" stroke-width="1"/>
            <line x1="25" y1="175" x2="225" y2="175" stroke="var(--text-main)" stroke-width="1"/>
            <text x="125" y="135" fill="var(--accent)" text-anchor="middle" font-size="24" font-weight="bold">AaBb x AaBb</text>
        </svg>`;

        const svgAutosomalRecessive = `
        <svg class="question-svg" viewBox="0 0 300 150">
            <circle cx="100" cy="40" r="15" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <rect x="185" y="25" width="30" height="30" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="115" y1="40" x2="185" y2="40" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="150" y1="40" x2="150" y2="80" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="80" y1="80" x2="220" y2="80" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="80" y1="80" x2="80" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <circle cx="80" cy="115" r="15" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="150" y1="80" x2="150" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <rect x="135" y="100" width="30" height="30" fill="var(--pedigree-affected)" stroke="var(--pedigree-affected)" stroke-width="2"/>
            <line x1="220" y1="80" x2="220" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <rect x="205" y="100" width="30" height="30" fill="none" stroke="var(--text-main)" stroke-width="2"/>
        </svg>`;

        const svgXLinked = `
        <svg class="question-svg" viewBox="0 0 300 150">
            <circle cx="100" cy="40" r="15" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <path d="M 100 25 A 15 15 0 0 0 100 55 Z" fill="var(--text-muted)"/>
            <rect x="185" y="25" width="30" height="30" fill="none" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="115" y1="40" x2="185" y2="40" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="150" y1="40" x2="150" y2="80" stroke="var(--text-main)" stroke-width="2"/>
            <line x1="100" y1="80" x2="200" y2="80" stroke="var(--text-main)" stroke-width="2"/>
            
            <line x1="100" y1="80" x2="100" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <rect x="85" y="100" width="30" height="30" fill="var(--pedigree-affected)" stroke="var(--pedigree-affected)" stroke-width="2"/>
            
            <line x1="200" y1="80" x2="200" y2="100" stroke="var(--text-main)" stroke-width="2"/>
            <circle cx="200" cy="115" r="15" fill="none" stroke="var(--text-main)" stroke-width="2"/>
        </svg>`;

        // --- DATA ---
        const mcqDeck = [
            // VISUAL QUESTIONS
            { svg: svgMonohybrid, q: "Look at the Punnett square above. What genotype belongs in the missing bottom-right square?", opts: ["pp (Homozygous recessive)", "Pp (Heterozygous)", "PP (Homozygous dominant)", "pP"], ans: 0, exp: "The column gives a recessive 'p', and the row gives a recessive 'p'. Two recessive alleles make homozygous recessive (pp)." },
            { svg: svgMonohybrid, q: "Based on the completed Punnett square above, what is the expected Phenotypic ratio if 'P' (purple) is dominant to 'p' (white)?", opts: ["3:1 (75% Purple, 25% White)", "1:2:1 (25% Purple, 50% Pink, 25% White)", "4:0 (100% Purple)", "1:1 (50% Purple, 50% White)"], ans: 0, exp: "PP, Pp, and Pp all express the dominant purple trait (3 out of 4). Only pp expresses white (1 out of 4). This is Mendel's classic 3:1 ratio for a monohybrid cross between two heterozygotes." },
            { svg: svgDihybridRatio, q: "The diagram above represents a standard Mendelian Dihybrid Cross (AaBb x AaBb) tracking two separate traits. What is the classic expected phenotypic ratio of the offspring?", opts: ["9:3:3:1", "3:1", "1:2:1", "1:1:1:1"], ans: 0, exp: "A dihybrid cross between two heterozygotes (tracking two traits, like pea color and shape) yields a 16-square grid with a 9:3:3:1 phenotypic ratio." },
            { svg: svgAutosomalRecessive, q: "Observe the pedigree above. A circle represents a female, a square represents a male, and a shaded shape represents a person exhibiting a disease. How is this disease being inherited?", opts: ["It is Autosomal Recessive.", "It is Autosomal Dominant.", "It is X-Linked Dominant.", "It is Y-Linked."], ans: 0, exp: "Because the parents are unaffected (white) but they produced an affected child (yellow), the disease MUST be recessive. The parents are hiding the allele." },
            { svg: svgAutosomalRecessive, q: "Using the same pedigree above, what MUST the genotypes of the two parents be?", opts: ["Both are heterozygous (carriers, e.g., Aa).", "Both are homozygous recessive (aa).", "The father is AA and the mother is aa.", "Both are homozygous dominant (AA)."], ans: 0, exp: "To appear normal, they must have at least one dominant 'A'. To pass the disease to their child (aa), they must both secretly carry the recessive 'a'. Therefore, both are Aa." },
            { svg: svgXLinked, q: "In the pedigree above, a carrier mother (half-shaded circle) and a normal father have an affected son (yellow square) and a normal daughter. Why is the son affected while the daughter is not?", opts: ["Males only have one X chromosome. If they inherit the mutated X from the mother, there is no second X to mask it.", "Males inherit the disease from their fathers.", "The trait is Y-linked, so only males can get it.", "Females cannot carry mutated alleles."], ans: 0, exp: "This is classic X-linked recessive inheritance (like color blindness). Males are XY. If their single X is mutated, they have the disease. Females are XX, so a normal X from dad masks the mutated X from mom." },

            // DEFINITIONS & VOCABULARY
            { q: "What is the difference between a Genotype and a Phenotype?", opts: ["Genotype is the actual genetic allele makeup (e.g., Pp); Phenotype is the physical expression or appearance (e.g., Purple flowers).", "Genotype is the physical appearance; Phenotype is the genetic makeup.", "Genotype refers to dominant traits; Phenotype refers to recessive traits.", "Genotype only applies to homozygous traits."], ans: 0, exp: "Genotype = Genetics (letters). Phenotype = Physical observation." },
            { q: "What does 'Homozygous' mean?", opts: ["Having two identical alleles for a given gene (e.g., AA or aa).", "Having two different alleles for a given gene (e.g., Aa).", "Having only one allele.", "Having missing chromosomes."], ans: 0, exp: "Homo = same. Both alleles match." },
            { q: "What does 'Heterozygous' mean?", opts: ["Having two different alleles for a given gene (e.g., Aa).", "Having two identical dominant alleles (e.g., AA).", "Having two identical recessive alleles (e.g., aa).", "Having no alleles for a trait."], ans: 0, exp: "Hetero = different. The individual carries one dominant and one recessive allele." },
            { q: "What is an 'Allele'?", opts: ["A specific variation or version of a gene found at a specific locus.", "The physical location of a gene on a chromosome.", "A protein that replicates DNA.", "The entire set of chromosomes in an organism."], ans: 0, exp: "A gene codes for eye color. The specific alleles are the variations: blue, brown, green, etc." },
            { q: "In Mendel's experiments, what do the P, F1, and F2 generations stand for?", opts: ["P = Parental generation (true-breeding); F1 = First Filial (hybrid offspring); F2 = Second Filial.", "P = Primary; F1 = Factor 1; F2 = Factor 2.", "P = Phenotype; F1 = Frequency 1; F2 = Frequency 2.", "P = Punnett; F1 = First Square; F2 = Second Square."], ans: 0, exp: "P is the parent generation. Filial comes from the Latin for 'son' or 'daughter'." },
            { q: "What does it mean if a plant is 'True-Breeding'?", opts: ["It is highly inbred and homozygous, meaning it will always produce offspring that look exactly like itself.", "It is heterozygous and produces a mix of offspring.", "It has been mutated by radiation.", "It can only reproduce asexually."], ans: 0, exp: "True-breeding plants have no hidden recessive alleles to surprise you. A true-breeding white flower (pp) will only ever make white flowers when self-pollinated." },
            { q: "What is a 'Test Cross' used for in genetics?", opts: ["To determine if an organism showing a dominant phenotype is Homozygous Dominant (PP) or Heterozygous (Pp) by crossing it with a Homozygous Recessive (pp) organism.", "To determine the sex of an organism.", "To test for the presence of a viral infection.", "To determine if crossing over occurred during meiosis."], ans: 0, exp: "If you cross your unknown purple flower with a white flower (pp), and any white flowers pop up in the offspring, you instantly know the parent was secretly a carrier (Pp)." },

            // MENDEL'S LAWS
            { q: "Mendel's Law of Dominance states that:", opts: ["In a heterozygote, the dominant allele will completely mask the presence of the recessive allele.", "Alleles separate during gamete formation.", "Traits blend together to create an intermediate phenotype.", "Every organism has two alleles for every trait."], ans: 0, exp: "If 'P' (purple) is dominant to 'p' (white), a 'Pp' flower will be completely purple, not pink. The white is masked." },
            { q: "Mendel's Law of Segregation states that:", opts: ["Each individual has two alleles for a trait, which separate during gamete formation so each gamete (sperm/egg) gets only one.", "Alleles for different traits sort independently of one another.", "Dominant alleles always mask recessive ones.", "Traits blend together in the offspring."], ans: 0, exp: "Segregation happens during Anaphase I of meiosis when homologous chromosomes are pulled apart, separating the allele pairs." },
            { q: "Mendel's Law of Independent Assortment states that:", opts: ["Alleles for different traits sort independently of one another during gamete formation.", "Dominant alleles are always inherited together.", "Recessive alleles are destroyed during meiosis.", "Genes located on the same chromosome cannot be separated."], ans: 0, exp: "Because chromosomes line up randomly during Metaphase I, inheriting the allele for green eyes doesn't mean you automatically inherit the allele for tall height." },

            // NON-MENDELIAN GENETICS
            { q: "What is the difference between Incomplete Dominance and Codominance?", opts: ["Incomplete dominance creates a blended phenotype (e.g., pink flowers); Codominance expresses both traits fully and simultaneously (e.g., red and white spots).", "They are exactly the same thing.", "Incomplete dominance only occurs in sex-linked traits.", "Codominance completely masks the recessive trait."], ans: 0, exp: "Incomplete = Blended/Mixed. Codominance = Co-captains (Both show up fully, like AB blood type or spotted cows)." },
            { q: "The ABO Blood Type system in humans is an example of:", opts: ["Multiple Alleles and Codominance.", "Incomplete Dominance.", "Epistasis.", "Sex-linked inheritance."], ans: 0, exp: "There are multiple alleles (A, B, and O). A and B are codominant (resulting in AB blood), and both are completely dominant over O." },
            { q: "What is Epistasis?", opts: ["When one gene completely masks or interferes with the expression of a completely separate gene.", "When multiple alleles blend together.", "When a trait is tied to the X chromosome.", "When a chromosome fails to separate."], ans: 0, exp: "Example: You could have the genes for black hair, but if the separate gene for Albinism is triggered, it completely overrides and masks the hair color gene." },
            { q: "What is a 'Linked' gene?", opts: ["Genes located physically close together on the same chromosome that tend to be inherited together as a package deal.", "Genes that code for the exact same trait.", "Genes found on different chromosomes that interact.", "Genes that cancel each other out."], ans: 0, exp: "Linked genes violate the Law of Independent Assortment because they ride on the same DNA strand, unless crossing over breaks them apart." },
            { q: "How does 'Crossing Over' (Recombination) affect linked genes?", opts: ["It can break the physical connection between linked genes on the same chromosome, creating new allele combinations.", "It permanently glues them together.", "It deletes the genes completely.", "It forces them to become codominant."], ans: 0, exp: "Crossing over during Prophase I acts as molecular scissors, swapping chunks of DNA between homologous chromosomes and breaking linkages." },
            { q: "Why are X-linked recessive traits (like color blindness or hemophilia) more common in males?", opts: ["Males have only one X chromosome (XY), so a single recessive allele will always be expressed because there is no second X to mask it.", "Males have two X chromosomes.", "The Y chromosome mutates the X chromosome.", "Males do not possess dominant alleles."], ans: 0, exp: "Females (XX) need two copies of the mutated gene to display the trait. Males only need one." },
            
            // GAMETE FORMATION
            { q: "To figure out the gamete combinations for a Dihybrid Cross (e.g., AaBb), what method should you use?", opts: ["FOIL (First, Outer, Inner, Last).", "The Central Dogma.", "Karyotyping.", "Binary Fission."], ans: 0, exp: "For AaBb: First (AB), Outer (Ab), Inner (aB), Last (ab). These represent the 4 possible sperm/egg combinations." },
            { q: "If an individual has the genotype 'AABb', what are the ONLY possible gamete combinations they can produce?", opts: ["AB and Ab", "AA and Bb", "Aa and Bb", "A, a, B, b"], ans: 0, exp: "Using FOIL: First (AB), Outer (Ab), Inner (AB), Last (Ab). Simplified, they can only pass on an 'A' with either a 'B' or 'b'." }
        ];

        // --- ENGINE ---
        let mcqState = { deck: [], idx: 0, correct: 0, attempts: 0 };

        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initMCQ() {
            mcqState = { deck: shuffle(mcqDeck), idx: 0, correct: 0, attempts: 0 };
            document.getElementById('general-mcq-end').style.display = 'none';
            document.getElementById('general-mcq-area').style.display = 'block';
            renderMCQ();
        }

        function renderMCQ() {
            if (mcqState.idx >= mcqState.deck.length) { endMCQ(); return; }
            
            document.getElementById('general-mcq-fb').style.display = 'none';
            document.getElementById('general-mcq-next').style.display = 'none';

            const qData = mcqState.deck[mcqState.idx];
            document.getElementById('general-mcq-q').innerText = qData.q;
            
            // Handle optional SVG injection
            const svgZone = document.getElementById('svg-injection-zone');
            if (qData.svg) {
                svgZone.innerHTML = qData.svg;
                svgZone.style.display = 'flex';
            } else {
                svgZone.innerHTML = '';
                svgZone.style.display = 'none';
            }
            
            let opts = qData.opts.map((txt, i) => ({txt, origIdx: i}));
            opts = shuffle(opts);

            const grid = document.getElementById('general-mcq-opts');
            grid.innerHTML = '';
            
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.txt;
                btn.onclick = () => handleMCQ(btn, opt.origIdx, qData.ans, opts, qData.exp, false);
                grid.appendChild(btn);
            });
            document.getElementById('general-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
        }

        function handleMCQ(btn, selectedIdx, correctIdx, shuffledOpts, exp, isHint) {
            const btns = document.querySelectorAll('#general-mcq-opts .option-btn');
            btns.forEach(b => { b.disabled = true; b.onclick = null; }); 
            const fb = document.getElementById('general-mcq-fb');
            const nextBtn = document.getElementById('general-mcq-next');
            mcqState.attempts++;

            if (isHint) {
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('hint-highlight');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used. Question recycled.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--accent)';
            }
            else if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                mcqState.correct++;
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--success)';
            } else {
                btn.classList.add('wrong');
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('correct');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect. Added back to deck.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--error)';
            }
            
            document.getElementById('general-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
            fb.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function useHint() {
            const qData = mcqState.deck[mcqState.idx];
            const btns = Array.from(document.querySelectorAll('#general-mcq-opts .option-btn'));
            if(!btns.length || btns[0].disabled) return; 
            
            const correctText = qData.opts[qData.ans];
            let correctDomIdx = 0;
            let mockOpts = [];
            btns.forEach((b, i) => {
                let isCorrect = b.innerText === correctText;
                mockOpts.push({origIdx: isCorrect ? qData.ans : -1});
                if(isCorrect) correctDomIdx = i;
            });
            handleMCQ(btns[correctDomIdx], -1, qData.ans, mockOpts, qData.exp, true);
        }

        function nextMCQ() { mcqState.idx++; renderMCQ(); }

        function endMCQ() {
            document.getElementById('general-mcq-area').style.display = 'none';
            document.getElementById('general-mcq-end').style.display = 'block';
            const pct = Math.round((mcqState.correct / mcqState.attempts) * 100) || 0;
            document.getElementById('general-mcq-score').innerHTML = `You answered <strong>${mcqState.correct}</strong> correctly out of <strong>${mcqState.attempts}</strong> attempts (${pct}%).`;
        }

        // Init
        initMCQ();
    </script>
</body>
</html>
