<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Ch6&7 General Master</title>
    <style>
        :root {
            --bg-color: #323437;
            --text-main: #d1d0c5;
            --text-muted: #646669;
            --accent: #e2b714;
            --error: #ca4754;
            --success: #8cc84b;
            --panel-bg: #2c2e31;
            --hover-bg: #3a3d40;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        /* Utility Buttons */
        .action-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.8rem 1.5rem; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }
        .hint-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .hint-btn:hover { background: var(--accent); color: var(--bg-color); }

        /* MCQ Styles */
        .mcq-arena { margin-top: 1rem; }
        .mcq-question { font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .option-btn { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); text-align: left; padding: 1.2rem; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: rgba(140, 200, 75, 0.1); }
        .option-btn.wrong { border-color: var(--error); color: var(--error); background: rgba(202, 71, 84, 0.1); }
        .option-btn.hint-highlight { border-color: var(--accent); background: rgba(226, 183, 20, 0.1); color: var(--accent); }
        .option-btn:disabled { cursor: default; }
        
        .feedback-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 4px; display: none; line-height: 1.5; font-size: 0.95rem; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent); }
        .progress-text { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); text-align: right; }
        .end-screen { text-align: center; display: none; margin-top: 2rem; }
        .end-screen h2 { color: var(--accent); }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 0.5rem;}
        
        @media (max-width: 800px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Ch6&7 General</h1>
    <div class="subtitle">Chromosomes, Regulation, & Genetics Drill</div>

    <div class="container">
        <div class="mcq-arena" id="general-mcq-area">
            <div class="header-row">
                <div class="mcq-question" id="general-mcq-q">Loading...</div>
                <button class="hint-btn" onclick="useHint()">💡 Hint / Recycle</button>
            </div>
            <div class="options-grid" id="general-mcq-opts"></div>
            <div id="general-mcq-fb" class="feedback-box"></div>
            <button id="general-mcq-next" class="action-btn" style="display:none; width:100%; margin-top:1rem;" onclick="nextMCQ()">Next Question ➔</button>
            <div class="progress-text" id="general-mcq-prog"></div>
        </div>
        <div id="general-mcq-end" class="end-screen">
            <h2>Deck Conquered!</h2><p id="general-mcq-score"></p>
            <button class="action-btn" onclick="initMCQ()">Restart Deck</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const mcqDeck = [
            // Chromosomes & DNA Basics
            { q: "What is the common mnemonic to remember how Nitrogenous Bases pair in DNA?", opts: ["Apple in the Tree, Car in the Garage (A-T, C-G)", "All Tigers Can Growl (A-T, C-G)", "Apples To Carrots, Grapes (A-T, C-G)", "Always Try, Can't Give up (A-T, C-G)"], ans: 0, exp: "Adenine pairs with Thymine (Apple in Tree). Cytosine pairs with Guanine (Car in Garage)." },
            { q: "Which statement perfectly defines a 'Homologous Chromosome' pair?", opts: ["A pair of similar chromosomes: one inherited from the mother, one from the father.", "Two identical copies of a chromosome held together by a centromere.", "The X and Y sex chromosomes only.", "A chromosome that has lost a segment via deletion."], ans: 0, exp: "Homologous means 'similar'. You get one from mom and one from dad. They carry the same genes at the exact same loci." },
            { q: "What is a 'Sister Chromatid'?", opts: ["The exact duplicate copy of a chromosome created during the S phase, attached at the centromere.", "A chromosome inherited directly from the mother.", "A chromosome that has undergone crossing over.", "A haploid cell's only chromosome."], ans: 0, exp: "Sister chromatids are identical copies made during DNA replication so the cell can divide safely." },
            { q: "What are the proteins that DNA wraps around to stay organized and condensed?", opts: ["Histones", "Polymerases", "FtsZ proteins", "Kinetochores"], ans: 0, exp: "DNA wraps tightly around Histones to form nucleosomes, keeping the massive strand organized as chromatin." },
            { q: "If a human somatic cell is Diploid (2n = 46), how many chromosomes does a human Haploid (n) gamete have?", opts: ["23", "46", "92", "22"], ans: 0, exp: "Haploid (n) cells contain only one set of chromosomes. 46 / 2 = 23." },
            { q: "What is the definition of 'Loci'?", opts: ["The specific physical areas or positions that genes occupy on a chromosome.", "The proteins that hold sister chromatids together.", "The ends of a chromosome that degrade over time.", "The phase where DNA duplicates."], ans: 0, exp: "A locus (plural: loci) is essentially the physical address of a gene on a chromosome strand." },
            { q: "What are 'Alleles'?", opts: ["The specific variations of genes located at a locus.", "The enzymes that cut DNA.", "The non-sex chromosomes.", "The identical halves of a duplicated chromosome."], ans: 0, exp: "Alleles are the actual gene variants (e.g., blue eyes vs brown eyes) found at the locus positions." },
            { q: "Which of the following describes 'Autosomal' chromosomes?", opts: ["Any chromosomes that are NOT sex chromosomes (the first 22 pairs in humans).", "The X and Y chromosomes.", "Chromosomes found only in prokaryotes.", "Chromosomes that have failed to separate."], ans: 0, exp: "Autosomes are the 22 pairs of regular non-sex chromosomes. The 23rd pair are the sex chromosomes." },
            { q: "Which type of cells are considered Somatic cells?", opts: ["Non-reproductive body cells (e.g., skin, liver, muscle) that are diploid.", "Reproductive cells like sperm.", "Reproductive cells like eggs.", "Haploid gametes."], ans: 0, exp: "Somatic (from 'soma' meaning body) refers to all regular body cells. They are strictly diploid." },
            
            // Karyotypes & Aneuploidy
            { q: "A Karyotype (or Karyogram) is used to:", opts: ["Visually arrange and inspect a person's complete set of chromosomes.", "Replicate DNA in a lab.", "Mutate a proto-oncogene.", "Trigger cell division."], ans: 0, exp: "A karyogram is a visual profile of a person's chromosomes, used to spot missing or extra chromosomes." },
            { q: "What does 'Euploid' mean?", opts: ["Having the normal, correct number of chromosomes (e.g., 46 in humans).", "Having an abnormal number of chromosomes.", "Missing exactly one chromosome.", "Having exactly one extra chromosome."], ans: 0, exp: "Euploid means 'true/good ploidy'. Aneuploid means abnormal." },
            { q: "What is 'Aneuploidy'?", opts: ["An incorrect or abnormal chromosome number.", "A perfectly normal set of 46 chromosomes.", "The process of a cell splitting in half.", "The inactivation of an X chromosome."], ans: 0, exp: "Aneuploidy is the general term for having an incorrect number of chromosomes due to nondisjunction." },
            { q: "What is 'Nondisjunction'?", opts: ["The failure of chromosomes to separate properly during meiosis.", "The failure of a cell to grow during G1.", "The intentional destruction of a damaged cell.", "The process of crossing over."], ans: 0, exp: "If chromosomes fail to disconnect (disjoin) during Anaphase, it leads to gametes with too many or too few chromosomes." },
            { q: "Turner Syndrome (XO) is an example of what specific chromosome disorder?", opts: ["Monosomy (missing one chromosome).", "Trisomy (one extra chromosome).", "Translocation.", "Inversion."], ans: 0, exp: "Monosomy means missing a chromosome. Turner syndrome patients have only one X chromosome instead of two." },
            { q: "Down Syndrome (Trisomy 21) is an example of:", opts: ["Having one extra chromosome.", "Missing one chromosome.", "A deleted segment of chromosome 5.", "A perfectly euploid karyotype."], ans: 0, exp: "Trisomy means 'three bodies'. They have three copies of chromosome 21 instead of the normal two." },
            { q: "What happens during X-Inactivation?", opts: ["One X chromosome in females condenses into a dormant 'Barr body' to prevent double expression of X-linked genes.", "The Y chromosome is destroyed.", "The X chromosome is duplicated.", "Both X chromosomes are expressed simultaneously."], ans: 0, exp: "Females (XX) only need one active X chromosome. The other is permanently crumpled up into a Barr body." },
            
            // Structural Rearrangements
            { q: "What chromosome structural rearrangement causes Cri-du-chat syndrome?", opts: ["Deletion (loss of a chromosome segment on chromosome 5).", "Duplication (extra copy of a segment).", "Inversion (segment flips backwards).", "Translocation (segment moves to another chromosome)."], ans: 0, exp: "Cri-du-chat (cry of the cat) is caused by a structural deletion of a chunk of chromosome 5." },
            { q: "Which structural rearrangement occurs when a segment of a chromosome breaks off and attaches to a completely different, non-homologous chromosome?", opts: ["Translocation", "Deletion", "Inversion", "Duplication"], ans: 0, exp: "Translocation involves moving a segment to a completely new neighborhood (a different chromosome)." },
            { q: "Which term describes a chromosome segment flipping and reinserting itself backwards?", opts: ["Inversion", "Translocation", "Crossing Over", "Synapsis"], ans: 0, exp: "Inversion literally means to invert or flip." },
            { q: "If a chromosome segment is copied and inserted, resulting in an extra copy of those genes, it is a:", opts: ["Duplication", "Deletion", "Translocation", "Inversion"], ans: 0, exp: "Duplication means the genes are duplicated on the chromosome." },

            // Regulation & Cancer
            { q: "What is a 'Proto-oncogene'?", opts: ["A normal gene that acts as a blueprint for positive regulators, providing the push to move the cell cycle forward.", "A mutated gene that causes cancer.", "A gene that triggers apoptosis.", "A negative regulator."], ans: 0, exp: "Proto-oncogenes are the healthy 'gas pedals'. They provide instructions for positive regulators to keep the cycle moving." },
            { q: "What are 'Positive Regulators' in the cell cycle?", opts: ["Proteins built to help the cell push into the next phase.", "Proteins built to halt the cell cycle.", "Mutated oncogenes.", "Spindle fibers."], ans: 0, exp: "Positive regulators are the physical proteins (built from the proto-oncogene blueprint) that drive the cell forward." },
            { q: "What happens when a Proto-oncogene mutates?", opts: ["It becomes an 'Oncogene', driving uncontrolled cell division (cancer).", "It turns into a tumor suppressor.", "It immediately kills the cell.", "It halts the cell cycle permanently."], ans: 0, exp: "A mutated proto-oncogene is called an Oncogene. It's like a gas pedal stuck to the floor." },
            { q: "Tumor Suppressor Genes, like p53, function primarily as:", opts: ["Negative regulators (brakes) that halt the cell cycle.", "Positive regulators (gas pedal).", "Spindle fibers.", "Ligands for cell communication."], ans: 0, exp: "Tumor suppressors are the 'brakes'. They stop the cell cycle to allow for DNA repair." },
            { q: "If the tumor suppressor p53 detects severe, irreparable DNA damage at the G1 checkpoint, what does it do?", opts: ["Triggers Apoptosis (programmed cell death).", "Forces the cell into S phase anyway.", "Converts into an oncogene.", "Turns into a haploid cell."], ans: 0, exp: "p53 ensures damaged DNA isn't copied. If it can't be fixed, p53 orders the cell to self-destruct (apoptosis)." },
            { q: "What does the term 'Metastasis' mean?", opts: ["Cancer cells traveling away from the original tumor through the bloodstream or lymphatic system to form new tumors.", "A cell entering the G0 resting phase.", "A benign tumor shrinking via apoptosis.", "Homologous chromosomes failing to separate."], ans: 0, exp: "Because cancer cells replicate out of control, they run out of room and spread to other organs (metastasis)." },
            { q: "Which of the following can cause a p53 tumor suppressor mutation?", opts: ["DNA damage, oxidative stress, hypoxia, nutrient deficiency, or severe physiological stress.", "Eating too much starch.", "Crossing over during meiosis.", "Independent assortment."], ans: 0, exp: "Severe physiological stress, chemicals, radiation, or hypoxia can corrupt the p53 gene, removing the cell's 'brakes'." },
            
            // Life Cycles & Twins
            { q: "Humans follow a 'Diploid-dominant' life cycle. What does this mean?", opts: ["The multicellular, visible organism is diploid, and only the single-celled gametes are haploid.", "The multicellular organism is haploid.", "The organism alternates between multicellular haploid and diploid stages.", "The organism reproduces entirely through binary fission."], ans: 0, exp: "In humans and most animals, the massive body (soma) is diploid. The haploid phase is just the sperm and egg." },
            { q: "Fungi follow a 'Haploid-dominant' life cycle. What does this mean?", opts: ["The multicellular, visible organism is haploid.", "The multicellular organism is diploid.", "They do not have chromosomes.", "They reproduce via seeds."], ans: 0, exp: "In fungi, the 'body' you see is made of haploid cells. They only briefly form a diploid zygote to undergo meiosis." },
            { q: "Plants utilize a life cycle called 'Alternation of Generations'. This involves:", opts: ["Alternating between a multicellular diploid Sporophyte and a multicellular haploid Gametophyte.", "Alternating between mitosis and binary fission.", "Alternating between single-celled and multi-celled diploid forms.", "Alternating between XX and XY chromosomes."], ans: 0, exp: "Plants have two distinct multicellular bodies in their life cycle: the Sporophyte (2n) and the Gametophyte (n)." },
            { q: "What is the primary difference between Dizygotic and Monozygotic twins?", opts: ["Dizygotic (fraternal) come from two eggs and two sperm; Monozygotic (identical) come from one egg and one sperm that splits.", "Dizygotic are always identical; Monozygotic are always fraternal.", "Dizygotic twins share 100% of their DNA.", "Monozygotic twins can be different sexes."], ans: 0, exp: "Di = Two (two zygotes). Mono = One (one zygote splits). Monozygotic twins are genetically identical." },
            { q: "True or False: Monozygotic twins are always the same sex, whereas Dizygotic twins can be different sexes.", opts: ["True. Monozygotic twins come from the exact same fertilized egg.", "False. Monozygotic twins can be male and female.", "False. Dizygotic twins are always the same sex.", "True. Dizygotic twins come from a single egg that splits."], ans: 0, exp: "Monozygotic twins share identical DNA, meaning they will always be the same biological sex. Dizygotic twins are just like regular siblings." }
        ];

        // --- ENGINE ---
        let mcqState = { deck: [], idx: 0, correct: 0, attempts: 0 };

        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initMCQ() {
            mcqState = { deck: shuffle(mcqDeck), idx: 0, correct: 0, attempts: 0 };
            document.getElementById('general-mcq-end').style.display = 'none';
            document.getElementById('general-mcq-area').style.display = 'block';
            renderMCQ();
        }

        function renderMCQ() {
            if (mcqState.idx >= mcqState.deck.length) { endMCQ(); return; }
            document.getElementById('general-mcq-fb').style.display = 'none';
            document.getElementById('general-mcq-next').style.display = 'none';

            const qData = mcqState.deck[mcqState.idx];
            document.getElementById('general-mcq-q').innerText = qData.q;
            
            let opts = qData.opts.map((txt, i) => ({txt, origIdx: i}));
            opts = shuffle(opts);

            const grid = document.getElementById('general-mcq-opts');
            grid.innerHTML = '';
            
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.txt;
                btn.onclick = () => handleMCQ(btn, opt.origIdx, qData.ans, opts, qData.exp, false);
                grid.appendChild(btn);
            });
            document.getElementById('general-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
        }

        function handleMCQ(btn, selectedIdx, correctIdx, shuffledOpts, exp, isHint) {
            const btns = document.querySelectorAll('#general-mcq-opts .option-btn');
            btns.forEach(b => { b.disabled = true; b.onclick = null; }); 
            const fb = document.getElementById('general-mcq-fb');
            const nextBtn = document.getElementById('general-mcq-next');
            mcqState.attempts++;

            if (isHint) {
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('hint-highlight');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used. Question recycled.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--accent)';
            }
            else if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                mcqState.correct++;
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--success)';
            } else {
                btn.classList.add('wrong');
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('correct');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect. Added back to deck.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--error)';
            }
            
            document.getElementById('general-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
            fb.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function useHint() {
            const qData = mcqState.deck[mcqState.idx];
            const btns = Array.from(document.querySelectorAll('#general-mcq-opts .option-btn'));
            if(!btns.length || btns[0].disabled) return; 
            
            const correctText = qData.opts[qData.ans];
            let correctDomIdx = 0;
            let mockOpts = [];
            btns.forEach((b, i) => {
                let isCorrect = b.innerText === correctText;
                mockOpts.push({origIdx: isCorrect ? qData.ans : -1});
                if(isCorrect) correctDomIdx = i;
            });
            handleMCQ(btns[correctDomIdx], -1, qData.ans, mockOpts, qData.exp, true);
        }

        function nextMCQ() { mcqState.idx++; renderMCQ(); }

        function endMCQ() {
            document.getElementById('general-mcq-area').style.display = 'none';
            document.getElementById('general-mcq-end').style.display = 'block';
            const pct = Math.round((mcqState.correct / mcqState.attempts) * 100) || 0;
            document.getElementById('general-mcq-score').innerHTML = `You answered <strong>${mcqState.correct}</strong> correctly out of <strong>${mcqState.attempts}</strong> attempts (${pct}%).`;
        }

        // Init
        initMCQ();
    </script>
</body>
</html>
