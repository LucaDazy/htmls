<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAT 243Z - Final Exam 3 Simulator</title>
    <link rel="icon" href="../../../Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../../Global/Css/main.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .nav-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
            padding: 0.8rem 1.5rem;
            font-family: var(--font-family-mono);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tab-btn.active { border-color: var(--accent); background: var(--hover-bg); color: var(--accent); }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 1px solid var(--text-muted); padding-bottom: 0.5rem; text-align: center;}

        /* Simulator UI */
        .sim-arena { width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 1rem; }
        .chapter-tag { background: rgba(226, 183, 20, 0.2); color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 16px; font-size: 0.85rem; font-weight: bold; }
        .btn-group { display: flex; gap: 0.5rem; }
        
        .hint-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 0.4rem 0.8rem; font-family: var(--font-family-mono); font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .hint-btn:hover { border-color: var(--accent); color: var(--accent); }

        .sim-svg-container { width: 100%; max-width: 450px; margin-bottom: 1.5rem; }
        
        .mcq-question { font-size: 1.15rem; margin-bottom: 1.5rem; line-height: 1.6; width: 100%; }
        
        /* Calculator Inputs UI */
        .calc-inputs { background: rgba(0,0,0,0.2); padding: 1.2rem; border-radius: 4px; margin-bottom: 1.5rem; border: 1px dashed var(--text-muted); width: 100%; box-sizing: border-box; }
        .calc-inputs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 0.8rem; }
        .calc-input-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .calc-input-group label { font-weight: bold; color: var(--text-main); font-size: 0.95rem; }
        .calc-input-group input, .calc-input-group select { background: var(--bg-color); color: var(--text-main); border: 2px solid var(--text-muted); padding: 0.6rem; border-radius: 4px; font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .calc-input-group input:focus, .calc-input-group select:focus { border-color: var(--accent); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; }
        .option-btn { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); text-align: left; padding: 1.2rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: rgba(140, 200, 75, 0.1); }
        .option-btn.wrong { border-color: var(--error); color: var(--error); background: rgba(202, 71, 84, 0.1); }
        .option-btn.hint-highlight { border-color: var(--accent); background: rgba(226, 183, 20, 0.1); color: var(--accent); }
        .option-btn:disabled { cursor: default; }

        .feedback-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 4px; display: none; line-height: 1.6; font-size: 1rem; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent); width: 100%; box-sizing: border-box;}
        
        .action-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 1rem 1.5rem; font-family: var(--font-family-mono); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; width: 100%; margin-top: 1.5rem; font-weight: bold;}
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }
        
        .progress-text { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); text-align: center; width: 100%; }
        
        @media (max-width: 800px) {
            .options-grid { grid-template-columns: 1fr; }
            .header-row { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>

    <h1>STAT 243Z - Final Simulator</h1>
    <div class="subtitle">Infinite Word Problems, TI-84 Drills &amp; Handout Integration</div>

    <div class="nav-buttons">
        <button id="btn-ti84" class="tab-btn active" onclick="switchMode('ti84')">TI-84 Commands</button>
        <button id="btn-samplesize" class="tab-btn" onclick="switchMode('samplesize')">Sample Size Math</button>
        <button id="btn-hypo" class="tab-btn" onclick="switchMode('hypo')">Hypotheses &amp; P-Values</button>
        <button id="btn-concepts" class="tab-btn" onclick="switchMode('concepts')">"Must Know" Concepts</button>
    </div>

    <div class="container">
        <div class="section-label" id="mode-title">TI-84 Command Recognition</div>
        
        <div class="sim-arena">
            <div class="header-row">
                <div id="chapter-badge" class="chapter-tag">Ch 10</div>
                <div class="btn-group">
                    <button class="hint-btn" onclick="triggerNext()">🔄 Refresh</button>
                    <button class="hint-btn" onclick="useHint()" style="border-color: var(--accent); color: var(--accent);">💡 Hint / Recycle</button>
                </div>
            </div>

            <div class="sim-svg-container" id="svg-container"></div>
            <div class="mcq-question" id="q-text">Loading...</div>
            
            <div id="calc-inputs-container" style="width:100%;"></div>

            <div class="options-grid" id="opts-grid"></div>
            <div id="feedback" class="feedback-box"></div>
            <button id="next-btn" class="action-btn" style="display:none;" onclick="triggerNext()">Next Simulation ➔</button>
            <div class="progress-text" id="prog-text">Simulation Engine Active</div>
        </div>
    </div>

    <script>
        // --- EXACT MATHEMATICAL SVG GENERATOR ---
        function getAccurateBellCurve(shadeType, zVal) {
            // Map a Z-score to a pixel X-coordinate. Center = 250. 1 StdDev = 66.6px.
            const getX = (z) => 250 + (z * 66.6);
            const clipId = 'shade-clip-' + Math.floor(Math.random() * 10000);
            
            let clipPaths = '';
            if (shadeType === 'left') {
                clipPaths = `<rect x="0" y="0" width="${getX(-Math.abs(zVal))}" height="250" />`;
            } else if (shadeType === 'right') {
                clipPaths = `<rect x="${getX(Math.abs(zVal))}" y="0" width="${500 - getX(Math.abs(zVal))}" height="250" />`;
            } else if (shadeType === 'two') {
                clipPaths = `
                    <rect x="0" y="0" width="${getX(-Math.abs(zVal))}" height="250" />
                    <rect x="${getX(Math.abs(zVal))}" y="0" width="${500 - getX(Math.abs(zVal))}" height="250" />
                `;
            } else if (shadeType === 'center') {
                clipPaths = `<rect x="${getX(-Math.abs(zVal))}" y="0" width="${getX(Math.abs(zVal)) - getX(-Math.abs(zVal))}" height="250" />`;
            }

            const shadeColor = shadeType === 'center' ? 'var(--accent)' : 'var(--error)';
            const shadeOpacity = shadeType === 'center' ? '0.25' : '0.4';
            
            const shadingElement = shadeType !== 'none' ? `<use href="#bell-shape" fill="${shadeColor}" opacity="${shadeOpacity}" clip-path="url(#${clipId})" />` : '';

            return `
            <svg viewBox="0 0 500 220" style="width: 100%; height: auto;">
                <defs>
                    <path id="bell-shape" d="M 50 195 C 150 195, 200 20, 250 20 C 300 20, 350 195, 450 195 L 450 195 L 50 195 Z" />
                    <clipPath id="${clipId}">
                        ${clipPaths}
                    </clipPath>
                </defs>
                ${shadingElement}
                <use href="#bell-shape" fill="none" stroke="var(--text-main)" stroke-width="4"/>
                <line x1="20" y1="195" x2="480" y2="195" stroke="var(--text-main)" stroke-width="4"/>
                <line x1="250" y1="195" x2="250" y2="20" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5"/>
                <text x="250" y="215" fill="var(--text-muted)" font-size="14" text-anchor="middle">Center</text>
            </svg>`;
        }

        // --- HARDCODED CONCEPTS DECK ---
        const conceptsDeck = [
            { ch: 8, q: "According to the teacher, what does the 'Standard Error' (σ<sub>x̄</sub>) represent?", ans: "It is the standard deviation of the sampling distribution.", opts: ["It is the distance from the point estimate to the edge of the confidence interval.", "It is the standard deviation of the original parent population (σ).", "It is the percentage of errors made during random sampling."], exp: "Standard error is the man-made spread created when you take all the sample averages (x̄) or proportions (p̂) and put them into their own theoretical distribution." },
            { ch: 9, q: "What does the 'Margin of Error' (E) represent?", ans: "The distance from the point estimate to the upper or lower bound of the confidence interval.", opts: ["The standard deviation of the sampling distribution.", "The probability that your hypothesis test is completely wrong.", "The sample size (n) divided by the population size."], exp: "If your interval is [0.40, 0.46] and the middle point estimate (p̂) is 0.43, the Margin of Error (E) is the distance you traveled from the center (0.03)." },
            { ch: 9, q: "According to the teacher, why MUST we say 'We are 95% confident' instead of 'There is a 95% probability/chance'?", ans: "Because the true population parameter (μ or p) is a constant, fixed number. It doesn't have a probability associated with it anymore.", opts: ["Because probability is only used for proportions, not averages.", "Because the margin of error is always exactly 5%.", "Because sampling distributions are never perfectly normal."], exp: "The true proportion (p) of voters right now is a solid, constant fact. Our specific interval either captured it, or it didn't. It's not a 'chance' anymore, it's about our overall confidence in the statistical tool used to catch it." },
            { ch: 9, q: "If you INCREASE the level of confidence (e.g., from 90% to 99%), what happens to the size of the interval?", ans: "The interval gets wider.", opts: ["The interval gets narrower.", "The interval stays the same, but the point estimate changes.", "The margin of error (E) decreases."], exp: "To be MORE confident that you caught the value, you have to cast a WIDER net. The Z-score gets bigger, which mathematically makes the Margin of Error (E) larger." },
            { ch: 9, q: "If you INCREASE the sample size (n), what happens to the size of the interval?", ans: "The interval gets narrower.", opts: ["The interval gets wider.", "The interval stays exactly the same.", "The level of confidence decreases automatically."], exp: "A larger sample size (n) reduces the Standard Error (the denominator gets bigger). A smaller standard error shrinks the Margin of Error, making your prediction much more precise (narrower)." },
            { ch: 9, q: "Why do we use a T-Distribution (T-Test / TInterval) for Means, instead of the Z-Distribution?", ans: "Because we do not know the true population standard deviation (σ), so we must use the sample standard deviation (S_x) instead.", opts: ["Because the data is binomial instead of continuous.", "Because the sample sizes (n) are always smaller than 30.", "Because sample means (x̄) are always skewed to the left."], exp: "The T-distribution was literally invented because using rigid Z-scores with a fake/sample standard deviation (S_x) created inaccurate intervals that missed the mark." },
            { ch: 9, q: "When calculating a confidence interval for a Mean using the T-distribution, how do you find the Degrees of Freedom (df)?", ans: "df = n - 1", opts: ["df = n", "df = n * p * (1-p)", "df = n + 1"], exp: "Degrees of freedom for a single sample is always the sample size (n) minus one." },
            { ch: 10, q: "When running a Hypothesis Test, if the P-Value is LESS than Alpha (α), what is the correct decision?", ans: "Reject the Null Hypothesis (H₀).", opts: ["Fail to Reject the Null Hypothesis (H₀).", "Accept the Null Hypothesis (H₀).", "Increase the sample size."], exp: "If the P-value is low, the Null must go! You Reject H₀ and conclude there IS sufficient evidence to support the alternative claim (H₁)." },
            { ch: 8, q: "What is the assumption needed to ensure a sampling distribution for a PROPORTION is normally distributed?", ans: "np(1-p) ≥ 10", opts: ["n ≥ 30", "The population must be normally distributed.", "The sample size must be exactly 5% of the population."], exp: "For proportions (binomial data), the Central Limit Theorem requires you to verify that n*p*(1-p) is greater than or equal to 10." }
        ];

        // --- GLOBAL STATE ---
        let currentMode = 'ti84';
        let conceptIdx = 0;
        let conceptDeckShuffled = [];
        let currentData = null; // Store current generated problem state

        // --- UTILS ---
        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function switchMode(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            const titles = {
                'ti84': 'TI-84 Command Recognition & Setup',
                'samplesize': 'Sample Size Calculations',
                'hypo': 'Hypothesis & P-Value Conclusions',
                'concepts': '"Must Know" Concept Flashcards'
            };
            document.getElementById('mode-title').innerText = titles[mode];
            
            currentMode = mode;
            if (mode === 'concepts') {
                conceptDeckShuffled = shuffle([...conceptsDeck]);
                conceptIdx = 0;
            }
            triggerNext();
        }

        // --- PROCEDURAL GENERATORS ---

        function genTI84() {
            const isMean = Math.random() > 0.5;
            const isTest = Math.random() > 0.5;
            
            let qText = "";
            let correctAns = "";
            let exp = "";
            let svg = "";
            let chapter = isTest ? "Ch 10" : "Ch 9";
            let handout = isTest ? "📌 Handout Ref: 'Hypotheses testing' under Step 3 (Test statistic)." : "📌 Handout Ref: 'Confidence intervals' side of the sheet.";
            let calcHTML = "";
            let calcData = [];

            const subjects = ["fish", "registered voters", "cars", "trees", "students", "bottles"];
            const sub = subjects[Math.floor(Math.random() * subjects.length)];
            const n = Math.floor(Math.random() * 500) + 40;

            if (isMean) {
                const x_bar = (Math.random() * 20 + 20).toFixed(1);
                const sx = (Math.random() * 5 + 1).toFixed(1);
                
                if (isTest) {
                    const mu_0 = (parseFloat(x_bar) - (Math.random()*4 + 1)).toFixed(1);
                    qText = `A researcher claims the population mean weight (<strong>μ</strong>) of ${sub} is <strong>greater than ${mu_0} lbs</strong>. They take a random sample of <strong>n = ${n}</strong> ${sub} and find a sample mean of <strong>x̄ = ${x_bar}</strong> with a sample standard deviation of <strong>S<sub>x</sub> = ${sx}</strong>.<br><br>Which TI-84 command should be used to test this claim at the α = 0.05 significance level?`;
                    correctAns = "T-Test";
                    exp = `<strong>Explanation:</strong> Because the problem asks to "test a claim" about a "population mean (μ)" and provides a <em>sample standard deviation (S<sub>x</sub>)</em>, you must use the <strong>T-Test</strong>.<br><br>${handout}`;
                    svg = getAccurateBellCurve('right', 1.645); 
                    
                    calcHTML = `
                        <div class="calc-inputs">
                            <p style="margin-top:0; color:var(--accent);"><strong>Expected Calculator Inputs:</strong> (Optional Practice)</p>
                            <div class="calc-inputs-grid">
                                <div class="calc-input-group"><label>μ₀:</label><input type="number" step="any" data-name="μ₀" data-ans="${mu_0}" placeholder="ex: 40"></div>
                                <div class="calc-input-group"><label>x̄:</label><input type="number" step="any" data-name="x̄" data-ans="${x_bar}" placeholder="ex: 42.1"></div>
                                <div class="calc-input-group"><label>S<sub>x</sub>:</label><input type="number" step="any" data-name="S_x" data-ans="${sx}" placeholder="ex: 4.3"></div>
                                <div class="calc-input-group"><label>n:</label><input type="number" data-name="n" data-ans="${n}" placeholder="ex: 100"></div>
                            </div>
                        </div>`;
                } else {
                    qText = `A biologist measures a random sample of <strong>n = ${n}</strong> ${sub}. The sample mean is <strong>x̄ = ${x_bar}</strong> with a sample standard deviation of <strong>S<sub>x</sub> = ${sx}</strong>.<br><br>Which TI-84 command should be used to create a 95% confidence interval to estimate the true population mean (<strong>μ</strong>)?`;
                    correctAns = "TInterval";
                    exp = `<strong>Explanation:</strong> Because the problem asks to create a "confidence interval" for a "mean (μ)", you must use <strong>TInterval</strong>.<br><br>${handout}`;
                    svg = getAccurateBellCurve('center', 1.96); 

                    calcHTML = `
                        <div class="calc-inputs">
                            <p style="margin-top:0; color:var(--accent);"><strong>Expected Calculator Inputs:</strong> (Optional Practice)</p>
                            <div class="calc-inputs-grid">
                                <div class="calc-input-group"><label>x̄:</label><input type="number" step="any" data-name="x̄" data-ans="${x_bar}" placeholder="ex: 42.1"></div>
                                <div class="calc-input-group"><label>S<sub>x</sub>:</label><input type="number" step="any" data-name="S_x" data-ans="${sx}" placeholder="ex: 4.3"></div>
                                <div class="calc-input-group"><label>n:</label><input type="number" data-name="n" data-ans="${n}" placeholder="ex: 100"></div>
                            </div>
                        </div>`;
                }
            } else {
                const x = Math.floor(n * (Math.random() * 0.3 + 0.3)); // Guarantees whole number

                if (isTest) {
                    const p_0 = 0.30;
                    qText = `Historically, the true proportion (<strong>p</strong>) of ${sub} with a specific trait is ${p_0}. A new study samples <strong>n = ${n}</strong> ${sub} and finds that exactly <strong>x = ${x}</strong> possess the trait. <br><br>Which TI-84 command should be used to test the claim that the true proportion <strong>has changed (p ≠ ${p_0})</strong>?`;
                    correctAns = "1-PropZTest";
                    exp = `<strong>Explanation:</strong> Because the problem is asking to "test a claim" about a "proportion (p)", you must use the <strong>1-PropZTest</strong>.<br><br>${handout}`;
                    svg = getAccurateBellCurve('two', 1.96); 

                    calcHTML = `
                        <div class="calc-inputs">
                            <p style="margin-top:0; color:var(--accent);"><strong>Expected Calculator Inputs:</strong> (Optional Practice)</p>
                            <div class="calc-inputs-grid">
                                <div class="calc-input-group"><label>p₀:</label><input type="number" step="any" data-name="p₀" data-ans="${p_0}" placeholder="ex: 0.30"></div>
                                <div class="calc-input-group"><label>x (successes):</label><input type="number" data-name="x" data-ans="${x}" placeholder="ex: 35"></div>
                                <div class="calc-input-group"><label>n (sample size):</label><input type="number" data-name="n" data-ans="${n}" placeholder="ex: 100"></div>
                            </div>
                        </div>`;
                } else {
                    qText = `In a random survey of <strong>n = ${n}</strong> ${sub}, exactly <strong>x = ${x}</strong> were found to have a specific characteristic.<br><br>Which TI-84 command should be used to estimate the true population proportion (<strong>p</strong>) with 99% confidence?`;
                    correctAns = "1-PropZInt";
                    exp = `<strong>Explanation:</strong> Because the problem asks to "estimate/create an interval" for a "proportion (p)", you must use the <strong>1-PropZInt</strong>.<br><br>${handout}`;
                    svg = getAccurateBellCurve('center', 2.576); 

                    calcHTML = `
                        <div class="calc-inputs">
                            <p style="margin-top:0; color:var(--accent);"><strong>Expected Calculator Inputs:</strong> (Optional Practice)</p>
                            <div class="calc-inputs-grid">
                                <div class="calc-input-group"><label>x (successes):</label><input type="number" data-name="x" data-ans="${x}" placeholder="ex: 35"></div>
                                <div class="calc-input-group"><label>n (sample size):</label><input type="number" data-name="n" data-ans="${n}" placeholder="ex: 100"></div>
                            </div>
                        </div>`;
                }
            }

            const opts = ["T-Test", "TInterval", "1-PropZTest", "1-PropZInt"];
            return { qText, opts, correctAns, exp, svg, chapter, calcHTML };
        }

        function genSampleSize() {
            const isMean = Math.random() > 0.5;
            const confLevels = [{lvl: 90, z: 1.645}, {lvl: 95, z: 1.96}, {lvl: 98, z: 2.33}, {lvl: 99, z: 2.575}];
            const conf = confLevels[Math.floor(Math.random() * confLevels.length)];
            
            let qText = "";
            let correctN = 0;
            let exp = "";
            let optsArr = [];
            let svg = getAccurateBellCurve('center', conf.z); 
            let chapter = "Ch 9";
            let handout = "📌 Handout Ref: Look at the 'Confidence intervals' handout under 'Determining the sample size'.";

            if (isMean) {
                const s = (Math.random() * 10 + 2).toFixed(1); 
                const E = (Math.random() * 2 + 0.5).toFixed(1); 
                
                qText = `You want to estimate a population mean (<strong>μ</strong>). A previous study found the standard deviation to be <strong>s = ${s}</strong>.<br><br>You want to be <strong>${conf.lvl}%</strong> confident that your estimate is within <strong>E = ${E}</strong> units (margin of error) of the true mean.<br><br>How large of a sample size (n) is required?`;
                
                let rawN = Math.pow((conf.z * s) / E, 2);
                correctN = Math.ceil(rawN);
                
                exp = `<strong>Formula:</strong> n = (Z * s / E)²<br><br>1. Z-score for ${conf.lvl}% confidence is <strong>${conf.z}</strong>.<br>2. Calculate: (${conf.z} * ${s} / ${E})²<br>3. Result is ${rawN.toFixed(3)}.<br><br><strong>Teacher's Rule:</strong> <em>Always round UP to the next whole number, even if it's a tiny decimal.</em><br><br>${handout}`;
                
                optsArr = [correctN, Math.round(rawN), Math.ceil(Math.pow((1.96 * s) / E, 2)), Math.ceil((conf.z * s) / E)];
                
            } else {
                const hasPrior = Math.random() > 0.5;
                const E = (Math.random() * 0.04 + 0.02).toFixed(3); 
                
                if (hasPrior) {
                    const p = (Math.random() * 0.4 + 0.3).toFixed(2); 
                    qText = `You want to estimate a population proportion (<strong>p</strong>). You want to be <strong>${conf.lvl}%</strong> confident that your estimate is within <strong>E = ${E}</strong> (margin of error).<br><br>A prior study found the proportion to be <strong>p̂ = ${p}</strong>.<br><br>How large of a sample size (n) is required?`;
                    
                    let rawN = p * (1 - p) * Math.pow(conf.z / E, 2);
                    correctN = Math.ceil(rawN);
                    
                    exp = `<strong>Formula:</strong> n = p̂(1-p̂) * (Z / E)²<br><br>1. Z-score for ${conf.lvl}% is <strong>${conf.z}</strong>.<br>2. Calculate: ${p} * (1 - ${p}) * (${conf.z} / ${E})²<br>3. Result is ${rawN.toFixed(3)}.<br><br><strong>Teacher's Rule:</strong> <em>Always round UP to the next whole number.</em><br><br>${handout}`;
                    
                    optsArr = [correctN, Math.round(rawN), Math.ceil(0.25 * Math.pow(conf.z / E, 2)), Math.ceil(rawN / p)];
                } else {
                    qText = `You want to estimate a population proportion (<strong>p</strong>). You want to be <strong>${conf.lvl}%</strong> confident that your estimate is within <strong>E = ${E}</strong> (margin of error).<br><br><strong>No prior study estimate (p̂) is available.</strong><br><br>How large of a sample size (n) is required?`;
                    
                    let rawN = 0.25 * Math.pow(conf.z / E, 2);
                    correctN = Math.ceil(rawN);
                    
                    exp = `<strong>Formula:</strong> n = 0.25 * (Z / E)²<br><br>1. Because no prior 'p̂' was given, we assume a 50/50 split (0.5 * 0.5 = 0.25), which provides the maximum safe sample size.<br>2. Z-score for ${conf.lvl}% is <strong>${conf.z}</strong>.<br>3. Calculate: 0.25 * (${conf.z} / ${E})²<br>4. Result is ${rawN.toFixed(3)}.<br><br><strong>Teacher's Rule:</strong> <em>Always round UP to the next whole number.</em><br><br>${handout}`;
                    
                    optsArr = [correctN, Math.round(rawN), Math.ceil(0.25 * (conf.z / E)), Math.ceil(0.5 * Math.pow(conf.z / E, 2))];
                }
            }

            let cleanOpts = [...new Set(optsArr.filter(n => !isNaN(n)))];
            while(cleanOpts.length < 4) {
                let fake = correctN + Math.floor(Math.random()*15) - 7;
                if(!cleanOpts.includes(fake) && fake > 0) cleanOpts.push(fake);
            }

            return { qText, opts: cleanOpts.map(String), correctAns: String(correctN), exp, svg, chapter, calcHTML: "" };
        }

        function genHypothesis() {
            const types = ['left', 'right', 'two'];
            const testType = types[Math.floor(Math.random() * types.length)];
            const isReject = Math.random() > 0.5;
            
            const alphas = [0.01, 0.05, 0.10];
            const alpha = alphas[Math.floor(Math.random() * alphas.length)];
            
            let pValNum = isReject ? (alpha * Math.random() * 0.8) : (alpha + (Math.random() * 0.1) + 0.01);
            let pValue = pValNum.toFixed(4);
            
            let claim = "";
            let zVis = 0;
            
            // Calculate actual critical Z for perfect shading based on Alpha
            if (testType === 'left') {
                claim = "the population mean (<strong>μ</strong>) < 40";
                zVis = alpha === 0.01 ? -2.33 : (alpha === 0.05 ? -1.645 : -1.28);
            } else if (testType === 'right') {
                claim = "the population mean (<strong>μ</strong>) > 40";
                zVis = alpha === 0.01 ? 2.33 : (alpha === 0.05 ? 1.645 : 1.28);
            } else {
                claim = "the true proportion (<strong>p</strong>) ≠ 0.50";
                zVis = alpha === 0.01 ? 2.576 : (alpha === 0.05 ? 1.96 : 1.645);
            }
            
            let qText = `You are running a hypothesis test where the claim (H₁) is that ${claim}.<br><br>
                         <strong>Significance Level (α):</strong> ${alpha}<br>
                         <strong>Calculated P-Value:</strong> ${pValue}<br><br>
                         Based on this P-value, what is the correct decision and conclusion format?`;
            
            let svg = getAccurateBellCurve(testType, zVis); 
            let chapter = "Ch 10";
            let handout = "📌 Handout Ref: Look at the 'Hypotheses testing' handout under Step 5 (Conclusion).";

            let correctAns = isReject 
                ? `Reject H₀. There IS sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`
                : `Fail to Reject H₀. There IS NOT sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`;

            let opts = [
                `Reject H₀. There IS sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`,
                `Fail to Reject H₀. There IS NOT sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`,
                `Reject H₀. There IS NOT sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`,
                `Fail to Reject H₀. There IS sufficient evidence to support the claim that ${claim.replace(/<[^>]*>?/gm, '')}.`
            ];

            let exp = `<strong>Explanation:</strong><br><br>1. Compare P-Value (${pValue}) to Alpha α (${alpha}).<br>`;
            if (isReject) {
                exp += `2. ${pValue} is LESS than ${alpha}.<br>3. <strong>Rule:</strong> If P is low, the Null must go! We <strong>Reject H₀</strong>.<br>4. Because we rejected the null, it means our evidence DOES support the alternative claim (H₁).<br><br>${handout}`;
            } else {
                exp += `2. ${pValue} is GREATER than ${alpha}.<br>3. <strong>Rule:</strong> If P is high, the Null flies! We <strong>Fail to Reject H₀</strong>.<br>4. Because we failed to reject the null, it means we DO NOT have enough evidence to support the alternative claim (H₁).<br><br>${handout}`;
            }

            return { qText, opts, correctAns, exp, svg, chapter, calcHTML: "" };
        }

        // --- RENDER ENGINE ---

        function triggerNext() {
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            if (currentMode === 'ti84') currentData = genTI84();
            else if (currentMode === 'samplesize') currentData = genSampleSize();
            else if (currentMode === 'hypo') currentData = genHypothesis();
            else if (currentMode === 'concepts') {
                if (conceptIdx >= conceptDeckShuffled.length) {
                    conceptDeckShuffled = shuffle([...conceptsDeck]);
                    conceptIdx = 0;
                }
                const c = conceptDeckShuffled[conceptIdx];
                conceptIdx++;
                
                let opts = shuffle([c.ans, ...c.opts]);
                currentData = { qText: c.q, opts: opts, correctAns: c.ans, exp: c.exp, svg: getAccurateBellCurve('none', 0), chapter: "Ch " + c.ch, calcHTML: "" };
            }

            document.getElementById('chapter-badge').innerText = currentData.chapter;
            document.getElementById('q-text').innerHTML = currentData.qText;
            document.getElementById('svg-container').innerHTML = currentData.svg;
            document.getElementById('calc-inputs-container').innerHTML = currentData.calcHTML;
            
            // Immediate Progress Update Fix
            if (currentMode === 'concepts') {
                document.getElementById('prog-text').innerText = `Card ${conceptIdx} of ${conceptDeckShuffled.length}`;
            } else {
                document.getElementById('prog-text').innerText = "Infinite Simulation Engine Active";
            }

            const grid = document.getElementById('opts-grid');
            grid.innerHTML = '';

            let shuffledOpts = shuffle(currentData.opts);
            
            shuffledOpts.forEach(optTxt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = optTxt;
                
                btn.onclick = () => handleMCQ(btn, optTxt, false);
                grid.appendChild(btn);
            });
        }

        function handleMCQ(btn, selectedAns, isHint) {
            document.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; b.onclick = null; });
            
            const fb = document.getElementById('feedback');
            const grid = document.getElementById('opts-grid');
            
            // Validate Calculator Inputs (If Any exist)
            let inputFeedback = "";
            document.querySelectorAll('.calc-inputs input, .calc-inputs select').forEach(inp => {
                if(inp.value.trim() === inp.dataset.ans) {
                    inp.style.borderColor = 'var(--success)';
                } else {
                    inp.style.borderColor = 'var(--error)';
                    inputFeedback += `<br>❌ Your input for <strong>${inp.dataset.name}</strong> was blank or incorrect. (Expected: <strong>${inp.dataset.ans}</strong>)`;
                }
            });
            if(inputFeedback) inputFeedback = `<div style="margin-top:1rem; padding-top:1rem; border-top:1px dashed var(--text-muted);">${inputFeedback}</div>`;

            if (isHint) {
                btn.classList.add('hint-highlight');
                if (currentMode === 'concepts') conceptDeckShuffled.push(conceptDeckShuffled[conceptIdx - 1]);
                fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used.</strong><br><br>${currentData.exp}${inputFeedback}`;
                fb.style.borderLeftColor = 'var(--accent)';
                if (currentMode === 'concepts') fb.innerHTML += `<br><br><em style="color:var(--accent);">Card recycled to the back of the deck.</em>`;
            }
            else if (selectedAns === currentData.correctAns) {
                btn.classList.add('correct');
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br>${currentData.exp}${inputFeedback}`;
                fb.style.borderLeftColor = 'var(--success)';
            } else {
                btn.classList.add('wrong');
                Array.from(grid.children).forEach(b => { if (b.innerHTML === currentData.correctAns) b.classList.add('correct'); });
                
                if (currentMode === 'concepts') conceptDeckShuffled.push(conceptDeckShuffled[conceptIdx - 1]);
                
                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect.</strong><br><br>${currentData.exp}${inputFeedback}`;
                fb.style.borderLeftColor = 'var(--error)';
                if (currentMode === 'concepts') fb.innerHTML += `<br><br><em style="color:var(--accent);">Card recycled to the back of the deck.</em>`;
            }
            
            fb.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function useHint() {
            const btns = Array.from(document.querySelectorAll('#opts-grid .option-btn'));
            if(!btns.length || btns[0].disabled) return; 
            
            const correctBtn = btns.find(b => b.innerHTML === currentData.correctAns);
            handleMCQ(correctBtn, currentData.correctAns, true);
        }

        // Init
        switchMode('ti84');
    </script>
