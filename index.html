<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Study Hub Terminal</title>
    <link rel="icon" href="Global/SVGs/avatar.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Global/Css/main.css">
    <link rel="stylesheet" href="Global/Css/animations.css">
</head>
<body>
    <canvas id="background-canvas"></canvas>

    <div class="content-wrapper">
        <div class="container-header">
            <img src="Global/SVGs/logo.svg" alt="Study Hub Logo" class="logo">
        </div>

        <div class="container">
            <div id="loading">Initializing Hub Interface...</div>
            <div id="rate-limit-warning">GitHub API rate limit reached. Displaying tools with cached or approximate dates.</div>
            
            <div class="views-wrapper">
                <div id="category-view" class="">
                    <div class="view-header centered-header">
                        <h2 class="view-title">Hello (つ ͡ꈍ ͜ʖ̫ ͡ꈍ )</h2>
                    </div>
                    <div class="link-list" id="category-list"></div>
                </div>

                <div id="tool-view" class="hidden">
                    <div class="view-header">
                        <h2 id="view-title" class="view-title">Category</h2>
                        <button class="back-btn" id="back-btn">← Back</button>
                    </div>
                    <div class="link-list" id="tool-list"></div>
                </div>
            </div>

            <div class="container-footer">
                <img src="Global/SVGs/avatar.svg" alt="Avatar" class="avatar">
                <p class="contact-info">Contact: <a href="mailto:alex.erden@gmail.com">alex.erden@gmail.com</a></p>
            </div>
        </div>

        <div id="debug-console"></div>

        <script>
            const debugConsole = document.getElementById('debug-console');
            if (debugConsole) {
                const createLog = (type) => (...args) => {
                    const msg = document.createElement('div');
                    msg.className = `log-msg ${type}`;
                    msg.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : a).join(' ');
                    debugConsole.prepend(msg);
                };
                const originalError = console.error;
                console.log = createLog('log');
                console.warn = createLog('warn');
                console.error = (...args) => {
                    originalError.apply(console, args);
                    createLog('error')(...args);
                };
                window.addEventListener('error', (event) => console.error('Uncaught Exception:', event.error));
                window.addEventListener('unhandledrejection', (event) => console.error('Unhandled Promise Rejection:', event.reason));
                console.log('Debug console initialized.');
            }

            const repoApiUrl = 'https://api.github.com/repos/LucaDazy/htmls/';
            const manifestUrl = 'Global/tool-manifest.json';
            const cacheKey = 'study_hub_dates_v3';

            const loadingEl = document.getElementById('loading');
            const warningEl = document.getElementById('rate-limit-warning');
            const categoryView = document.getElementById('category-view');
            const toolView = document.getElementById('tool-view');
            const categoryList = document.getElementById('category-list');
            const toolList = document.getElementById('tool-list');
            const backBtn = document.getElementById('back-btn');
            const viewTitle = document.getElementById('view-title');
            const mainContainer = document.querySelector('.container');
            const viewsWrapper = document.querySelector('.views-wrapper');

            let hubData = [];
            let dateCache = {};
            let renderTimeout = null;

            function sanitizeForId(path) {
                return `date-${path.replace(/[^a-zA-Z0-9]/g, '-')}`;
            }

            async function fetchJSON(url) {
                const res = await fetch(`${url}?cb=${new Date().getTime()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error(`Network error for ${url}, status: ${res.status}`);
                return res.json();
            }

            function renderList(items, container, isCategory) {
                container.innerHTML = '';
                
                const groups = items.reduce((acc, item) => {
                    const key = item.sort1; // Both categories and tools are grouped by their first sort number
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(item);
                    return acc;
                }, {});

                const sortedGroupKeys = Object.keys(groups).sort((a, b) => b - a);

                for (const key of sortedGroupKeys) {
                    const groupContainer = document.createElement('div');
                    groupContainer.className = 'group-container';
                    
                    const sortedItems = groups[key].sort((a, b) => b.sort2 - a.sort2);

                    for (const item of sortedItems) {
                        const a = document.createElement('a');
                        a.className = 'app-btn';
                        
                        let titleHTML = `<span class="app-title">${item.name || item.categoryName}</span>`;
                        
                        if (isCategory) {
                            a.onclick = () => showToolView(item.categoryName);
                            a.style.cursor = 'pointer';
                        } else {
                            a.href = item.path;
                            a.target = '_blank';
                            const dateId = sanitizeForId(item.path);
                            titleHTML += `<span class="app-date" id="${dateId}"></span>`;
                        }
                        a.innerHTML = titleHTML;
                        groupContainer.appendChild(a);
                    }
                    container.appendChild(groupContainer);
                }
            }

            async function populateDates() {
                console.log("Starting progressive date population...");
                let rateLimitHit = false;

                for (const category of hubData) {
                    for (const tool of category.tools) {
                        if (rateLimitHit) {
                            const el = document.getElementById(sanitizeForId(tool.path));
                            if (el) el.innerText = 'Date Unknown';
                            continue;
                        }

                        const dateSpan = document.getElementById(sanitizeForId(tool.path));
                        if (!dateSpan) continue;

                        if (dateCache[tool.path]) {
                            dateSpan.innerText = new Date(dateCache[tool.path]).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                            continue;
                        }

                        try {
                            const commits = await fetchJSON(`${repoApiUrl}commits?path=${tool.path}&per_page=100`);
                            let creationDate = new Date();
                            if (commits && commits.length > 0) {
                                creationDate = new Date(commits[commits.length - 1].commit.author.date);
                            }
                            dateCache[tool.path] = creationDate.toISOString();
                            dateSpan.innerText = creationDate.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                        } catch (e) {
                            rateLimitHit = true;
                            warningEl.style.display = 'block';
                            dateSpan.innerText = 'Date Unknown';
                            console.warn(`Rate limit likely hit. Halting further date requests. Error on: ${tool.path}`);
                        }
                    }
                }
                localStorage.setItem(cacheKey, JSON.stringify(dateCache));
                console.log("Date population complete.");
            }

            function showToolView(categoryName) {
                // Lock wrapper height to its current size to prevent page jump
                viewsWrapper.style.minHeight = `${viewsWrapper.offsetHeight}px`;

                const category = hubData.find(c => c.categoryName === categoryName);
                if (!category) return;
                viewTitle.innerText = category.categoryName;

                categoryView.classList.add('hidden');
                toolView.classList.remove('hidden');

                if (renderTimeout) clearTimeout(renderTimeout);

                renderTimeout = setTimeout(() => {
                    renderList(category.tools, toolList, false);
                    renderTimeout = null;
                }, 50);

                // After transition, release the fixed height
                setTimeout(() => {
                    viewsWrapper.style.minHeight = '';
                }, 350); // Must match the CSS transition duration
            }

            function showCategoryView() {
                // Lock wrapper height to its current size to prevent page jump
                viewsWrapper.style.minHeight = `${viewsWrapper.offsetHeight}px`;

                toolView.classList.add('hidden');
                categoryView.classList.remove('hidden');

                if (renderTimeout) {
                    clearTimeout(renderTimeout);
                    renderTimeout = null;
                }

                // After transition, release the fixed height
                setTimeout(() => {
                    viewsWrapper.style.minHeight = '';
                }, 350); // Must match the CSS transition duration
            }

            async function buildHub() {
                try {
                    loadingEl.innerText = "Loading tool manifest...";
                    hubData = await fetchJSON(manifestUrl);
                    dateCache = JSON.parse(localStorage.getItem(cacheKey)) || {};

                    loadingEl.style.display = 'none';
                    renderList(hubData, categoryList, true);
                    // The view is already visible by default.
                    // We just need to remove the 'hidden' class from category-view
                    // in case the user navigates back and forth quickly on load.
                    showCategoryView();
                    
                    // Asynchronously populate dates without blocking UI
                    setTimeout(populateDates, 50);

                } catch (error) {
                    loadingEl.innerHTML = `<span style="color: var(--error);">Failed to load 'Global/tool-manifest.json'. The hub cannot be built.</span>`;
                    console.error("FATAL ERROR in buildHub:", error);
                }
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === '`') {
                    const consoleEl = document.getElementById('debug-console');
                    const isVisible = consoleEl.style.display === 'block';
                    consoleEl.style.display = isVisible ? 'none' : 'block';
                }
            });

            function animateSVGs() {
                const logoImg = document.querySelector('.container-header .logo');
                const avatarImg = document.querySelector('.container-footer .avatar');

                if (!logoImg || !avatarImg) {
                    console.error("Animation failed: Could not find logo or avatar image element.");
                    return;
                }

                const logoFrames = [ 'Global/SVGs/logo.svg', 'Global/SVGs/logo-alt1.svg', 'Global/SVGs/logo-alt2.svg' ];
                const avatarFrames = [ 'Global/SVGs/avatar.svg', 'Global/SVGs/avatar-alt1.svg', 'Global/SVGs/avatar-alt2.svg' ];
                let logoIndex = 0;
                let avatarIndex = 0;

                // Preload images into Image objects so they are cached by the browser
                const preloadedLogos = logoFrames.map(src => {
                    const img = new Image();
                    img.src = src;
                    return img;
                });
                const preloadedAvatars = avatarFrames.map(src => {
                    const img = new Image();
                    img.src = src;
                    return img;
                });

                // Use requestAnimationFrame for smoother animation
                let lastTime = 0;
                const frameInterval = 120; // ms between frames

                function animate(timestamp) {
                    // Pause animation when the page is hidden (e.g., background tab)
                    if (document.hidden) {
                        requestAnimationFrame(animate);
                        return;
                    }

                    if (timestamp - lastTime >= frameInterval) {
                        lastTime = timestamp;
                        logoIndex = (logoIndex + 1) % logoFrames.length;
                        avatarIndex = (avatarIndex + 1) % avatarFrames.length;

                        // Use the preloaded Image object's src (original URL without cache-busting)
                        // The browser will use its in-memory cache, and the service worker cache
                        // will match the original URL, ensuring offline support.
                        logoImg.src = preloadedLogos[logoIndex].src;
                        avatarImg.src = preloadedAvatars[avatarIndex].src;
                    }
                    requestAnimationFrame(animate);
                }
                requestAnimationFrame(animate);
            }

            animateSVGs();

            backBtn.addEventListener('click', showCategoryView);
            buildHub();
        </script>

        <script src="Global/Scripts/background-animation.js" defer></script>

        <script>
          // Register the service worker to enable offline access and asset caching with enhanced logging
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                  console.log('[SW Registration] ServiceWorker registration successful with scope: ', registration.scope);

                  // This logic helps debug service worker updates.
                  registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    console.log('[SW Registration] New service worker found. State:', newWorker.state);
                    newWorker.addEventListener('statechange', () => {
                      console.log('[SW Registration] Service worker state changed:', newWorker.state);
                    });
                  });
                })
                .catch(error => {
                  console.error('[SW Registration] ServiceWorker registration failed: ', error);
                });
            });
            
            // Log if a service worker is already controlling the page on load.
            if (navigator.serviceWorker.controller) {
                console.log('[SW Registration] This page is currently controlled by:', navigator.serviceWorker.controller);
            }
          } else {
            console.warn('[SW Registration] Service workers are not supported in this browser.');
          }
        </script>
    </div>
</body>
</html>
