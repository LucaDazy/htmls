<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Study Hub Terminal</title>
    <style>
        :root {
            --bg-color: #323437;
            --text-main: #d1d0c5;
            --text-muted: #646669;
            --accent: #e2b714;
            --panel-bg: #2c2e31;
            --hover-bg: #3a3d40;
            --error: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            width: 60px;
            height: auto;
            border-radius: 50%;
        }

        h1 { 
            color: var(--accent); 
            margin: 0; 
            text-align: center; 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            margin-bottom: 3rem; 
            text-align: center; 
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .link-list {
            display: flex;
            flex-direction: column;
        }

        .group-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .group-container:last-child {
            margin-bottom: 0;
        }

        .app-btn {
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-main);
            padding: 1.2rem 1.5rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-btn:hover {
            border-color: var(--accent);
            background: var(--hover-bg);
            transform: translateX(4px);
        }

        .app-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .app-btn:hover .app-title {
            color: var(--accent);
        }

        .app-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #loading {
            text-align: center;
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        #rate-limit-warning {
            color: var(--error);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img id="dynamic-logo" alt="Study Hub Logo" class="logo">
        <h1>Study Hub Terminal</h1>
    </div>
    <div class="subtitle">Automated Chronological Index</div>

    <div class="container">
        <div id="loading">Scanning GitHub repository timeline...</div>
        <div id="rate-limit-warning">GitHub API rate limit reached. Displaying files with cached or approximate dates until the limit resets (1 hour).</div>
        <div class="link-list" id="link-list"></div>
    </div>

    <script>
        // Force the browser to grab the newest version of the logo every single time
        document.getElementById('dynamic-logo').src = 'lucadazyyellow.png?v=' + new Date().getTime();

        const repoUrl = 'https://api.github.com/repos/LucaDazy/htmls/contents/';

        // Added strict no-store cache busting to the API fetch
        async function fetchJSON(url) {
            // Append a random timestamp to the URL so the browser thinks it's a completely new request
            const separator = url.includes('?') ? '&' : '?';
            const cacheBustedUrl = `${url}${separator}cb=${new Date().getTime()}`;
            
            const res = await fetch(cacheBustedUrl, { cache: 'no-store' });
            if (!res.ok) throw new Error("Network/API error");
            return res.json();
        }

        async function buildTerminal() {
            const list = document.getElementById('link-list');
            const loading = document.getElementById('loading');
            const warning = document.getElementById('rate-limit-warning');

            try {
                // 1. Get current files in the repo (Always fresh)
                let filesData;
                try {
                    filesData = await fetchJSON(repoUrl);
                } catch (e) {
                    loading.innerHTML = `<span style="color: var(--error);">Failed to connect to GitHub. Please check your internet connection or repository URL.</span>`;
                    return;
                }

                const htmlFiles = filesData.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');

                if (htmlFiles.length === 0) {
                    loading.style.display = 'none';
                    list.innerHTML = '<div style="color: var(--error); text-align: center;">No HTML modules found.</div>';
                    return;
                }

                // 2. Load Local Cache (Only caching dates to avoid rate limit)
                let cache = JSON.parse(localStorage.getItem('study_hub_dates')) || {};
                let fileDataArray = [];
                let rateLimitHit = false;

                // 3. Process each file
                for (const file of htmlFiles) {
                    if (cache[file.name]) {
                        fileDataArray.push({ name: file.name, date: new Date(cache[file.name]) });
                    } else if (!rateLimitHit) {
                        try {
                            const commits = await fetchJSON(`https://api.github.com/repos/LucaDazy/htmls/commits?path=${file.name}&per_page=100`);
                            let creationDate = new Date();
                            if (commits && commits.length > 0) {
                                creationDate = new Date(commits[commits.length - 1].commit.author.date);
                            }
                            fileDataArray.push({ name: file.name, date: creationDate });
                            cache[file.name] = creationDate.toISOString(); 
                        } catch (e) {
                            rateLimitHit = true;
                            warning.style.display = 'block';
                            fileDataArray.push({ name: file.name, date: new Date() }); // Fallback to current date
                        }
                    } else {
                        // If rate limit is already hit, just use fallback
                        fileDataArray.push({ name: file.name, date: new Date() });
                    }
                }

                localStorage.setItem('study_hub_dates', JSON.stringify(cache));

                // 4. Sort array by date descending
                fileDataArray.sort((a, b) => b.date - a.date);

                // 5. Render UI
                loading.style.display = 'none';
                
                let currentGroup = null;
                let lastDate = null;
                const TWO_DAYS_MS = 2 * 24 * 60 * 60 * 1000;

                fileDataArray.forEach(file => {
                    if (!lastDate || Math.abs(lastDate - file.date) > TWO_DAYS_MS) {
                        currentGroup = document.createElement('div');
                        currentGroup.className = 'group-container';
                        list.appendChild(currentGroup);
                    }

                    const a = document.createElement('a');
                    a.href = file.name;
                    a.target = '_blank';
                    a.className = 'app-btn';

                    let displayName = file.name.replace('.html', '').replace(/([A-Z])/g, ' $1').trim();
                    displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);

                    const dateStr = file.date.toLocaleDateString(undefined, { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });

                    a.innerHTML = `
                        <span class="app-title">${displayName}</span>
                        <span class="app-date">${rateLimitHit && !cache[file.name] ? 'Date Unknown' : dateStr}</span>
                    `;
                    
                    currentGroup.appendChild(a);
                    lastDate = file.date;
                });

            } catch (error) {
                loading.innerHTML = `<span style="color: var(--error);">An unexpected error occurred building the terminal.</span>`;
                console.error(error);
            }
        }

        buildTerminal();
    </script>
</body>
</html>
