<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Study Hub Terminal</title>
    <link rel="stylesheet" href="Global/Css/main.css">
    <style>
        body {
            font-family: var(--font-family-mono);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1.5rem;
        }

        .header .logo { max-width: 180px; height: auto; flex-shrink: 0; }
        .header .avatar { max-width: 60px; height: auto; flex-shrink: 0; }

        h1 { color: var(--minimal-white); margin: 0; text-align: center; font-family: var(--font-family-main); font-size: 2.5rem; width: 100%;}
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; font-family: var(--font-family-main); width: 100%;}

        .container { width: 100%; max-width: 700px; background: var(--panel-bg); padding: 2rem; border-radius: 8px; box-sizing: border-box; }
        .link-list { display: flex; flex-direction: column; }
        
        #tool-view { display: none; }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--hover-bg); padding-bottom: 1rem;}
        .view-title { color: var(--minimal-white); font-family: var(--font-family-main); font-size: 1.5rem; margin: 0; }
        .back-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .group-container { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2.5rem; }
        .group-container:last-child { margin-bottom: 0; }

        .app-btn {
            background: transparent; border: 2px solid var(--text-muted); color: var(--text-main);
            padding: 1.2rem 1.5rem; font-family: var(--font-family-mono); cursor: pointer; border-radius: 4px;
            transition: all 0.2s; text-decoration: none; display: flex; justify-content: space-between; align-items: center;
        }
        .app-btn:hover { border-color: var(--accent); background: var(--hover-bg); transform: translateX(4px); }
        .app-title { font-size: 1.1rem; font-weight: bold; color: var(--text-main); transition: color 0.2s; }
        .app-btn:hover .app-title { color: var(--accent); }
        .app-date { font-size: 0.85rem; color: var(--text-muted); }

        #loading { text-align: center; color: var(--accent); font-size: 1.1rem; margin-bottom: 1rem; }
        #rate-limit-warning { color: var(--error); font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; display: none; }
    
        #debug-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: rgba(0,0,0,0.85);
            border-top: 2px solid var(--text-muted);
            color: var(--text-main);
            font-family: var(--font-family-mono);
            font-size: 0.85rem;
            padding: 0.5rem;
            overflow-y: auto;
            z-index: 9999;
            display: none; /* Hide by default */
        }
        .log-msg { white-space: pre-wrap; margin-bottom: 0.3rem; border-bottom: 1px solid #444; padding-bottom: 0.3rem; }
        .log-msg.error { color: var(--error); }
        .log-msg.warn { color: var(--accent); }
    </style>
</head>
<body>
    <header class="header">
        <img src="Global/SVGs/avatar.svg" alt="Avatar" class="avatar">
        <img src="Global/SVGs/logo.svg" alt="Study Hub Logo" class="logo">
    </header>
    <h1>Study Hub</h1>
    <div class="subtitle">An Organized Collection of Gamified Study Tools</div>

    <div class="container">
        <div id="loading">Initializing Hub Interface...</div>
        <div id="rate-limit-warning">GitHub API rate limit reached. Displaying tools with cached or approximate dates.</div>
        
        <div id="category-view">
            <div class="link-list" id="category-list"></div>
        </div>

        <div id="tool-view">
            <div class="view-header">
                <h2 id="view-title" class="view-title">Category</h2>
                <button class="back-btn" id="back-btn">← Back to Categories</button>
            </div>
            <div class="link-list" id="tool-list"></div>
        </div>
    </div>

    <div id="debug-console"></div>

    <script>
        const debugConsole = document.getElementById('debug-console');
        if (debugConsole) {
            const createLog = (type) => (...args) => {
                const msg = document.createElement('div');
                msg.className = `log-msg ${type}`;
                msg.textContent = args.map(a => {
                    try {
                        return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a);
                    } catch (e) {
                        return '[Unserializable Object]';
                    }
                }).join(' ');
                debugConsole.prepend(msg);
            };
            const originalError = console.error;
            console.log = createLog('log');
            console.warn = createLog('warn');
            console.error = (...args) => {
                originalError.apply(console, args);
                createLog('error')(...args);
            };
            window.addEventListener('error', (event) => console.error('Uncaught Exception:', event.error ? event.error.stack : event.message));
            window.addEventListener('unhandledrejection', (event) => console.error('Unhandled Promise Rejection:', event.reason ? event.reason.stack : event.reason));
            console.log('--- Debug console initialized (v2) ---');
        }

        const repoUrl = 'https://api.github.com/repos/LucaDazy/htmls/contents/';
        const repoApiUrl = 'https://api.github.com/repos/LucaDazy/htmls/';
        const repoTreeUrl = 'https://api.github.com/repos/LucaDazy/htmls/git/trees/main?recursive=1';
        const cacheKey = 'study_hub_dates_v2';

        const loadingEl = document.getElementById('loading');
        const warningEl = document.getElementById('rate-limit-warning');
        const categoryView = document.getElementById('category-view');
        const toolView = document.getElementById('tool-view');
        const categoryList = document.getElementById('category-list');
        const toolList = document.getElementById('tool-list');
        const backBtn = document.getElementById('back-btn');
        const viewTitle = document.getElementById('view-title');

        let hubData = [];
        let dateCache = {};

        async function fetchJSON(url) {
            console.log(`Fetching: ${url}`);
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) {
                console.error(`Network/API error for ${url}. Status: ${res.status}`);
                throw new Error(`Network/API error for ${url}`);
            }
            console.log(`Fetch successful for: ${url}`);
            return res.json();
        }

        function parseName(name) {
            const parts = name.split('_');
            if (parts.length < 3) return null;
            const sort1 = parseInt(parts[parts.length - 2], 10);
            const sort2 = parseInt(parts[parts.length - 1], 10);
            const displayName = parts.slice(0, -2).join(' ');
            return { displayName, sort1, sort2 };
        }

        async function getCreationDate(path, rateLimit) {
            if (dateCache[path]) {
                console.log(`Cache hit for date: ${path}`);
                return { date: new Date(dateCache[path]), hit: rateLimit.hit };
            }
            if (rateLimit.hit) {
                console.warn(`Rate limit active. Using fallback date for: ${path}`);
                return { date: new Date(), hit: rateLimit.hit };
            }

            try {
                console.log(`Fetching commit history for: ${path}`);
                const commits = await fetchJSON(`${repoApiUrl}commits?path=${path}&per_page=100`);
                let creationDate = new Date(); // Default to now
                if (commits && commits.length > 0) {
                    creationDate = new Date(commits[commits.length - 1].commit.author.date);
                    console.log(`Date found for ${path}: ${creationDate.toISOString()}`);
                } else {
                    console.warn(`No commits found for ${path}, using current date.`);
                }
                dateCache[path] = creationDate.toISOString();
                return { date: creationDate, hit: rateLimit.hit };
            } catch (e) {
                rateLimit.hit = true;
                warningEl.style.display = 'block';
                console.error(`Could not fetch date for ${path}, using fallback. Error:`, e);
                return { date: new Date(), hit: rateLimit.hit };
            }
        }

        function renderList(items, container, isCategory) {
            console.log(`Rendering list. Is category: ${isCategory}. Items count: ${items.length}`);
            container.innerHTML = '';
            
            const groups = items.reduce((acc, item) => {
                const key = item.sort1;
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            const sortedGroupKeys = Object.keys(groups).sort((a, b) => b - a);

            for (const key of sortedGroupKeys) {
                const groupContainer = document.createElement('div');
                groupContainer.className = 'group-container';
                
                const sortedItems = groups[key].sort((a, b) => b.sort2 - a.sort2);

                for (const item of sortedItems) {
                    const a = document.createElement('a');
a.className = 'app-btn';
                    
                    let titleHTML = `<span class="app-title">${item.displayName}</span>`;
                    
                    if (isCategory) {
                        a.onclick = () => showToolView(item.displayName);
                        a.style.cursor = 'pointer';
                    } else {
                        a.href = item.path;
                        a.target = '_blank';
                        const dateStr = item.date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                        const dateClass = (item.rateLimitHit && !dateCache[item.path]) ? 'Date Unknown' : dateStr;
                        titleHTML += `<span class="app-date">${dateClass}</span>`;
                    }
                    a.innerHTML = titleHTML;
                    groupContainer.appendChild(a);
                }
                container.appendChild(groupContainer);
            }
            console.log("Render complete.");
        }

        function showToolView(categoryName) {
            console.log(`Switching to tool view for category: ${categoryName}`);
            const category = hubData.find(c => c.displayName === categoryName);
            if (!category) {
                console.error(`Category '${categoryName}' not found in hubData.`);
                return;
            }
            
            viewTitle.innerText = category.displayName;
            renderList(category.tools, toolList, false);
            
            categoryView.style.display = 'none';
            toolView.style.display = 'block';
        }

        function showCategoryView() {
            console.log("Switching to category view.");
            toolView.style.display = 'none';
            categoryView.style.display = 'block';
        }

        async function buildHub() {
            try {
                console.log("--- Starting hub build process ---");
                dateCache = JSON.parse(localStorage.getItem(cacheKey)) || {};
                console.log(`Loaded ${Object.keys(dateCache).length} items from localStorage cache.`);
                let rateLimit = { hit: false };

                console.log("Fetching recursive repo file tree...");
                const treeData = await fetchJSON(repoTreeUrl);
                const allFiles = treeData.tree;
                if (!allFiles || !Array.isArray(allFiles)) throw new Error("GitHub API response did not contain a 'tree' array.");
                console.log(`Received ${allFiles.length} total file entries from GitHub.`);

                const htmlFiles = allFiles.filter(file => file.type === 'blob' && file.path.startsWith('Tools/') && file.path.endsWith('.html'));
                console.log(`Filtered down to ${htmlFiles.length} HTML tool files.`);
                
                const categoryMap = new Map();

                for (const file of htmlFiles) {
                    console.log(`Processing file: ${file.path}`);
                    const pathParts = file.path.split('/');
                    if (pathParts.length < 4) {
                        console.warn(`Skipping malformed path (not enough parts): ${file.path}`);
                        continue;
                    }

                    const categoryDir = pathParts[1];
                    const toolDir = pathParts[2];
                    
                    const catInfo = parseName(categoryDir);
                    const toolInfo = parseName(toolDir);

                    if (!catInfo || !toolInfo) {
                        console.warn(`Could not parse category/tool info from path: ${file.path}`);
                        continue;
                    }
                    
                    if (!categoryMap.has(catInfo.displayName)) {
                        console.log(`New category found: ${catInfo.displayName}`);
                        categoryMap.set(catInfo.displayName, { ...catInfo, tools: [] });
                    }

                    const { date, hit } = await getCreationDate(file.path, rateLimit);
                    rateLimit.hit = hit;

                    categoryMap.get(catInfo.displayName).tools.push({
                        ...toolInfo,
                        displayName: toolInfo.displayName,
                        path: file.path,
                        date: date,
                        rateLimitHit: rateLimit.hit
                    });
                }
                
                hubData = Array.from(categoryMap.values());
                console.log("Final processed hub data:", JSON.parse(JSON.stringify(hubData)));
                
                localStorage.setItem(cacheKey, JSON.stringify(dateCache));
                console.log("Saved updated date cache to localStorage.");

                loadingEl.style.display = 'none';
                renderList(hubData, categoryList, true);
                showCategoryView();
                console.log("--- Hub rendered successfully ---");

            } catch (error) {
                loadingEl.innerHTML = `<span style="color: var(--error);">Failed to build hub. Check on-screen console for details.</span>`;
                console.error("FATAL ERROR in buildHub:", error.stack);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                const consoleEl = document.getElementById('debug-console');
                const isVisible = consoleEl.style.display === 'block';
                consoleEl.style.display = isVisible ? 'none' : 'block';
            }
        });
        
        window.onload = () => {
            console.log("--- window.onload event fired ---");
            try {
                const bodyStyles = window.getComputedStyle(document.body);
                console.log(`Computed body display: ${bodyStyles.getPropertyValue('display')}`);
                console.log(`Computed body align-items: ${bodyStyles.getPropertyValue('align-items')}`);

                const headerStyles = window.getComputedStyle(document.querySelector('.header'));
                console.log(`Computed header display: ${headerStyles.getPropertyValue('display')}`);
                console.log(`Computed header justify-content: ${headerStyles.getPropertyValue('justify-content')}`);
            } catch (e) {
                console.error("Could not get computed styles.", e);
            }
        };

        backBtn.addEventListener('click', showCategoryView);
        buildHub();
    </script>
</body>
</html>
