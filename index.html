<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Study Hub Terminal</title>
    <link rel="stylesheet" href="Global/Css/main.css">
    <style>
        body {
            font-family: var(--font-family-main); /* USE ATKINSON FOR MAIN TEXT */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .container-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .container-header .logo {
            max-width: 896px; /* 1.6x bigger */
            height: auto;
            pointer-events: none; /* Prevents object from interfering with mouse events */
        }

        .container-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem; /* Precise spacing */
            margin-top: 2rem; /* Moved up */
            padding: 2rem;
            background: var(--hover-bg); /* Use a distinct purple from the palette */
            border-radius: 0 0 8px 8px;
            /* Negative margins to absorb parent padding */
            margin-left: -2rem;
            margin-right: -2rem;
            margin-bottom: -2rem;
        }

        .container-footer .avatar {
            max-width: 240px; /* Bigger avatar */
            height: auto;
            margin-bottom: 0;
        }

        .contact-info {
            color: var(--text-muted);
            font-size: 1rem; /* Larger text */
            margin-top: 0;
            margin-bottom: 0;
        }

        .contact-info a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
        }

        .contact-info a:hover {
            color: var(--accent);
        }

        .container { width: 100%; max-width: 700px; background: var(--panel-bg); padding: 2rem; border-radius: 8px; box-sizing: border-box; }
        .link-list { display: flex; flex-direction: column; }
        
        #tool-view { display: none; }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--hover-bg); padding-bottom: 1rem;}
        .view-title { color: var(--minimal-white); font-family: var(--font-family-main); font-size: 1.5rem; margin: 0; }
        .back-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.4rem 0.8rem; font-family: var(--font-family-mono); font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .group-container { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2.5rem; }
        .group-container:last-child { margin-bottom: 0; }

        .app-btn {
            background: transparent; border: 2px solid var(--text-muted); color: var(--text-main);
            padding: 1.2rem 1.5rem; font-family: var(--font-family-mono); cursor: pointer; border-radius: 4px;
            transition: all 0.2s; text-decoration: none; display: flex; justify-content: space-between; align-items: center;
        }
        .app-btn:hover { border-color: var(--accent); background: var(--hover-bg); transform: translateX(4px); }
        .app-title { font-size: 1.1rem; font-weight: bold; color: var(--text-main); transition: color 0.2s; }
        .app-btn:hover .app-title { color: var(--accent); }
        .app-date { font-size: 0.85rem; color: var(--text-muted); }

        #loading { text-align: center; color: var(--accent); font-size: 1.1rem; margin-bottom: 1rem; }
        #rate-limit-warning { color: var(--error); font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; display: none; }
    
        #debug-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: rgba(0,0,0,0.85);
            border-top: 2px solid var(--text-muted);
            color: var(--text-main);
            font-family: var(--font-family-mono);
            font-size: 0.85rem;
            padding: 0.5rem;
            overflow-y: auto;
            z-index: 9999;
            display: none; /* Hide by default */
        }
        .log-msg { white-space: pre-wrap; margin-bottom: 0.3rem; border-bottom: 1px solid #444; padding-bottom: 0.3rem; }
        .log-msg.error { color: var(--error); }
        .log-msg.warn { color: var(--accent); }
    </style>
</head>
<body>

    </div>

    <div class="container">
        <div id="loading">Initializing Hub Interface...</div>
        <div id="rate-limit-warning">GitHub API rate limit reached. Displaying tools with cached or approximate dates.</div>
        
        <div id="category-view">
            <div class="link-list" id="category-list"></div>
        </div>

        <div id="tool-view">
            <div class="view-header">
                <h2 id="view-title" class="view-title">Category</h2>
                <button class="back-btn" id="back-btn">← Back</button>
            </div>
            <div class="link-list" id="tool-list"></div>
        </div>

        <div class="container-footer">
            <img src="Global/SVGs/avatar.svg" alt="Avatar" class="avatar">
            <p class="contact-info">Contact: <a href="mailto:alex.erden@gmail.com">alex.erden@gmail.com</a></p>
        </div>
    </div>

    <div id="debug-console"></div>

    <script>
        const debugConsole = document.getElementById('debug-console');
        if (debugConsole) {
            const createLog = (type) => (...args) => {
                const msg = document.createElement('div');
                msg.className = `log-msg ${type}`;
                msg.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : a).join(' ');
                debugConsole.prepend(msg);
            };
            const originalError = console.error;
            console.log = createLog('log');
            console.warn = createLog('warn');
            console.error = (...args) => {
                originalError.apply(console, args);
                createLog('error')(...args);
            };
            window.addEventListener('error', (event) => console.error('Uncaught Exception:', event.error));
            window.addEventListener('unhandledrejection', (event) => console.error('Unhandled Promise Rejection:', event.reason));
            console.log('Debug console initialized.');
        }

        const repoApiUrl = 'https://api.github.com/repos/LucaDazy/htmls/';
        const manifestUrl = 'Global/tool-manifest.json';
        const cacheKey = 'study_hub_dates_v3';

        const loadingEl = document.getElementById('loading');
        const warningEl = document.getElementById('rate-limit-warning');
        const categoryView = document.getElementById('category-view');
        const toolView = document.getElementById('tool-view');
        const categoryList = document.getElementById('category-list');
        const toolList = document.getElementById('tool-list');
        const backBtn = document.getElementById('back-btn');
        const viewTitle = document.getElementById('view-title');

        let hubData = [];
        let dateCache = {};

        function sanitizeForId(path) {
            return `date-${path.replace(/[^a-zA-Z0-9]/g, '-')}`;
        }

        async function fetchJSON(url) {
            const res = await fetch(`${url}?cb=${new Date().getTime()}`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`Network error for ${url}, status: ${res.status}`);
            return res.json();
        }

        function renderList(items, container, isCategory) {
            container.innerHTML = '';
            
            const groups = items.reduce((acc, item) => {
                const key = item.sort1; // Both categories and tools are grouped by their first sort number
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            const sortedGroupKeys = Object.keys(groups).sort((a, b) => b - a);

            for (const key of sortedGroupKeys) {
                const groupContainer = document.createElement('div');
                groupContainer.className = 'group-container';
                
                const sortedItems = groups[key].sort((a, b) => b.sort2 - a.sort2);

                for (const item of sortedItems) {
                    const a = document.createElement('a');
                    a.className = 'app-btn';
                    
                    let titleHTML = `<span class="app-title">${item.name || item.categoryName}</span>`;
                    
                    if (isCategory) {
                        a.onclick = () => showToolView(item.categoryName);
                        a.style.cursor = 'pointer';
                    } else {
                        a.href = item.path;
                        a.target = '_blank';
                        const dateId = sanitizeForId(item.path);
                        titleHTML += `<span class="app-date" id="${dateId}"></span>`;
                    }
                    a.innerHTML = titleHTML;
                    groupContainer.appendChild(a);
                }
                container.appendChild(groupContainer);
            }
        }

        async function populateDates() {
            console.log("Starting progressive date population...");
            let rateLimitHit = false;

            for (const category of hubData) {
                for (const tool of category.tools) {
                    if (rateLimitHit) {
                        const el = document.getElementById(sanitizeForId(tool.path));
                        if (el) el.innerText = 'Date Unknown';
                        continue;
                    }

                    const dateSpan = document.getElementById(sanitizeForId(tool.path));
                    if (!dateSpan) continue;

                    if (dateCache[tool.path]) {
                        dateSpan.innerText = new Date(dateCache[tool.path]).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                        continue;
                    }

                    try {
                        const commits = await fetchJSON(`${repoApiUrl}commits?path=${tool.path}&per_page=100`);
                        let creationDate = new Date();
                        if (commits && commits.length > 0) {
                            creationDate = new Date(commits[commits.length - 1].commit.author.date);
                        }
                        dateCache[tool.path] = creationDate.toISOString();
                        dateSpan.innerText = creationDate.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                    } catch (e) {
                        rateLimitHit = true;
                        warningEl.style.display = 'block';
                        dateSpan.innerText = 'Date Unknown';
                        console.warn(`Rate limit likely hit. Halting further date requests. Error on: ${tool.path}`);
                    }
                }
            }
            localStorage.setItem(cacheKey, JSON.stringify(dateCache));
            console.log("Date population complete.");
        }

        function showToolView(categoryName) {
            const category = hubData.find(c => c.categoryName === categoryName);
            if (!category) return;
            viewTitle.innerText = category.categoryName;
            renderList(category.tools, toolList, false);
            categoryView.style.display = 'none';
            toolView.style.display = 'block';
        }

        function showCategoryView() {
            toolView.style.display = 'none';
            categoryView.style.display = 'block';
        }

        async function buildHub() {
            try {
                loadingEl.innerText = "Loading tool manifest...";
                hubData = await fetchJSON(manifestUrl);
                dateCache = JSON.parse(localStorage.getItem(cacheKey)) || {};

                loadingEl.style.display = 'none';
                renderList(hubData, categoryList, true);
                showCategoryView();
                
                // Asynchronously populate dates without blocking UI
                setTimeout(populateDates, 50);

            } catch (error) {
                loadingEl.innerHTML = `<span style="color: var(--error);">Failed to load 'Global/tool-manifest.json'. The hub cannot be built.</span>`;
                console.error("FATAL ERROR in buildHub:", error);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                const consoleEl = document.getElementById('debug-console');
                const isVisible = consoleEl.style.display === 'block';
                consoleEl.style.display = isVisible ? 'none' : 'block';
            }
        });

        backBtn.addEventListener('click', showCategoryView);
        buildHub();
    </script>
</body>
</html>
