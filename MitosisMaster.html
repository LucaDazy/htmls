<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Mitosis Master</title>
    <style>
        :root {
            --bg-color: #323437;
            --text-main: #d1d0c5;
            --text-muted: #646669;
            --accent: #e2b714;
            --error: #ca4754;
            --success: #8cc84b;
            --panel-bg: #2c2e31;
            --hover-bg: #3a3d40;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        /* Utility Buttons */
        .action-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.8rem 1.5rem; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: var(--bg-color); }
        .hint-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .hint-btn:hover { background: var(--accent); color: var(--bg-color); }

        /* MCQ Styles */
        .mcq-arena { margin-top: 3rem; border-top: 2px dashed var(--text-muted); padding-top: 2rem; }
        .mcq-question { font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .option-btn { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); text-align: left; padding: 1.2rem; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .option-btn.correct { border-color: var(--success); color: var(--success); background: rgba(140, 200, 75, 0.1); }
        .option-btn.wrong { border-color: var(--error); color: var(--error); background: rgba(202, 71, 84, 0.1); }
        .option-btn.hint-highlight { border-color: var(--accent); background: rgba(226, 183, 20, 0.1); color: var(--accent); }
        .option-btn:disabled { cursor: default; }
        
        .feedback-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 4px; display: none; line-height: 1.5; font-size: 0.95rem; background: rgba(0,0,0,0.2); border-left: 4px solid var(--accent); }
        .progress-text { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); text-align: right; }
        .end-screen { text-align: center; display: none; margin-top: 2rem; }
        .end-screen h2 { color: var(--accent); }

        /* Drag and Drop (DND) Sorter Styles */
        .dnd-arena { display: flex; flex-direction: column; gap: 1.5rem; }
        .dnd-card-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; background: rgba(0,0,0,0.2); border: 2px dashed var(--text-muted); border-radius: 8px; padding: 1.5rem; text-align: center; }
        
        .draggable-card {
            background: var(--bg-color); color: var(--accent); border: 2px solid var(--accent); padding: 1rem 1.5rem; font-family: inherit; font-size: 1.05rem; font-weight: bold; border-radius: 4px; cursor: grab; transition: transform 0.1s; max-width: 90%; text-align: center;
        }
        .draggable-card:active { cursor: grabbing; transform: scale(1.05); }
        .draggable-card.hint-mode { background: var(--accent); color: var(--bg-color); }

        .buckets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .drop-bucket {
            background: var(--bg-color); border: 2px solid var(--text-muted); border-radius: 4px; padding: 0.8rem 0.4rem; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; min-height: 70px;
        }
        .drop-bucket.drag-over { border-color: var(--accent); background: var(--hover-bg); transform: scale(1.02); }
        .drop-bucket-title { font-weight: bold; font-size: 0.85rem; color: var(--text-main); text-align: center; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 0.5rem;}
        
        @media (max-width: 800px) {
            .buckets-grid { grid-template-columns: repeat(2, 1fr); }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Bi112 Mitosis Master</h1>
    <div class="subtitle">Comprehensive Phase Sorter & Drill</div>

    <div class="container">
        <div class="section-label">Mitosis: Phase Sorter</div>
        <div id="mitosis-dnd-area" class="dnd-arena">
            <div class="header-row">
                <div style="color: var(--text-muted);">Drag the specific event into its exact phase or checkpoint.</div>
                <button class="hint-btn" onclick="useDndHint()">💡 Hint / Recycle</button>
            </div>
            <div class="dnd-card-zone" id="mitosis-dnd-zone"></div>
            <div id="mitosis-dnd-fb" class="feedback-box" style="margin-top:0;"></div>
            <button id="mitosis-dnd-next" class="action-btn" style="display:none; width:100%; margin-top:0;" onclick="nextDnd()">Next Event ➔</button>
            
            <div style="margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; text-align: center;">INTERPHASE & CHECKPOINTS</div>
            <div class="buckets-grid" id="mitosis-buckets-interphase"></div>
            
            <div style="margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; text-align: center;">M-PHASE (MITOSIS) & CYTOKINESIS</div>
            <div class="buckets-grid" id="mitosis-buckets-mphase"></div>
            
            <div class="progress-text" id="mitosis-dnd-prog"></div>
        </div>
        <div id="mitosis-dnd-end" class="end-screen">
            <h2>Sorter Conquered!</h2><p id="mitosis-dnd-score"></p>
            <button class="action-btn" onclick="initDnd()">Restart Sorter</button>
        </div>

        <div class="mcq-arena" id="mitosis-mcq-area">
            <div class="section-label">Mitosis: Multiple Choice</div>
            <div class="header-row">
                <div class="mcq-question" id="mitosis-mcq-q">Loading...</div>
                <button class="hint-btn" onclick="useHint()">💡 Hint / Recycle</button>
            </div>
            <div class="options-grid" id="mitosis-mcq-opts"></div>
            <div id="mitosis-mcq-fb" class="feedback-box"></div>
            <button id="mitosis-mcq-next" class="action-btn" style="display:none; width:100%; margin-top:1rem;" onclick="nextMCQ()">Next Question ➔</button>
            <div class="progress-text" id="mitosis-mcq-prog"></div>
        </div>
        <div id="mitosis-mcq-end" class="end-screen">
            <h2>Deck Conquered!</h2><p id="mitosis-mcq-score"></p>
            <button class="action-btn" onclick="initMCQ()">Restart Deck</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const dndBucketsInterphase = [
            {id: "g1", name: "G1 Phase"}, {id: "g1_chk", name: "G1 Checkpoint"}, 
            {id: "s", name: "S Phase"}, {id: "g2", name: "G2 Phase"}, 
            {id: "g2_chk", name: "G2 Checkpoint"}, {id: "g0", name: "G0 (Quiescent)"}
        ];
        
        const dndBucketsMphase = [
            {id: "pro", name: "Prophase"}, {id: "promet", name: "Prometaphase"}, 
            {id: "meta", name: "Metaphase"}, {id: "m_chk", name: "M Checkpoint"}, 
            {id: "ana", name: "Anaphase"}, {id: "telo", name: "Telophase"}, 
            {id: "cyto", name: "Cytokinesis"}
        ];

        const dndEvents = [
            // Interphase
            { text: "The cell accumulates building blocks of chromosomal DNA and associated proteins, and builds up energy reserves.", target: "g1", exp: "This is the primary growth and preparation phase (Gap 1) before DNA replication." },
            { text: "Checks for adequate cell size, sufficient reserves, and checks for genomic DNA damage before entering S phase.", target: "g1_chk", exp: "The G1 checkpoint ensures the cell is structurally and genetically sound before replicating its DNA." },
            { text: "DNA replication occurs, resulting in the formation of identical pairs of DNA molecules (sister chromatids).", target: "s", exp: "S stands for Synthesis. This is the exact phase where the 2n DNA is duplicated." },
            { text: "The centrosome is duplicated.", target: "s", exp: "Centrosome duplication occurs during the S phase alongside DNA replication to prepare the mitotic spindle." },
            { text: "The cell replenishes its energy stores, synthesizes proteins necessary for chromosome manipulation, and some organelles are duplicated.", target: "g2", exp: "G2 (Gap 2) is the final preparation and growth phase before the cell physically divides." },
            { text: "Ensures that all of the chromosomes have been replicated and that the replicated DNA is not damaged.", target: "g2_chk", exp: "The G2 checkpoint is the final security gate before entering the M-phase." },
            { text: "A cell in a quiescent (inactive) stage, not actively preparing to divide.", target: "g0", exp: "Some cells enter G0 temporarily due to environmental conditions, while others (like cardiac muscle or nerve cells) remain in G0 permanently." },
            // M-Phase
            { text: "The nuclear envelope starts to break down into small vesicles.", target: "pro", exp: "Prophase is the beginning of Mitosis. The nucleus must dissolve so the chromosomes can be moved." },
            { text: "Chromosomes condense and become visible under a microscope.", target: "pro", exp: "Chromatin tightly coils into visible chromosomes during Prophase to prevent tangling." },
            { text: "The nucleolus disappears.", target: "pro", exp: "The nucleolus, where ribosomes are made, dissolves during Prophase." },
            { text: "Kinetochores appear at the centromeres.", target: "promet", exp: "Prometaphase is the transition phase where the physical attachment points (kinetochores) fully develop." },
            { text: "Mitotic spindle microtubules attach to the kinetochores.", target: "promet", exp: "During Prometaphase, the spindle fibers finally hook onto the chromosomes." },
            { text: "Chromosomes are aligned at the metaphase plate (the equatorial plane).", target: "meta", exp: "Metaphase = Middle. Chromosomes form a perfect line down the center." },
            { text: "Sister chromatids are still tightly attached to each other by cohesin proteins.", target: "meta", exp: "They remain glued together at the metaphase plate until the M checkpoint gives the all-clear." },
            { text: "Determines if all the sister chromatids are correctly attached to the spindle microtubules.", target: "m_chk", exp: "The M (Metaphase) checkpoint prevents unequal separation of chromosomes." },
            { text: "Cohesin proteins degrade, and the centromeres split in two.", target: "ana", exp: "Anaphase begins the moment the glue holding the sister chromatids degrades." },
            { text: "Sister chromatids (now called chromosomes) are pulled toward opposite poles.", target: "ana", exp: "Anaphase = Apart. They are reeled in by the spindle fibers." },
            { text: "Non-kinetochore spindle fibers lengthen, elongating the cell.", target: "ana", exp: "While pulling chromosomes, the cell also stretches out into an oval shape during Anaphase." },
            { text: "Chromosomes reach the opposite poles and begin to decondense (unravel).", target: "telo", exp: "Telophase is essentially the reverse of Prophase. The DNA relaxes back into chromatin." },
            { text: "Nuclear envelopes form around the two separate sets of chromosomes.", target: "telo", exp: "Telophase rebuilds the nuclei for the two future daughter cells." },
            { text: "A cleavage furrow forms, pinching the animal cell in two.", target: "cyto", exp: "Cytokinesis is the physical division of the cytoplasm." },
            { text: "Golgi vesicles coalesce at the former metaphase plate to form a cell plate in plant cells.", target: "cyto", exp: "Plant cells have rigid walls, so they must build a new wall (cell plate) down the middle during Cytokinesis." }
        ];

        const mcqDeck = [
            { q: "What is the primary distinction between Interphase and the Mitotic Phase?", opts: ["Interphase is for cell growth and DNA replication; the Mitotic phase is the physical division of the cell and its contents.", "Interphase cuts the chromosome number in half; the Mitotic phase doubles it.", "Interphase only happens in plant cells; Mitosis only happens in animal cells.", "Interphase occurs after a cell has completely finished dividing."], ans: 0, exp: "Interphase is the lengthy prep phase (G1, S, G2). The Mitotic phase (M-phase) is the actual event of splitting the nucleus (karyokinesis) and cytoplasm (cytokinesis)." },
            { q: "During which exact phase does the replication of DNA occur?", opts: ["S phase", "G1 phase", "G2 phase", "Prophase"], ans: 0, exp: "The S (Synthesis) phase is dedicated entirely to synthesizing a duplicate copy of the DNA, turning a single chromosome into a pair of sister chromatids." },
            { q: "Which statement best describes the physical structure of chromosomes during the G1 phase?", opts: ["They exist as single, unduplicated strands of chromatin.", "They exist as fully formed X-shaped sister chromatids.", "They are tightly condensed and visible under a microscope.", "They are attached to the mitotic spindle."], ans: 0, exp: "During G1, DNA hasn't replicated yet. It is in a relaxed, single-strand chromatin state." },
            { q: "What is the primary function of the G1 Checkpoint?", opts: ["To check for DNA damage and adequate cell reserves before committing to the S phase.", "To ensure all chromosomes are attached to the spindle.", "To check if DNA was replicated perfectly.", "To initiate the formation of the cleavage furrow."], ans: 0, exp: "The G1 checkpoint is the main decision point. If a cell passes this, it commits to the massive energy expense of duplicating DNA." },
            { q: "What is the primary function of the G2 Checkpoint?", opts: ["To ensure all chromosomes have been replicated and that the replicated DNA is not damaged.", "To pull sister chromatids apart.", "To check if the cell has enough nutrients to enter the S phase.", "To form the nuclear envelope."], ans: 0, exp: "G2 happens right after DNA synthesis. It acts as spell-check to make sure the replication was flawless before allowing Mitosis to begin." },
            { q: "What is the primary function of the M Checkpoint?", opts: ["To determine if all sister chromatids are correctly attached to the spindle microtubules.", "To check for DNA mutations before S phase.", "To dissolve the nuclear envelope.", "To break down the cell plate in plant cells."], ans: 0, exp: "The M (Metaphase) checkpoint prevents nondisjunction by making sure the spindle fibers have a firm grip on both sides of every chromosome." },
            { q: "What happens during the Prometaphase stage of Mitosis?", opts: ["Kinetochores appear at the centromeres and mitotic spindle microtubules attach to them.", "The cell divides in half.", "DNA is replicated.", "Chromosomes reach the opposite poles and decondense."], ans: 0, exp: "Prometaphase bridges Prophase and Metaphase. It's when the actual physical connection between the pulling fibers and the chromosomes is made." },
            { q: "During which phase do the cohesin proteins degrade, allowing the centromeres to split in two?", opts: ["Anaphase", "Metaphase", "Prophase", "Telophase"], ans: 0, exp: "Anaphase begins the exact moment the sister chromatids are unglued from each other." },
            { q: "Which phase of mitosis is essentially the reverse of Prophase?", opts: ["Telophase", "Anaphase", "Metaphase", "Prometaphase"], ans: 0, exp: "In Prophase, the nucleus breaks down and chromosomes condense. In Telophase, the nucleus rebuilds and chromosomes decondense." },
            { q: "What is a 'Kinetochore'?", opts: ["A protein structure on the centromere where spindle fibers attach.", "The center of a bacterial cell.", "The enzyme that synthesizes DNA.", "The specific locus of a mutated gene."], ans: 0, exp: "Kinetochores are the protein 'handles' on the centromere." },
            { q: "How does Cytokinesis differ between plant and animal cells?", opts: ["Animal cells form a cleavage furrow by pinching inward; Plant cells form a cell plate from the center outward.", "Animal cells build a cell wall; Plant cells pinch in half.", "Animal cells use FtsZ proteins; Plant cells use actin filaments.", "Plant cells do not undergo cytokinesis."], ans: 0, exp: "Because plant cells have a rigid cell wall, they cannot pinch in half. Golgi vesicles must fuse in the center to build a new wall." },
            { q: "What is the G0 (quiescent) phase?", opts: ["An inactive stage where cells are not actively preparing to divide.", "The phase where the cell rapidly divides without growing.", "The phase where crossing over occurs.", "The checkpoint where apoptosis is triggered."], ans: 0, exp: "Cells in G0 have exited the cycle. Some eventually re-enter G1, while others (like nerve cells) stay in G0 permanently." },
            { q: "A somatic cell undergoing Mitosis begins as a Diploid (2n) cell. What is the ploidy of the two resulting daughter cells?", opts: ["Both are Diploid (2n).", "Both are Haploid (n).", "One is Diploid, one is Haploid.", "They have no ploidy."], ans: 0, exp: "Mitosis creates perfect clones. 2n makes two 2n cells." },
            { q: "During Anaphase, when sister chromatids are pulled apart, what are they officially referred to as?", opts: ["Individual chromosomes.", "Tetrads.", "Homologous pairs.", "Centrioles."], ans: 0, exp: "Once they split, they are no longer sister chromatids; they are considered full, individual chromosomes." },
            { q: "What role do the non-kinetochore spindle fibers play during Anaphase?", opts: ["They push against each other to elongate the cell.", "They pull the chromosomes apart.", "They rebuild the nuclear envelope.", "They degrade the cohesin proteins."], ans: 0, exp: "The spindle fibers that DO NOT attach to chromosomes overlap and push the poles of the cell further apart." },
            { q: "Which of the following events happens during Prophase?", opts: ["The nucleolus disappears and the nuclear envelope breaks down.", "DNA is replicated.", "Chromosomes line up at the equator.", "The cell plate forms."], ans: 0, exp: "Prophase clears the workspace by dissolving the nuclear envelope and the nucleolus." },
            { q: "At what phase of the cell cycle is the cell physically separated into two distinct cells?", opts: ["Cytokinesis", "Telophase", "Anaphase", "G2 Phase"], ans: 0, exp: "While Telophase finishes the division of the nucleus, Cytokinesis completes the division of the cytoplasm." },
            { q: "If a cell is blocked at the G2 checkpoint due to damaged DNA, what process might it undergo if the damage is irreparable?", opts: ["Apoptosis", "Binary Fission", "Nondisjunction", "Meiosis"], ans: 0, exp: "Apoptosis is programmed cell death, ensuring the mutated DNA is not passed on." },
            { q: "During which phase are chromosomes at their most condensed and visible state, lined up in the center?", opts: ["Metaphase", "Prophase", "Anaphase", "Interphase"], ans: 0, exp: "In Metaphase, they are extremely condensed and perfectly aligned for separation." },
            { q: "What structures organize the mitotic spindle in animal cells?", opts: ["Centrosomes (containing centrioles).", "Kinetochores.", "Cell plates.", "Nucleosomes."], ans: 0, exp: "Centrosomes act as the anchor points at the poles of the cell, generating the microtubule spindle fibers." },
            { q: "What happens to the number of chromosomes during the S phase?", opts: ["The number of chromosomes remains the same, but the amount of DNA material doubles.", "The number of chromosomes doubles.", "The number of chromosomes halves.", "The amount of DNA decreases."], ans: 0, exp: "Tricky concept: Even though the DNA duplicates into sister chromatids, they are still connected at the centromere and count as ONE chromosome until Anaphase." },
            { q: "Which phase immediately follows Mitosis?", opts: ["Cytokinesis", "G1 Phase", "S Phase", "Meiosis"], ans: 0, exp: "Cytokinesis often begins during late Anaphase or Telophase and finishes the physical cell division." },
            { q: "In what phase does the cell accumulate building blocks of chromosomal DNA and energy reserves?", opts: ["G1 Phase", "G2 Phase", "M Phase", "S Phase"], ans: 0, exp: "G1 is the initial prep phase where the cell gears up for the massive task of DNA replication." },
            { q: "What happens to the mitotic spindle during Telophase?", opts: ["It breaks down into its tubulin monomers.", "It attaches to the kinetochores.", "It replicates itself.", "It forms the cleavage furrow."], ans: 0, exp: "The spindle's job is done, so it dissolves in Telophase." },
            { q: "If a cell's DNA is 2n = 8 before S phase, what is the structure of its DNA immediately after S phase?", opts: ["8 chromosomes, each consisting of two sister chromatids.", "16 individual chromosomes.", "4 chromosomes, each consisting of two sister chromatids.", "8 single-strand chromatids."], ans: 0, exp: "The 8 chromosomes duplicate their material but stay attached, resulting in 8 X-shaped chromosomes." }
        ];

        // --- ENGINES ---
        let dndState = { deck: [], idx: 0, correct: 0, attempts: 0 };
        let mcqState = { deck: [], idx: 0, correct: 0, attempts: 0 };
        let currentDrag = null;

        function shuffle(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // --- DND LOGIC ---
        function initDnd() {
            dndState = { deck: shuffle(dndEvents), idx: 0, correct: 0, attempts: 0 };
            
            const buildGrid = (buckets, gridId) => {
                const grid = document.getElementById(gridId);
                grid.innerHTML = '';
                buckets.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'drop-bucket';
                    div.innerHTML = `<div class="drop-bucket-title">${b.name}</div>`;
                    div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
                    div.ondragleave = () => div.classList.remove('drag-over');
                    div.ondrop = (e) => { e.preventDefault(); div.classList.remove('drag-over'); if(currentDrag) handleDndDrop(b.id); };
                    grid.appendChild(div);
                });
            }
            buildGrid(dndBucketsInterphase, 'mitosis-buckets-interphase');
            buildGrid(dndBucketsMphase, 'mitosis-buckets-mphase');

            document.getElementById('mitosis-dnd-end').style.display = 'none';
            document.getElementById('mitosis-dnd-area').style.display = 'flex';
            renderDnd();
        }

        function renderDnd() {
            if (dndState.idx >= dndState.deck.length) { endDnd(); return; }
            document.getElementById('mitosis-dnd-fb').style.display = 'none';
            document.getElementById('mitosis-dnd-next').style.display = 'none';

            const ev = dndState.deck[dndState.idx];
            const zone = document.getElementById('mitosis-dnd-zone');
            zone.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = 'draggable-card';
            card.draggable = true;
            card.innerText = ev.text;
            card.ondragstart = () => currentDrag = ev;
            card.ondragend = () => currentDrag = null;

            zone.appendChild(card);
            document.getElementById('mitosis-dnd-prog').innerText = `Card ${dndState.idx + 1} of ${dndState.deck.length}`;
        }

        function handleDndDrop(bucketId) {
            const ev = dndState.deck[dndState.idx];
            const fb = document.getElementById('mitosis-dnd-fb');
            const nextBtn = document.getElementById('mitosis-dnd-next');
            const cardDom = document.querySelector('#mitosis-dnd-zone .draggable-card');
            cardDom.draggable = false;
            dndState.attempts++;

            if (bucketId === ev.target) {
                dndState.correct++;
                cardDom.style.background = 'var(--success)';
                cardDom.style.borderColor = 'var(--success)';
                cardDom.style.color = 'var(--bg-color)';
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br>${ev.exp}`;
                fb.style.borderLeftColor = 'var(--success)';
            } else {
                dndState.deck.push(dndState.deck[dndState.idx]); // Recycle
                cardDom.style.background = 'var(--error)';
                cardDom.style.borderColor = 'var(--error)';
                cardDom.style.color = 'var(--bg-color)';
                
                let correctName = dndBucketsInterphase.find(b => b.id === ev.target)?.name || dndBucketsMphase.find(b => b.id === ev.target)?.name;
                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect. Adding back to deck.</strong><br>Belongs in: <strong>${correctName}</strong><br><br>${ev.exp}`;
                fb.style.borderLeftColor = 'var(--error)';
            }

            document.getElementById('mitosis-dnd-prog').innerText = `Card ${dndState.idx + 1} of ${dndState.deck.length}`;
            fb.style.display = 'block';
            nextBtn.style.display = 'block';
            currentDrag = null;
        }

        function useDndHint() {
            const ev = dndState.deck[dndState.idx];
            const fb = document.getElementById('mitosis-dnd-fb');
            const nextBtn = document.getElementById('mitosis-dnd-next');
            const cardDom = document.querySelector('#mitosis-dnd-zone .draggable-card');
            
            if(!cardDom || cardDom.draggable === false) return; 

            cardDom.draggable = false;
            cardDom.classList.add('hint-mode');
            dndState.attempts++;
            dndState.deck.push(dndState.deck[dndState.idx]); // Recycle

            let correctName = dndBucketsInterphase.find(b => b.id === ev.target)?.name || dndBucketsMphase.find(b => b.id === ev.target)?.name;
            fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used. Recycled to back of deck.</strong><br>Belongs in: <strong>${correctName}</strong><br><br>${ev.exp}`;
            fb.style.borderLeftColor = 'var(--accent)';

            document.getElementById('mitosis-dnd-prog').innerText = `Card ${dndState.idx + 1} of ${dndState.deck.length}`;
            fb.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function nextDnd() { dndState.idx++; renderDnd(); }

        function endDnd() {
            document.getElementById('mitosis-dnd-area').style.display = 'none';
            document.getElementById('mitosis-dnd-end').style.display = 'block';
            const pct = Math.round((dndState.correct / dndState.attempts) * 100) || 0;
            document.getElementById('mitosis-dnd-score').innerHTML = `You placed <strong>${dndState.correct}</strong> correctly out of <strong>${dndState.attempts}</strong> attempts (${pct}%).`;
        }

        // --- MCQ LOGIC ---
        function initMCQ() {
            mcqState = { deck: shuffle(mcqDeck), idx: 0, correct: 0, attempts: 0 };
            document.getElementById('mitosis-mcq-end').style.display = 'none';
            document.getElementById('mitosis-mcq-area').style.display = 'block';
            renderMCQ();
        }

        function renderMCQ() {
            if (mcqState.idx >= mcqState.deck.length) { endMCQ(); return; }
            document.getElementById('mitosis-mcq-fb').style.display = 'none';
            document.getElementById('mitosis-mcq-next').style.display = 'none';

            const qData = mcqState.deck[mcqState.idx];
            document.getElementById('mitosis-mcq-q').innerText = qData.q;
            
            let opts = qData.opts.map((txt, i) => ({txt, origIdx: i}));
            opts = shuffle(opts);

            const grid = document.getElementById('mitosis-mcq-opts');
            grid.innerHTML = '';
            
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.txt;
                btn.onclick = () => handleMCQ(btn, opt.origIdx, qData.ans, opts, qData.exp, false);
                grid.appendChild(btn);
            });
            document.getElementById('mitosis-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
        }

        function handleMCQ(btn, selectedIdx, correctIdx, shuffledOpts, exp, isHint) {
            const btns = document.querySelectorAll('#mitosis-mcq-opts .option-btn');
            btns.forEach(b => { b.disabled = true; b.onclick = null; }); 
            const fb = document.getElementById('mitosis-mcq-fb');
            const nextBtn = document.getElementById('mitosis-mcq-next');
            mcqState.attempts++;

            if (isHint) {
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('hint-highlight');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--accent);">💡 Hint Used. Question recycled.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--accent)';
            }
            else if (selectedIdx === correctIdx) {
                btn.classList.add('correct');
                mcqState.correct++;
                fb.innerHTML = `<strong style="color:var(--success);">✅ Correct!</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--success)';
            } else {
                btn.classList.add('wrong');
                const correctBtnIdx = shuffledOpts.findIndex(o => o.origIdx === correctIdx);
                btns[correctBtnIdx].classList.add('correct');
                mcqState.deck.push(mcqState.deck[mcqState.idx]); // Recycle
                fb.innerHTML = `<strong style="color:var(--error);">❌ Incorrect. Added back to deck.</strong><br><br>${exp}`;
                fb.style.borderLeftColor = 'var(--error)';
            }
            
            document.getElementById('mitosis-mcq-prog').innerText = `Question ${mcqState.idx + 1} of ${mcqState.deck.length}`;
            fb.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function useHint() {
            const qData = mcqState.deck[mcqState.idx];
            const btns = Array.from(document.querySelectorAll('#mitosis-mcq-opts .option-btn'));
            if(!btns.length || btns[0].disabled) return; 
            
            const correctText = qData.opts[qData.ans];
            let correctDomIdx = 0;
            let mockOpts = [];
            btns.forEach((b, i) => {
                let isCorrect = b.innerText === correctText;
                mockOpts.push({origIdx: isCorrect ? qData.ans : -1});
                if(isCorrect) correctDomIdx = i;
            });
            handleMCQ(btns[correctDomIdx], -1, qData.ans, mockOpts, qData.exp, true);
        }

        function nextMCQ() { mcqState.idx++; renderMCQ(); }

        function endMCQ() {
            document.getElementById('mitosis-mcq-area').style.display = 'none';
            document.getElementById('mitosis-mcq-end').style.display = 'block';
            const pct = Math.round((mcqState.correct / mcqState.attempts) * 100) || 0;
            document.getElementById('mitosis-mcq-score').innerHTML = `You answered <strong>${mcqState.correct}</strong> correctly out of <strong>${mcqState.attempts}</strong> attempts (${pct}%).`;
        }

        // Init
        initDnd();
        initMCQ();
    </script>
</body>
</html>
