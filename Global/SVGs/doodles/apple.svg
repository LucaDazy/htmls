<svg xmlns="http://www.w3.org/2000/svg" viewBox="85 25 430 500" width="100%" height="100%">
    <defs>
        <filter id="jitter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise">
                <animate attributeName="seed" values="1;2;3;4;5;6;7;8" dur="0.6s" repeatCount="indefinite" calcMode="discrete" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>

    <g filter="url(#jitter)" fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
        
        <path d="M 300 200 C 200 160, 90 250, 100 380 C 110 510, 230 530, 290 490 Q 300 480, 310 490 C 370 530, 490 510, 500 380 C 510 250, 400 160, 300 200 Z" />

        <path d="M 270 200 Q 300 220, 330 200" />

        <path d="M 290 205 C 280 150, 240 120, 235 90 C 255 105, 275 140, 300 195" />

        <path d="M 305 165 C 330 110, 370 60, 420 40 C 390 85, 350 140, 320 190" />

    </g>
</svg>
