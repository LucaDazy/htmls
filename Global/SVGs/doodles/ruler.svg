<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 120 380 360" width="100%" height="100%">
    <defs>
        <filter id="jitter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise">
                <animate attributeName="seed" values="1;2;3;4;5;6;7;8" dur="0.6s" repeatCount="indefinite" calcMode="discrete" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>

    <g filter="url(#jitter)" fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-42, 300, 300)">
        
        <rect x="100" y="260" width="400" height="80" rx="8" ry="8" />
        
        <circle cx="465" cy="300" r="14" />
        
        <path d="M 130 340 L 130 325 M 155 340 L 155 315 M 180 340 L 180 325 M 205 340 L 205 300 M 230 340 L 230 325 M 255 340 L 255 315 M 280 340 L 280 325 M 305 340 L 305 300 M 330 340 L 330 325 M 355 340 L 355 315 M 380 340 L 380 325 M 405 340 L 405 300 M 430 340 L 430 325" />

    </g>
</svg>
