<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 100 450 550" width="100%" height="100%">
    <defs>
        <filter id="jitter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise">
                <animate attributeName="seed" values="1;2;3;4;5;6;7;8" dur="0.6s" repeatCount="indefinite" calcMode="discrete" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>

    <g filter="url(#jitter)" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-38, 350, 350)">
        
        <path d="M 350 60 L 330 110 Q 350 120 370 110 Z" fill="#FFFFFF" stroke-linejoin="miter" />

        <path d="M 350 60 L 290 210 L 290 500 L 290 560 L 290 590 C 290 660, 410 660, 410 590 L 410 560 L 410 500 L 410 210 Z" />
        
        <path d="M 290 210 L 330 180 L 350 210 L 370 180 L 410 210" />

        <path d="M 330 180 L 330 505" />
        <path d="M 370 180 L 370 505" />

        <path d="M 290 500 Q 350 510 410 500" />
        <path d="M 290 560 Q 350 570 410 560" />

        <path d="M 290 515 Q 350 525 410 515" />
        <path d="M 290 530 Q 350 540 410 530" />
        <path d="M 290 545 Q 350 555 410 545" />

    </g>
</svg>
