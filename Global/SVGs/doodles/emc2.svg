<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 120 515 175" width="100%" height="100%">
    <defs>
        <filter id="jitter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise">
                <animate attributeName="seed" values="1;2;3;4;5;6;7;8" dur="0.6s" repeatCount="indefinite" calcMode="discrete" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>

    <g filter="url(#jitter)" fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
        
        <path d="M 95 255 L 155 240 C 155 190, 90 190, 80 235 C 70 280, 110 300, 160 280" />

        <path d="M 195 235 L 265 220" />
        <path d="M 200 265 L 270 250" />

        <path d="M 310 210 L 315 285" />
        <path d="M 310 230 C 330 195, 360 200, 365 240 L 365 280" />
        <path d="M 360 230 C 380 195, 410 200, 420 240 L 420 280" />

        <path d="M 490 200 C 430 180, 420 280, 455 285 C 475 288, 495 280, 505 265" />

        <path d="M 520 150 C 530 120, 565 120, 560 150 L 525 190 L 575 185" />

    </g>
</svg>
