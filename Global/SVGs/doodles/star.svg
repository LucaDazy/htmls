<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 110 390 390" width="100%" height="100%">
    <defs>
        <filter id="jitter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise">
                <animate attributeName="seed" values="1;2;3;4;5;6;7;8" dur="0.6s" repeatCount="indefinite" calcMode="discrete" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>

    <g filter="url(#jitter)" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 250 240 
                 C 270 170, 290 120, 320 120 
                 C 340 120, 350 170, 360 240 
                 C 410 245, 460 250, 480 260 
                 C 490 270, 480 290, 430 330 
                 C 440 380, 460 440, 450 470 
                 C 440 490, 400 460, 340 420 
                 C 300 440, 240 490, 210 490 
                 C 190 490, 200 430, 240 360 
                 C 180 320, 130 300, 120 280 
                 C 110 260, 150 245, 250 240 Z" />
    </g>
</svg>
