                      fill="url(#scribble-dark)"/>
            </g>

            <g transform="translate(0, 5)">
                <path d="M 185 32 L 225 27 L 215 120 L 175 120 Z" 
                      fill="#a66897" opacity="0.9"/>
                <path d="M 185 32 L 225 27 L 215 120 L 175 120 Z" 
                      fill="url(#scribble-pink)"/>
            </g>

            <g transform="translate(0, 5)">
                <path d="M 245 25 L 295 20 C 335 15, 335 75, 295 75 L 275 75 L 270 120 L 235 120 Z M 275 40 L 295 38 C 310 38, 310 60, 295 60 L 270 60 Z" 
