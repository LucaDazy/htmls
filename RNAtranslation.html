<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI112 - Translation Master</title>
    <style>
        :root {
            --bg-color: #323437;
            --text-main: #d1d0c5;
            --text-muted: #646669;
            --accent: #e2b714;
            --error: #ca4754;
            --success: #8cc84b;
            --panel-bg: #2c2e31;
            --hover-bg: #3a3d40;
            
            /* Diagram specific colors */
            --rna-color: #eb459e;
            --trna-color: #e2b714;
            --ribo-color: #23a559;
            --poly-color: #5865F2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; text-align: center; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 1px solid var(--text-muted); padding-bottom: 0.5rem; width: 100%; text-align: center;}

        /* Interactive Diagram Area */
        .diagram-arena {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--text-muted);
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .diagram-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Drop Zones */
        .drop-zone {
            position: absolute;
            border: 2px dashed var(--text-muted);
            background: rgba(50, 52, 55, 0.95);
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
            z-index: 10;
            transform: translate(-50%, -50%);
            padding: 0.4rem;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .drop-zone.drag-over { border-color: var(--accent); background: rgba(226, 183, 20, 0.2); color: var(--accent); transform: translate(-50%, -50%) scale(1.05); }
        .drop-zone.filled { border: 2px solid var(--success); background: var(--bg-color); color: var(--success); }

        /* Draggable Word Bank */
        .word-bank {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            min-height: 80px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px dashed var(--text-muted);
            box-sizing: border-box;
        }

        .draggable-bubble {
            background: var(--bg-color);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.6rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .draggable-bubble:active { cursor: grabbing; transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.4); }

        /* Feedback UI */
        .feedback-banner {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s;
            margin-bottom: 1.5rem;
        }
        .feedback-banner.show { opacity: 1; }
        .fb-error { background: rgba(202, 71, 84, 0.2); color: var(--error); border: 2px solid var(--error); }
        .fb-success { background: rgba(140, 200, 75, 0.2); color: var(--success); border: 2px solid var(--success); }

        .reset-btn { background: transparent; border: 2px solid var(--text-muted); color: var(--text-muted); padding: 0.8rem 1.5rem; font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .reset-btn:hover { border-color: var(--error); color: var(--error); }

        @media (max-width: 900px) {
            .drop-zone { font-size: 0.7rem; padding: 0.2rem; }
        }
    </style>
</head>
<body>

    <h1>Translation Master</h1>
    <div class="subtitle">Visual Parts Identifier</div>

    <div class="container" id="app-container">
        
        <div class="section-label">Build The Ribosome Complex</div>
        
        <div class="diagram-arena" id="arena">
            <svg class="diagram-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                
                <polyline points="200,90 410,130" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="200,270 340,270" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="200,510 380,480" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                
                <polyline points="380,90 380,240" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="500,90 500,240" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="620,90 620,240" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                
                <polyline points="850,150 615,220" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="850,270 630,300" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
                <polyline points="850,510 800,420" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>

                <path d="M 50 420 L 950 420" stroke="var(--rna-color)" stroke-width="14" stroke-linecap="round"/>
                <path d="M 100 420 L 900 420" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="15,10"/>
                <text x="60" y="390" fill="var(--rna-color)" font-size="24" font-weight="bold">5'</text>
                <text x="920" y="390" fill="var(--rna-color)" font-size="24" font-weight="bold">3'</text>

                <ellipse cx="500" cy="460" rx="220" ry="50" fill="var(--ribo-color)" opacity="0.8"/>
                
                <path d="M 280 400 C 280 150, 720 150, 720 400 Z" fill="var(--ribo-color)" opacity="0.95"/>
                
                <rect x="330" y="220" width="80" height="170" fill="none" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="6,6"/>
                <text x="370" y="360" fill="var(--bg-color)" font-size="40" font-weight="bold" text-anchor="middle" opacity="0.5">E</text>
                
                <rect x="460" y="220" width="80" height="170" fill="none" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="6,6"/>
                <text x="500" y="360" fill="var(--bg-color)" font-size="40" font-weight="bold" text-anchor="middle" opacity="0.5">P</text>
                
                <rect x="580" y="220" width="80" height="170" fill="none" stroke="var(--bg-color)" stroke-width="3" stroke-dasharray="6,6"/>
                <text x="620" y="360" fill="var(--bg-color)" font-size="40" font-weight="bold" text-anchor="middle" opacity="0.5">A</text>

                <path d="M 480 390 L 520 390 L 500 280 Z" fill="var(--trna-color)"/> <line x1="500" y1="280" x2="500" y2="210" stroke="var(--trna-color)" stroke-width="6"/> <circle cx="500" cy="200" r="16" fill="var(--poly-color)"/>
                <circle cx="475" cy="170" r="16" fill="var(--poly-color)"/>
                <circle cx="445" cy="145" r="16" fill="var(--poly-color)"/>
                <circle cx="410" cy="130" r="16" fill="var(--poly-color)"/>
                <circle cx="370" cy="120" r="16" fill="var(--poly-color)"/>
                <circle cx="330" cy="115" r="16" fill="var(--poly-color)"/>
                <circle cx="290" cy="120" r="16" fill="var(--poly-color)"/>

                <path d="M 580 390 L 620 390 L 600 280 Z" fill="var(--trna-color)"/> <line x1="600" y1="280" x2="600" y2="210" stroke="var(--trna-color)" stroke-width="6"/> <circle cx="600" cy="200" r="16" fill="var(--error)"/> 
                
            </svg>

            </div>

        <div class="word-bank" id="bank">
            </div>

        <div class="feedback-banner" id="feedback"></div>
        <button class="reset-btn" onclick="resetDiagram()">Restart Diagram</button>

    </div>

    <script>
        // --- DIAGRAM DATA ---
        const dropZones = [
            { id: "poly_chain", expected: "Polypeptide Chain", x: "20%", y: "15%", w: "160px", h: "40px" },
            { id: "large_sub", expected: "Large Subunit", x: "20%", y: "45%", w: "140px", h: "40px" },
            { id: "small_sub", expected: "Small Subunit", x: "20%", y: "85%", w: "140px", h: "40px" },
            
            { id: "e_site", expected: "E Site (Exit)", x: "38%", y: "15%", w: "120px", h: "40px" },
            { id: "p_site", expected: "P Site (Peptidyl)", x: "50%", y: "15%", w: "140px", h: "40px" },
            { id: "a_site", expected: "A Site (Aminoacyl)", x: "64%", y: "15%", w: "150px", h: "40px" },
            
            { id: "amino_acid", expected: "Amino Acid", x: "85%", y: "25%", w: "120px", h: "40px" },
            { id: "trna", expected: "tRNA Molecule", x: "85%", y: "45%", w: "140px", h: "40px" },
            { id: "mrna", expected: "mRNA Transcript", x: "85%", y: "85%", w: "150px", h: "40px" }
        ];

        const wordBank = [
            "Polypeptide Chain", 
            "Large Subunit", 
            "Small Subunit", 
            "E Site (Exit)", 
            "P Site (Peptidyl)", 
            "A Site (Aminoacyl)", 
            "Amino Acid", 
            "tRNA Molecule", 
            "mRNA Transcript"
        ];

        // --- DIAGRAM LOGIC ---
        let draggedItem = null;
        let correctCount = 0;

        function initDiagram() {
            correctCount = 0;
            const arena = document.getElementById('arena');
            const bank = document.getElementById('bank');
            
            // Clear existing drop zones
            document.querySelectorAll('.drop-zone').forEach(e => e.remove());
            bank.innerHTML = '';
            
            // Create Drop Zones
            dropZones.forEach(dz => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.innerText = "?";
                zone.dataset.expected = dz.expected;
                zone.style.left = dz.x;
                zone.style.top = dz.y;
                zone.style.width = dz.w;
                zone.style.height = dz.h;

                zone.addEventListener('dragover', e => { e.preventDefault(); if(!zone.classList.contains('filled')) zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', e => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => handleDrop(e, zone));

                arena.appendChild(zone);
            });

            // Create Word Bank
            let shuffledBank = [...wordBank].sort(() => Math.random() - 0.5);
            shuffledBank.forEach((word, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'draggable-bubble';
                bubble.innerText = word;
                bubble.draggable = true;
                bubble.id = `bubble-${index}`;
                
                bubble.addEventListener('dragstart', e => {
                    draggedItem = bubble;
                    setTimeout(() => bubble.style.opacity = '0.5', 0);
                });
                bubble.addEventListener('dragend', e => {
                    draggedItem = null;
                    bubble.style.opacity = '1';
                });

                bank.appendChild(bubble);
            });

            const fb = document.getElementById('feedback');
            fb.className = 'feedback-banner';
            fb.innerText = '';
        }

        function handleDrop(e, zone) {
            e.preventDefault();
            zone.classList.remove('drag-over');
            
            if (!draggedItem || zone.classList.contains('filled')) return;

            const expectedWord = zone.dataset.expected;
            const droppedWord = draggedItem.innerText;
            const fb = document.getElementById('feedback');

            if (droppedWord === expectedWord) {
                // Correct
                zone.innerText = droppedWord;
                zone.classList.add('filled');
                draggedItem.remove(); 
                correctCount++;
                
                fb.innerText = "✅ Correct Match!";
                fb.className = 'feedback-banner show fb-success';
                
                if (correctCount === dropZones.length) {
                    fb.innerText = "🎉 Diagram Fully Conquered! Masterful work.";
                    fb.style.opacity = '1'; 
                }
            } else {
                // Incorrect - Snap back penalty 
                fb.innerText = `❌ Incorrect. This is the ${expectedWord}. Your item snapped back to the deck.`;
                fb.className = 'feedback-banner show fb-error';
            }
            
            setTimeout(() => { if(fb.classList.contains('show') && correctCount !== dropZones.length) fb.classList.remove('show'); }, 2500);
        }

        function resetDiagram() {
            initDiagram();
        }

        // --- INIT ---
        initDiagram();

    </script>
</body>
</html>
