<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Steam Game Picker (x30)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b2838;
            color: #c7d5e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .header-container {
            background-color: #2a475e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
            font-size: 28px;
        }
        p {
            color: #8f98a0;
        }
        button {
            background-color: #66c0f4;
            color: #171a21;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #41a6e6;
        }
        button:disabled {
            background-color: #4a545c;
            color: #8f98a0;
            cursor: not-allowed;
        }
        .loading {
            margin-top: 15px;
            font-style: italic;
            color: #66c0f4;
            min-height: 20px;
            font-weight: bold;
        }
        .quantum-badge {
            display: inline-block;
            background-color: #9b59b6;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* Grid Layout for 30 Games */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin-top: 40px;
        }
        
        .game-card {
            padding: 20px;
            background-color: #171a21;
            border-radius: 8px;
            border: 1px solid #4a545c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        .playtime {
            font-size: 18px;
            font-weight: bold;
            color: #66c0f4;
            margin: 15px 0;
            background: rgba(102, 192, 244, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .dev-info {
            font-size: 13px;
            color: #8f98a0;
        }
        a {
            color: #ffffff;
            background-color: #3b6b2e;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: auto;
            transition: background-color 0.2s;
        }
        a:hover {
            background-color: #4a8739;
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="quantum-badge">QUANTUM POWERED</div>
    <h1>🎲 30 True Random Steam Games</h1>
    <p id="status">Fetching the entire Steam catalog... Please wait.</p>
    
    <button id="randomBtn" disabled onclick="getThirtyGames()">Find 30 Random Games</button>
    <div id="loadingText" class="loading"></div>
</div>

<div id="gridContainer" class="grid-container">
    </div>

<script>
    let steamGames = [];

    // Fetch the list of all Steam games on initial load
    async function loadGameList() {
        try {
            const url = "https://api.steampowered.com/ISteamApps/GetAppList/v2/";
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(url));
            
            if (!response.ok) throw new Error("Proxy failed to respond correctly.");
            
            const data = await response.json();
            
            steamGames = data.applist.apps;
            document.getElementById("status").innerText = `Successfully loaded ${steamGames.length.toLocaleString()} items from Steam.`;
            document.getElementById("randomBtn").disabled = false;
        } catch (error) {
            document.getElementById("status").innerText = "Error connecting to Steam. Hosting on GitHub Pages should fix this.";
            console.error(error);
        }
    }

    async function getThirtyGames() {
        const btn = document.getElementById("randomBtn");
        const loadingText = document.getElementById("loadingText");
        const grid = document.getElementById("gridContainer");
        
        btn.disabled = true;
        grid.innerHTML = ""; // Clear the grid from any previous rolls
        
        let validGamesFound = 0;
        const TARGET_GAMES = 30;
        
        let qrngData = [];
        let qrngIndex = 0;

        // Helper function to ask the quantum vacuum for a massive block of entropy at once
        async function fetchQuantumEntropy() {
            loadingText.innerText = `Consulting the quantum vacuum... Found: ${validGamesFound}/30`;
            try {
                // Request 200 numbers at a time to reduce API calls
                const qrngResponse = await fetch("https://qrng.anu.edu.au/API/jsonI.php?length=200&type=uint16");
                const json = await qrngResponse.json();
                qrngData = json.data;
                qrngIndex = 0;
            } catch (e) {
                console.error("Quantum API failed, retrying...");
            }
        }

        await fetchQuantumEntropy();

        // Keep rolling until we find exactly 30 valid games
        while (validGamesFound < TARGET_GAMES) {
            
            // If we run out of quantum numbers in our current batch, go fetch more
            if (qrngIndex >= qrngData.length - 1) {
                await fetchQuantumEntropy();
            }

            // Combine two 16-bit numbers to handle the massive 150,000+ game catalog
            const num1 = qrngData[qrngIndex++];
            const num2 = qrngData[qrngIndex++];
            const trueRandomNumber = (num1 * 65536) + num2;
            
            const randomIndex = trueRandomNumber % steamGames.length;
            const randomApp = steamGames[randomIndex];
            const appId = randomApp.appid;
            
            try {
                // Validate with SteamSpy
                const spyUrl = `https://steamspy.com/api.php?request=appdetails&appid=${appId}`;
                const spyRes = await fetch("https://corsproxy.io/?" + encodeURIComponent(spyUrl));
                const spyData = await spyRes.json();
                
                if (spyData && spyData.name && spyData.developer) {
                    validGamesFound++;
                    loadingText.innerText = `Consulting the quantum vacuum... Found: ${validGamesFound}/30`;
                    
                    const avgMinutes = spyData.average_forever || 0;
                    const avgHours = (avgMinutes / 60).toFixed(1);
                    
                    // Create the HTML card and inject it into the grid dynamically
                    const cardHTML = `
                        <div class="game-card">
                            <div>
                                <div class="game-title">${spyData.name}</div>
                                <div class="dev-info">By: ${spyData.developer}</div>
                                <div class="playtime">Avg Playtime: ${avgHours} hours</div>
                            </div>
                            <a href="https://store.steampowered.com/app/${appId}" target="_blank">View on Steam</a>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                }
            } catch(e) {
                // Skip timeouts, 404s, and invalid DLCs gracefully
            }
        }
        
        loadingText.innerText = "All 30 games found!";
        btn.disabled = false;
    }

    loadGameList();
</script>

</body>
</html>
