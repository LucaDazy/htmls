<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Steam Game Picker (x30) + Debug</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b2838;
            color: #c7d5e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .header-container {
            background-color: #2a475e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
            font-size: 28px;
        }
        p {
            color: #8f98a0;
        }
        button {
            background-color: #66c0f4;
            color: #171a21;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #41a6e6;
        }
        button:disabled {
            background-color: #4a545c;
            color: #8f98a0;
            cursor: not-allowed;
        }
        .loading {
            margin-top: 15px;
            font-style: italic;
            color: #66c0f4;
            min-height: 20px;
            font-weight: bold;
        }
        .quantum-badge {
            display: inline-block;
            background-color: #9b59b6;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* Debug Terminal Style */
        .debug-panel {
            width: 100%;
            max-width: 800px;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            border: 2px solid #ff5555;
            border-radius: 6px;
            margin-top: 30px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .debug-title {
            color: #ff5555;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .debug-log {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            font-size: 12px;
            white-space: pre-wrap;
            color: #55ff55;
        }
        .debug-err {
            color: #ff5555 !important;
        }

        /* Grid Layout for 30 Games */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin-top: 40px;
        }
        .game-card {
            padding: 20px;
            background-color: #171a21;
            border-radius: 8px;
            border: 1px solid #4a545c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .game-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        .playtime {
            font-size: 18px;
            font-weight: bold;
            color: #66c0f4;
            margin: 15px 0;
            background: rgba(102, 192, 244, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .dev-info {
            font-size: 13px;
            color: #8f98a0;
        }
        a {
            color: #ffffff;
            background-color: #3b6b2e;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: auto;
            transition: background-color 0.2s;
        }
        a:hover {
            background-color: #4a8739;
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="quantum-badge">QUANTUM POWERED</div>
    <h1>🎲 30 True Random Steam Games</h1>
    <p id="status">Routing through proxies to fetch the Steam catalog... Please wait.</p>
    
    <button id="randomBtn" disabled onclick="getThirtyGames()">Find 30 Random Games</button>
    <div id="loadingText" class="loading"></div>
</div>

<div class="debug-panel">
    <div class="debug-title">LIVE APPLICATION DEBUG LOG</div>
    <div id="debugLog" class="debug-log">System initialized. Ready to pull data...</div>
</div>

<div id="gridContainer" class="grid-container"></div>

<script>
    let steamGames = [];
    const debugElement = document.getElementById("debugLog");

    function logDebug(msg, isError = false) {
        const timestamp = new Date().toLocaleTimeString();
        const line = isError 
            ? `<div class="debug-err">[${timestamp}] ❌ ${msg}</div>`
            : `<div>[${timestamp}] ⚙️ ${msg}</div>`;
        debugElement.innerHTML += line;
        debugElement.scrollTop = debugElement.scrollHeight;
    }

    // Proxy Waterfall with dynamic timeouts and fixed syntax
    async function fetchWithFallback(targetUrl, identifier = "Data", timeoutMs = 12000) {
        const proxies = [
            { name: "CorsProxy.io", url: "https://corsproxy.io/?url=" },
            { name: "AllOrigins", url: "https://api.allorigins.win/raw?url=" }
        ];

        for (let proxy of proxies) {
            logDebug(`Attempting to fetch ${identifier} via ${proxy.name}...`);
            try {
                // The AbortController enforces the timeout limit
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

                const response = await fetch(proxy.url + encodeURIComponent(targetUrl), { signal: controller.signal });
                clearTimeout(timeoutId);

                if (response.ok) {
                    logDebug(`Success! ${proxy.name} successfully delivered payload.`);
                    return await response.json();
                } else {
                    logDebug(`${proxy.name} returned status: ${response.status} ${response.statusText}`, true);
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    logDebug(`${proxy.name} timed out after ${timeoutMs / 1000} seconds.`, true);
                } else {
                    logDebug(`${proxy.name} error: ${e.message}`, true);
                }
            }
        }
        throw new Error("All proxy destinations in the waterfall completely failed.");
    }

    // Fetch the list of all Steam games on initial load
    async function loadGameList() {
        logDebug("Starting loading process for Steam App List...");
        try {
            const url = "https://api.steampowered.com/ISteamApps/GetAppList/v2/";
            // Give the master list a generous 35-second limit because of its massive size
            const data = await fetchWithFallback(url, "Steam Catalog List", 35000);
            
            if (data && data.applist && data.applist.apps) {
                steamGames = data.applist.apps;
                document.getElementById("status").innerText = `Successfully loaded ${steamGames.length.toLocaleString()} items from Steam.`;
                logDebug(`Database loaded. Found ${steamGames.length} indexed items.`);
                document.getElementById("randomBtn").disabled = false;
            } else {
                throw new Error("JSON structure parsed, but applist array was missing.");
            }
        } catch (error) {
            document.getElementById("status").innerText = "Error: All proxies blocked or failed the request.";
            logDebug(`Critical Failure: ${error.message}`, true);
        }
    }

    async function getThirtyGames() {
        const btn = document.getElementById("randomBtn");
        const loadingText = document.getElementById("loadingText");
        const grid = document.getElementById("gridContainer");
        
        btn.disabled = true;
        grid.innerHTML = ""; 
        logDebug("Beginning Quantum search generation for 30 unique titles...");
        
        let validGamesFound = 0;
        const TARGET_GAMES = 30;
        let qrngData = [];
        let qrngIndex = 0;

        async function fetchQuantumEntropy() {
            loadingText.innerText = `Consulting the quantum vacuum... Found: ${validGamesFound}/30`;
            logDebug("Requesting fresh high-entropy dataset from ANU Quantum API...");
            try {
                const qrngResponse = await fetch("https://qrng.anu.edu.au/API/jsonI.php?length=200&type=uint16");
                const json = await qrngResponse.json();
                qrngData = json.data;
                qrngIndex = 0;
                logDebug(`Received ${qrngData.length} unique quantum states.`);
            } catch (e) {
                logDebug(`Quantum vacuum query failed: ${e.message}`, true);
            }
        }

        await fetchQuantumEntropy();

        while (validGamesFound < TARGET_GAMES) {
            if (qrngIndex >= qrngData.length - 1) {
                await fetchQuantumEntropy();
            }

            const num1 = qrngData[qrngIndex++];
            const num2 = qrngData[qrngIndex++];
            const trueRandomNumber = (num1 * 65536) + num2;
            
            const randomIndex = trueRandomNumber % steamGames.length;
            const randomApp = steamGames[randomIndex];
            const appId = randomApp.appid;
            
            try {
                const spyUrl = `https://steamspy.com/api.php?request=appdetails&appid=${appId}`;
                // Keep the default snappy 12-second timeout for these smaller background checks
                const spyData = await fetchWithFallback(spyUrl, `SteamSpy Data (AppID: ${appId})`);
                
                if (spyData && spyData.name && spyData.developer) {
                    validGamesFound++;
                    loadingText.innerText = `Consulting the quantum vacuum... Found: ${validGamesFound}/30`;
                    logDebug(`Validated title [${validGamesFound}/${TARGET_GAMES}]: "${spyData.name}"`);
                    
                    const avgMinutes = spyData.average_forever || 0;
                    const avgHours = (avgMinutes / 60).toFixed(1);
                    
                    const cardHTML = `
                        <div class="game-card">
                            <div>
                                <div class="game-title">${spyData.name}</div>
                                <div class="dev-info">By: ${spyData.developer}</div>
                                <div class="playtime">Avg Playtime: ${avgHours} hours</div>
                            </div>
                            <a href="https://store.steampowered.com/app/${appId}" target="_blank">View on Steam</a>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                } else {
                    logDebug(`AppID ${appId} was parsed but missing standard gaming classification data. Skipping...`);
                }
            } catch(e) {
                logDebug(`Skipping AppID ${appId} due to network resolution failure.`);
            }
        }
        
        loadingText.innerText = "All 30 games found!";
        logDebug("Successfully outputted 30 quantum-sourced records to UI layout.");
        btn.disabled = false;
    }

    loadGameList();
</script>

</body>
</html>
